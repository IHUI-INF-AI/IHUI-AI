apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: zhs-backend-monitor
  namespace: monitoring
  labels:
    app: zhs-backend
    release: prometheus
spec:
  selector:
    matchLabels:
      app: zhs-backend
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
  namespaceSelector:
    matchNames:
      - zhs
