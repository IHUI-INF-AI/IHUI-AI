# A 套壳架构 nginx 配置(2026-07-24)
# output:'export' 静态文件服务 + API/AI-service 反向代理
# 替代 Next.js standalone server.js + rewrites(output:export 不支持 rewrites)

server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/x-javascript application/json application/xml image/svg+xml;

    # 静态资源缓存(Next.js _next/static/ 带内容哈希,可永久缓存)
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API 反向代理 → apps/api (Fastify :8802 → Docker 内网 api:8080)
    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # AI Service 反向代理 → apps/ai-service (FastAPI :8803 → Docker 内网 ai-service:8000)
    location /ai-service/ {
        proxy_pass http://ai-service:8000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # WebSocket 代理(/socket.io/)
    location /socket.io/ {
        proxy_pass http://ai-service:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA 回退:客户端路由全部回退到 index.html(Next.js output:export 需要)
    location / {
        try_files $uri $uri.html $uri/index.html /index.html;
    }

    # 健康检查端点
    location /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
