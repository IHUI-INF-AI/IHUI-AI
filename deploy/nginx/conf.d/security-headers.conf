# 安全响应头 snippet — 在 server / location 块内通过 `include /etc/nginx/conf.d/security-headers.conf;` 复用.
# 注: add_header 默认会覆盖上层继承,若 location 内已有 add_header 需显式 repeat 或使用 always.

add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss: https:; frame-ancestors 'self';" always;
