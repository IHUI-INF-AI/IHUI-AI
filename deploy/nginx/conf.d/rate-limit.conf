# 限流配置 snippet — 定义限流 zone,需在 http 块内加载 (已由 nginx.conf 的 include /etc/nginx/conf.d/*.conf 引入).
# 按 URI 前缀分级: login 10r/s, api 100r/s, static 1000r/s.
# 使用: 在对应 server / location 块内 `limit_req zone=login_zone burst=20 nodelay;` 等.

# 登录/鉴权接口: 10r/s,防御暴力破解与撞库
limit_req_zone $binary_remote_addr zone=login_zone:10m rate=10r/s;

# 通用 API: 100r/s
limit_req_zone $binary_remote_addr zone=api_zone:10m rate=100r/s;

# 静态资源: 1000r/s,高并发缓存友好
limit_req_zone $binary_remote_addr zone=static_zone:10m rate=1000r/s;

# 限流触发时返回 429,并记录到独立日志便于分析
limit_req_status 429;
limit_req_log_level warn;
