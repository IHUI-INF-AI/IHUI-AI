# ============================================================
# IHUI-AI 认证子域 bsm.aizhs.top Nginx 配置 (2026-07-21 立)
# ============================================================
#
# 分域 SSO 架构:
#   主域 aizhs.top    → 用户日常访问,承载所有业务功能
#   认证子域 bsm.aizhs.top → 只承载登录/OAuth 回调,主功能 307 跳回主域
#
# 本配置只代理 bsm.aizhs.top 到 web server (Blue/Green),
# /api/* 路径不代理(子域 middleware 会 307 跳主域同名路径),
# 避免 API 在子域重复暴露。
#
# 与 nginx-blue-green.conf 配合使用:
#   - 主域配置在 nginx-blue-green.conf (含 /api/ 反代)
#   - 子域配置在本文件 (只 / 反代到 web)
#
# 蓝绿切换:与主域同步切换 blue_web ↔ green_web
# ============================================================

# ── 认证子域 bsm.aizhs.top (HTTPS) ──
server {
    listen 443 ssl http2;
    server_name bsm.aizhs.top;

    # SSL 证书与主域共用通配符证书或单独申请
    # 推荐:certbot --nginx -d bsm.aizhs.top -d aizhs.top -d *.aizhs.top
    ssl_certificate     /etc/nginx/ssl/aizhs.top.crt;
    ssl_certificate_key /etc/nginx/ssl/aizhs.top.key;

    # 复用主域 SSL 参数
    include /etc/nginx/conf.d/ssl-params.conf;

    # ── 安全响应头 (与主域一致) ──
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https: ws: wss:; media-src 'self' https: blob:; frame-ancestors 'self'; form-action 'self'; base-uri 'self'" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── gzip 压缩 ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/json application/xml
               application/rss+xml application/atom+xml application/manifest+json
               image/svg+xml font/woff font/woff2
               application/vnd.api+json;

    # ── 静态资源缓存 ──
    location /_next/static/ {
        proxy_pass http://blue_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    # 健康检查(供负载均衡器/监控用)
    location /nginx-health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # ── /api/* 不代理到子域 api ──
    # 子域 middleware 会把非白名单路径 307 跳主域同名路径,由主域 nginx 处理 /api/
    # 这里显式 deny,防止误代理
    location /api/ {
        return 307 https://aizhs.top$request_uri;
    }

    # ── 默认:所有路径代理到 web server ──
    # middleware 会自动处理:
    #   /sso/* /callback /auth/* → 放行(认证相关)
    #   其他路径 → 307 跳主域(避免子域承载主功能)
    location / {
        proxy_pass http://blue_web;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
    }
}
