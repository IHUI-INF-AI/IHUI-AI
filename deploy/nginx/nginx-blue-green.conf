# ============================================================
# IHUI-AI Blue-Green Deployment Nginx Configuration
# ============================================================
#
# Port Mapping:
#   Blue:  web=3000, api=8080
#   Green: web=3001, api=8081
#
# Default active environment: BLUE
#
# Switch to Green:
#   sed -i 's/blue_web/green_web/g; s/blue_api/green_api/g' nginx-blue-green.conf
#   nginx -t && nginx -s reload
#
# Switch back to Blue:
#   sed -i 's/green_web/blue_web/g; s/green_api/blue_api/g' nginx-blue-green.conf
#   nginx -t && nginx -s reload
#
# For GitHub Actions workflow integration, see README.md
#
# 微信支付回调(2026-07-18 证书激活):
#   - 商户号: 1714645682(吉林省爱智汇人工智能科技有限公司)
#   - 回调端点(必须公网可达,配置 SSL 后用 https://aizhs.top/...):
#       /api/payments/wechat/notify         — JSAPI/NATIVE 支付回调
#       /api/payments/wechat/notify/refund  — 退款回调
#       /api/payments/recurring/wechat-notify — 周期扣款签约/扣款回调
#       /api/payments/withdrawal/notify     — 提现回调
#   - WeChat Pay 回调使用 application/json 格式,Body 通常 5-15 KB,
#     SSL 必须有效(否则 WeChat 验签失败)
#   - 不要在 /api/payments/*/notify 上加 client certificate / IP 白名单 /
#     限流(WeChat 服务器 IP 段经常变动)
# ============================================================

# ── Blue upstream (passive health check via max_fails/fail_timeout) ──
upstream blue_web {
    server 127.0.0.1:3000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}
upstream blue_api {
    server 127.0.0.1:8080 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# ── Green upstream ──
upstream green_web {
    server 127.0.0.1:3001 max_fails=3 fail_timeout=30s;
    keepalive 32;
}
upstream green_api {
    server 127.0.0.1:8081 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ──
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── Main server (HTTPS) ──
server {
    listen 443 ssl http2;
    server_name aizhs.top www.aizhs.top;

    # SSL — Let's Encrypt 推荐 certbot --nginx -d aizhs.top -d www.aizhs.top
    # 自签名证书路径(部署时替换):
    ssl_certificate     /etc/nginx/ssl/aizhs.top.crt;
    ssl_certificate_key /etc/nginx/ssl/aizhs.top.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── 安全响应头 (OWASP Top 10 防护) ──
    # HSTS: 强制 HTTPS 2 年(含子域名),防止降级攻击
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    # X-Frame-Options: 禁止被任意站点 iframe 嵌入,防点击劫持
    add_header X-Frame-Options "SAMEORIGIN" always;
    # X-Content-Type-Options: 禁止 MIME 嗅探,防 XSSI
    add_header X-Content-Type-Options "nosniff" always;
    # Referrer-Policy: 仅同源时发送完整 referrer,防泄露 token
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP: 限制资源加载源,防 XSS/数据外泄
    # - default-src 'self': 默认只允许同源
    # - script-src 'self' 'unsafe-inline' 'unsafe-eval': 允许内联脚本(Next.js 必需)
    # - style-src 'self' 'unsafe-inline': 允许内联样式(Tailwind/CSS-in-JS 必需)
    # - img-src 'self' data: blob: https: : 允许图片(data/blob/任意 https)
    # - font-src 'self' data:: 允许字体
    # - connect-src 'self' https: ws: wss:: 允许 API/WebSocket(任意 https + ws)
    # - media-src 'self' https: blob:: 允许音视频
    # - frame-ancestors 'self': 等同 X-Frame-Options SAMEORIGIN
    # - form-action 'self': 表单只能提交到同源
    # - base-uri 'self': <base> 标签只能同源
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https: ws: wss:; media-src 'self' https: blob:; frame-ancestors 'self'; form-action 'self'; base-uri 'self'" always;
    # X-XSS-Protection: 旧版 IE/Edge 反射型 XSS 过滤(现代浏览器已由 CSP 接管,保留兼容)
    add_header X-XSS-Protection "1; mode=block" always;

    # ── gzip 压缩(减少传输体积 ~70%) ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/json application/xml
               application/rss+xml application/atom+xml application/manifest+json
               image/svg+xml font/woff font/woff2
               application/vnd.api+json;

    # ── 静态资源缓存(Next.js /_next/static/ 永久缓存) ──
    # Next.js 静态资源带 hash,可永久缓存
    location /_next/static/ {
        proxy_pass http://blue_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 1 年 immutable 缓存
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        # 注意: add_header 在 location 块会覆盖 server 块的安全头,需重新声明
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    # Nginx self health check (used by load balancer / monitoring)
    location /nginx-health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # API proxy — default: BLUE
    # To switch: change blue_api → green_api
    location /api/ {
        proxy_pass http://blue_api;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
    }

    # 微信支付回调专用 location(在 /api/ 之前匹配)
    # - 关闭请求体缓冲(回调体需要立即转发到 API 验签)
    # - 60s 读超时(WeChat 期望 API 在 5s 内响应 200/204,长读超时只是容错)
    # - 显式允许 application/json Content-Type
    # 路径匹配:/api/payments/wechat/notify、/api/payments/wechat/notify/refund、
    #          /api/payments/recurring/wechat-notify、/api/payments/withdrawal/notify
    location ~ ^/api/payments/(wechat|recurring|withdrawal)/.+/b(通知|webhook|notify).*$ {
        proxy_pass http://blue_api;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }

    # Web proxy — default: BLUE
    # To switch: change blue_web → green_web
    location / {
        proxy_pass http://blue_web;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
    }
}
