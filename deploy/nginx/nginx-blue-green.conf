# ============================================================
# IHUI-AI Blue-Green Deployment Nginx Configuration
# ============================================================
#
# Port Mapping:
#   Blue:  web=3000, api=8080
#   Green: web=3001, api=8081
#
# Default active environment: BLUE
#
# Switch to Green:
#   sed -i 's/blue_web/green_web/g; s/blue_api/green_api/g' nginx-blue-green.conf
#   nginx -t && nginx -s reload
#
# Switch back to Blue:
#   sed -i 's/green_web/blue_web/g; s/green_api/blue_api/g' nginx-blue-green.conf
#   nginx -t && nginx -s reload
#
# For GitHub Actions workflow integration, see README.md
# ============================================================

# ── Blue upstream (passive health check via max_fails/fail_timeout) ──
upstream blue_web {
    server 127.0.0.1:3000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}
upstream blue_api {
    server 127.0.0.1:8080 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# ── Green upstream ──
upstream green_web {
    server 127.0.0.1:3001 max_fails=3 fail_timeout=30s;
    keepalive 32;
}
upstream green_api {
    server 127.0.0.1:8081 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ──
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── Main server (HTTPS) ──
server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # SSL — replace with real certificate paths
    ssl_certificate     /etc/nginx/ssl/ihui.crt;
    ssl_certificate_key /etc/nginx/ssl/ihui.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Nginx self health check (used by load balancer / monitoring)
    location /nginx-health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # API proxy — default: BLUE
    # To switch: change blue_api → green_api
    location /api/ {
        proxy_pass http://blue_api;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
    }

    # Web proxy — default: BLUE
    # To switch: change blue_web → green_web
    location / {
        proxy_pass http://blue_web;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
    }
}
