# Prometheus 抓取配置(2026-07-22 立)
# 抓取目标:OTel Collector(8888)+ IHUI-AI api(3001)+ ai-service(8000)

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'ihui-observability'

scrape_configs:
  # OpenTelemetry Collector 自身指标(内部 telemetry)
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888']
        labels:
          service: 'otel-collector'

  # IHUI-AI API 服务(Fastify,主机网络)
  - job_name: 'ihui-api'
    static_configs:
      - targets: ['host.docker.internal:3001']
        labels:
          service: 'ihui-api'

  # IHUI-AI AI Service(FastAPI,主机网络)
  - job_name: 'ihui-ai-service'
    static_configs:
      - targets: ['host.docker.internal:8000']
        labels:
          service: 'ihui-ai-service'
