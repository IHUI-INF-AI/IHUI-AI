# IHUI-AI SaaS 托管平台 — 顶层编排
# 仅运行 Traefik 反向代理 + 证书管理,所有客户业务容器由 templates/customer/ 模板独立编排
# 用法:
#   cp .env.example .env && 编辑 .env
#   docker compose up -d
#   ./scripts/create-customer.sh demo
#   ./scripts/list-customers.sh
#   ./scripts/destroy-customer.sh demo

services:
  # Traefik v3 — 多租户 SNI 路由 + 通配符证书
  traefik:
    image: traefik:v3.1
    container_name: ihui-saas-traefik
    restart: unless-stopped
    command:
      # 启用 API + Dashboard(8080)
      - --api.dashboard=true
      - --api.insecure=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=ihui-saas-net
      # 动态配置文件目录
      - --providers.file.directory=/dynamic
      - --providers.file.watch=true
      # entryPoints
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entryPoint.to=websecure
      - --entrypoints.web.http.redirections.entryPoint.scheme=https
      - --entrypoints.websecure.address=:443
      # ACME 通配符证书(DNS-01 挑战)
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.dnschallenge=true
      - --certificatesresolvers.letsencrypt.acme.dnschallenge.provider=${DNS_PROVIDER}
      - --certificatesresolvers.letsencrypt.acme.dnschallenge.delaybeforecheck=30
      # staging/production 切换
      - --certificatesresolvers.letsencrypt.acme.caserver=https://acme-${LETSENCRYPT_ENV:-staging}.letsencrypt.org/directory
      # 日志
      - --accesslog=true
      - --accesslog.filters.statuscodes=400-599
      - --log.level=INFO
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/dynamic:/dynamic:ro
      - saas_letsencrypt:/letsencrypt
    networks:
      - ihui-saas-net
    healthcheck:
      test: ['CMD', 'traefik', 'healthcheck']
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      # Traefik 自身 Dashboard(走独立子域名 admin)
      - traefik.enable=true
      - traefik.http.routers.traefik-dashboard.rule=Host(`${ADMIN_DOMAIN}`)
      - traefik.http.routers.traefik-dashboard.service=api@internal
      - traefik.http.routers.traefik-dashboard.entrypoints=websecure
      - traefik.http.routers.traefik-dashboard.tls=true
      - traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt

  # IHUI-AI SaaS Admin API — 客户生命周期管理(端口 8081 仅 localhost 暴露)
  admin-api:
    build:
      context: ./admin-api
      dockerfile: Dockerfile
    image: ihui-saas-admin-api:latest
    container_name: ihui-saas-admin-api
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - HOST=127.0.0.1
      - PORT=8081
      - LOG_LEVEL=${ADMIN_API_LOG_LEVEL:-info}
      - ADMIN_API_KEY=${ADMIN_API_KEY:-}
      - CORS_ORIGIN=${ADMIN_CORS_ORIGIN:-http://localhost:3000}
    ports:
      # 仅绑 localhost,不暴露公网
      - '127.0.0.1:8081:8081'
    volumes:
      # Docker socket(需要 RW 以管理客户容器)
      - /var/run/docker.sock:/var/run/docker.sock
      # 客户管理脚本 + 客户数据(只读,运行时生成)
      - ./scripts:/app/scripts:ro
      - ./customers:/app/customers:rw
      - ./backups:/app/backups:rw
      - ./.credentials:/app/.credentials:ro
      - ./templates:/app/templates:ro
    networks:
      - ihui-saas-net
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://127.0.0.1:8081/admin/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      traefik:
        condition: service_healthy

networks:
  ihui-saas-net:
    name: ihui-saas-net
    driver: bridge

volumes:
  saas_letsencrypt:
    name: ihui-saas-letsencrypt
