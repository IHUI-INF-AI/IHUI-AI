# Prometheus 全局配置(P1-2.3)
# 抓取目标:
#   - cadvisor(端口 8080): 所有 Docker 容器运行时指标
#   - admin-api(端口 8830): 业务级指标(预留)
#   - traefik(端口 8082): HTTP 路由指标(预留)

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  # 外部标签(用于在 Grafana 区分多集群)
  external_labels:
    cluster: ihui-saas

scrape_configs:
  # ==================== cAdvisor — 容器运行时指标 ====================
  # CPU/内存/磁盘/网络都来自这里
  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          source: docker

  # ==================== admin-api — 业务指标(预留)====================
  - job_name: admin-api
    static_configs:
      - targets: ['admin-api:8830']
    metrics_path: /metrics
    # admin-api 当前未暴露 /metrics,启用后会话式

  # ==================== Prometheus 自身 ====================
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:8815']
