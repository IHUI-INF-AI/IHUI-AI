apiVersion: 1

# Grafana 数据源 provisioning — IHUI-AI
# Prometheus（指标默认数据源）+ Jaeger（分布式追踪）

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: '15s'

  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
    editable: true
    jsonData:
      tracesToMetrics:
        datasourceUid: prometheus
        spanStartTimeShift: '1h'
        spanEndTimeShift: '-1h'
        tags:
          - name: 'service'
            value: 'service.name'
