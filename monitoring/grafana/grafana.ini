[server]
http_port = 3000

[security]
admin_user = admin
admin_password = ihui-admin

[auth.anonymous]
enabled = true
org_role = Viewer

[users]
allow_sign_up = false
auto_assign_org = true

[dashboards]
default_home_dashboard_path = /var/lib/grafana/dashboards/ihui-ai-overview.json

[metrics]
enabled = true