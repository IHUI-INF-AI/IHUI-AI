# 告警抑制规则（cascade_inhibit）— Alertmanager 噪音抑制单一源
# 当上游根因告警触发时，自动抑制下游衍生告警，避免告警风暴
# 说明：本文件为唯一 source-of-truth（2026-07-22 整合：旧根目录 noise-rules.yml 已合并至此）
# 用法：将 inhibit_rules 段合并到 alertmanager.yml 的 inhibit_rules 段

inhibit_rules:
  # ===== PostgreSQL 级联抑制 =====
  # PG 实例宕机时，抑制该实例的所有衍生告警
  - source_match: { alertname: 'PGInstanceDown' }
    target_match: { alertname: 'PGConnectionsHigh' }
    equal: ['instance', 'severity']

  - source_match: { alertname: 'PGInstanceDown' }
    target_match: { alertname: 'PGReplicationLagHigh' }
    equal: ['instance', 'severity']

  - source_match: { alertname: 'PGInstanceDown' }
    target_match: { alertname: 'PGRollbackHigh' }
    equal: ['instance', 'severity']

  - source_match: { alertname: 'PGInstanceDown' }
    target_match: { alertname: 'PGBloatHigh' }
    equal: ['instance', 'severity']

  # 连接耗尽时，抑制连接数高告警（根因已覆盖）
  - source_match: { alertname: 'PGConnectionsExhausted' }
    target_match: { alertname: 'PGConnectionsHigh' }
    equal: ['instance', 'severity']

  # 死锁检测时，抑制回滚率告警（死锁是回滚的根因）
  - source_match: { alertname: 'PGDeadlockDetected' }
    target_match: { alertname: 'PGRollbackHigh' }
    equal: ['instance', 'severity']

  # 长事务 Critical 级别时，抑制 Warning 级别
  - source_match: { alertname: 'PGLongTransactionCritical' }
    target_match: { alertname: 'PGLongTransaction' }
    equal: ['instance', 'severity']

  # 缓存命中率低时，抑制连接数高告警（缓存问题是根因）
  - source_match: { alertname: 'PGCacheHitLow' }
    target_match: { alertname: 'PGConnectionsHigh' }
    equal: ['instance', 'severity']

  # ===== Redis 级联抑制 =====
  # Redis 实例不可用时，抑制其衍生告警
  - source_match: { alertname: 'RedisInstanceDown' }
    target_match: { alertname: 'RedisMemoryHigh' }
    equal: ['instance', 'severity']

  - source_match: { alertname: 'RedisInstanceDown' }
    target_match: { alertname: 'RedisHitRateLow' }
    equal: ['instance', 'severity']

  # ===== 节点级联抑制 =====
  # 节点宕机时，抑制该节点上的应用层告警（节点是根因）
  - source_match: { alertname: 'NodeDown' }
    target_match: { alertname: 'ApiInstanceDown' }
    equal: ['instance']

  # ===== API 级联抑制 =====
  # API 实例不可用时，抑制其下游延迟/错误率告警
  - source_match: { alertname: 'ApiInstanceDown' }
    target_match: { alertname: 'ApiLatencyHigh' }
    equal: ['instance', 'severity']

  - source_match: { alertname: 'ApiInstanceDown' }
    target_match: { alertname: 'ApiErrorRateHigh' }
    equal: ['instance', 'severity']
