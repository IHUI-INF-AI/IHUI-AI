  <path d="M12 22C12 22 5 18 5 13C5 11 6.5 9 8 8C9.5 7 11 6.5 12 6.5C13 6.5 14.5 7 16 8C17.5 9 19 11 19 13C19 18 12 22 12 22Z" fill="#ff4500"/>
  <!-- 中层火焰（橙黄色） -->
  <path d="M12 20.5C12 20.5 6.5 17.5 6.5 14C6.5 12.5 7.5 11 8.5 10C9.5 9 10.5 8.5 11.5 8.5C12.5 8.5 13.5 9 14.5 10C15.5 11 16 12.5 16 14C16 17.5 12 20.5 12 20.5Z" fill="#ff6b35"/>
  <!-- 内层火焰（黄色） -->
  <path d="M12 19C12 19 8.5 16.5 8.5 14.5C8.5 13.5 9 12.5 9.5 12C10 11.5 10.5 11 11 11C11.5 11 12 11.5 12.5 12C13 12.5 13.5 13.5 13.5 14.5C13.5 16.5 12 19 12 19Z" fill="#ff8c42"/>
