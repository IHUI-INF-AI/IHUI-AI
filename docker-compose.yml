# IHUI-AI Docker Compose 编排(新架构: Fastify + Next.js + FastAPI AI 服务)
# 旧架构(Python FastAPI server/ + Vue client/)已弃用,不再编排
services:
  # 新后端 API(Fastify 5 + Drizzle ORM)
  api:
    build:
      context: .
      dockerfile: Dockerfile.api-new
    image: ihui-api:latest
    container_name: ihui-api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=8080
      - HOST=0.0.0.0
      - LOG_LEVEL=info
      - CORS_ORIGIN=http://${DOMAIN:-localhost}
      - DATABASE_URL=postgres://${DB_USER:-ihui}:${DB_PASSWORD}@db:5432/${DB_NAME:-ihui}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/0
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=7d
      - CREDENTIALS_ENCRYPTION_KEY=${CREDENTIALS_ENCRYPTION_KEY}
      - AI_SERVICE_URL=http://ai-service:8000
      - AI_CALLBACK_SECRET=${AI_CALLBACK_SECRET:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@ihui.ai}
      - SMTP_ENABLED=${SMTP_ENABLED:-false}
      # BullMQ Worker 开关(多实例部署可设为 false 仅做生产者)
      - ENABLE_WORKER=${ENABLE_WORKER:-true}
      # OpenTelemetry 分布式追踪(OTLP 导出到 otel-collector)
      - OTEL_ENABLED=${OTEL_ENABLED:-false}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=ihui-api
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - ihui-net
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:8080/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # BullMQ Worker 独立进程(消费者)
  # 生产部署最佳实践:API 进程仅生产(ENABLE_WORKER=false),Worker 进程独立消费
  # 避免单进程内 HTTP 请求与异步任务互相阻塞,支持独立扩缩
  worker:
    build:
      context: .
      dockerfile: Dockerfile.api-new
    image: ihui-api:latest
    container_name: ihui-worker
    restart: unless-stopped
    command: ['node', 'dist/worker-entry.js']
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
      - DATABASE_URL=postgres://${DB_USER:-ihui}:${DB_PASSWORD}@db:5432/${DB_NAME:-ihui}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/0
      - JWT_SECRET=${JWT_SECRET}
      - CREDENTIALS_ENCRYPTION_KEY=${CREDENTIALS_ENCRYPTION_KEY}
      - AI_SERVICE_URL=http://ai-service:8000
      - AI_CALLBACK_SECRET=${AI_CALLBACK_SECRET:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@ihui.ai}
      - SMTP_ENABLED=${SMTP_ENABLED:-false}
      - OTEL_ENABLED=${OTEL_ENABLED:-false}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=ihui-worker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - ihui-net
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:8081/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # 新前端(Next.js 15 standalone)
  web:
    build:
      context: .
      dockerfile: Dockerfile.web-new
    image: ihui-web:latest
    container_name: ihui-web
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - API_URL=http://api:8080
      - AI_SERVICE_URL=http://ai-service:8000
      - NEXT_TELEMETRY_DISABLED=1
    ports:
      - '${WEB_PORT:-3000}:3000'
    depends_on:
      api:
        condition: service_healthy
    networks:
      - ihui-net

  # AI 服务(FastAPI + LangGraph + LiteLLM + MCP)
  ai-service:
    build:
      context: ./apps/ai-service
      dockerfile: Dockerfile
    image: ihui-ai-service:latest
    container_name: ihui-ai-service
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=8000
      - HOST=0.0.0.0
      - LOG_LEVEL=info
      - CORS_ORIGIN=http://${DOMAIN:-localhost}
      - DATABASE_URL=postgres://${DB_USER:-ihui}:${DB_PASSWORD}@db:5432/${DB_NAME:-ihui}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - AGNES_API_KEY=${AGNES_API_KEY:-}
      - AGNES_API_BASE=${AGNES_API_BASE:-https://apihub.agnes-ai.com/v1}
      - STEPFUN_API_KEY=${STEPFUN_API_KEY:-}
      - STEPFUN_API_BASE=${STEPFUN_API_BASE:-https://api.stepfun.com/step_plan/v1}
      - LITELLM_MODEL=${LITELLM_MODEL:-stepfun/step-3.7-flash}
      - API_SERVICE_URL=http://api:8080
      - AI_CALLBACK_SECRET=${AI_CALLBACK_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ihui-net
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:8000/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # PostgreSQL 数据库
  db:
    image: postgres:15-alpine
    container_name: ihui-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-ihui}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-ihui}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - ihui-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-ihui}']
      interval: 10s
      timeout: 5s
      retries: 5

  # 数据库迁移(一次性服务:执行 drizzle-kit migrate 后退出)
  # api 服务依赖 migrate 成功完成(service_completed_successfully)才启动
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    image: ihui-migrate:latest
    container_name: ihui-migrate
    environment:
      - DATABASE_URL=postgres://${DB_USER:-ihui}:${DB_PASSWORD}@db:5432/${DB_NAME:-ihui}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ihui-net
    restart: 'no'
    # 迁移失败时 docker compose up 会因依赖条件不满足而停止,避免 api 启动到空库

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: ihui-redis
    restart: unless-stopped
    command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    networks:
      - ihui-net
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # Jaeger(分布式追踪 UI + OTLP 收集器，接收 otel-collector 导出的追踪)
  jaeger:
    image: jaegertracing/all-in-one:1.62
    container_name: ihui-jaeger
    restart: unless-stopped
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - '${JAEGER_UI_PORT:-16686}:16686'
    networks:
      - ihui-net
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:14269/']
      interval: 30s
      timeout: 5s
      retries: 3

  # OpenTelemetry Collector(接收 OTLP 追踪/指标，导出到 Jaeger + Prometheus exporter)
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: ihui-otel-collector
    restart: unless-stopped
    volumes:
      - ./monitoring/otel-collector/config.yaml:/etc/otelcol/config.yaml
    command: ['--config=/etc/otelcol/config.yaml']
    ports:
      - '${OTEL_COLLECTOR_PORT:-4318}:4318'
    networks:
      - ihui-net
    depends_on:
      jaeger:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:13133/']
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M

  # Prometheus 监控(抓取 api + ai-service 的 /metrics)
  prometheus:
    image: prom/prometheus:latest
    container_name: ihui-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
      - prometheusdata:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - '${PROMETHEUS_PORT:-9091}:9090'
    networks:
      - ihui-net
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:9090/-/healthy']
      interval: 30s
      timeout: 5s
      retries: 3

  # Grafana 仪表盘(可视化监控数据)
  grafana:
    image: grafana/grafana:latest
    container_name: ihui-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    volumes:
      - ./monitoring/grafana/grafana.ini:/etc/grafana/grafana.ini
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafanadata:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-change-me-grafana-password}
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - '${GRAFANA_PORT:-3001}:3000'
    networks:
      - ihui-net
    healthcheck:
      test: ['CMD-SHELL', 'wget --spider -q http://localhost:3000/api/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3

  # Node Exporter(主机指标:CPU/内存/磁盘/网络)
  node-exporter:
    image: prom/node-exporter:latest
    container_name: ihui-node-exporter
    restart: unless-stopped
    command:
      - '--path.rootfs=/host'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro
    ports:
      - '${NODE_EXPORTER_PORT:-9100}:9100'
    networks:
      - ihui-net

  # Loki(日志聚合后端,接收 Promtail 推送的日志)
  # 配置文件挂载到 /etc/loki/local-config.yaml(沿用镜像默认命令路径)
  loki:
    image: grafana/loki:2.9.0
    container_name: ihui-loki
    restart: unless-stopped
    command:
      - '-config.file=/etc/loki/local-config.yaml'
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/loki-data
    ports:
      - '${LOKI_PORT:-3100}:3100'
    networks:
      - ihui-net
    healthcheck:
      test: ['CMD-SHELL', 'wget --spider -q http://localhost:3100/ready || exit 1']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M

  # Promtail(日志采集器,抓取 Docker 容器 + Nginx + API 应用日志,推送到 Loki)
  # 通过 docker_sd_configs 自动发现带 logging=promtail 标签的容器
  promtail:
    image: grafana/promtail:2.9.0
    container_name: ihui-promtail
    restart: unless-stopped
    command:
      - '-config.file=/etc/promtail/promtail-config.yml'
    volumes:
      # 配置文件
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml
      # Docker 容器日志(只读)
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      # 宿主机 /var/log(只读,用于采集 Nginx 等系统日志)
      - /var/log:/var/log:ro
      # Docker socket(用于 docker_sd_configs 自动发现容器)
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # API 应用日志目录(只读,需要在 docker-compose 服务中通过 volumes 共享 ./apps/api/logs)
      - ./apps/api/logs:/apps/api/logs:ro
      # Promtail 读取位置持久化(重启后不重复读取)
      - promtail-positions:/tmp
    depends_on:
      loki:
        condition: service_started
    networks:
      - ihui-net
    healthcheck:
      test: ['CMD-SHELL', 'wget --spider -q http://localhost:9080/ready || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  ihui-net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  prometheusdata:
  grafanadata:
  loki-data: # Loki 数据持久化(chunks + index + compactor)
  promtail-positions: # Promtail 读取位置持久化(positions.yaml)
