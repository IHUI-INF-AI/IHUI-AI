<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 · ZHS Platform</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/element-plus"></script>
  <script src="https://unpkg.com/@element-plus/icons-vue"></script>
  <style>
    html, body { height: 100%; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      width: 400px; padding: 40px; background: #fff;
      border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,.18);
    }
    .login-card h1 { margin: 0 0 8px; font-size: 24px; text-align: center; color: #303133; }
    .login-card .sub { text-align: center; color: #909399; margin-bottom: 28px; font-size: 13px; }
    .login-form .el-form-item { margin-bottom: 18px; }
    .login-tip { color: #909399; font-size: 12px; text-align: center; margin-top: 16px; }
    .login-tip code { background: #f0f2f5; padding: 2px 6px; border-radius: 3px; color: #d63384; }
  </style>
</head>
<body>
  <div id="app">
    <div class="login-card">
      <h1>ZHS Platform</h1>
      <p class="sub">管理后台管理系统 · 统一身份认证</p>
      <el-form :model="form" :rules="rules" ref="formRef" class="login-form" @keyup.enter="onLogin">
        <el-form-item prop="username">
          <el-input v-model="form.username" placeholder="账号" prefix-icon="User" size="large"/>
        </el-form-item>
        <el-form-item prop="password">
          <el-input v-model="form.password" type="password" placeholder="密码" prefix-icon="Lock" size="large" show-password/>
        </el-form-item>
        <el-form-item>
          <el-checkbox v-model="form.remember">记住我 (7 天免登录)</el-checkbox>
        </el-form-item>
        <el-form-item>
          <el-button type="primary" size="large" style="width:100%" :loading="loading" @click="onLogin">登录</el-button>
        </el-form-item>
        <el-form-item>
          <el-button size="large" style="width:100%" @click="onGoogleLogin">
            <span style="display:inline-flex;align-items:center;gap:6px;">
              <svg width="16" height="16" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3l5.7-5.7C34.5 6.5 29.5 4.5 24 4.5 13.2 4.5 4.5 13.2 4.5 24S13.2 43.5 24 43.5 43.5 34.8 43.5 24c0-1.2-.1-2.3-.3-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c3.1 0 5.9 1.2 8 3l5.7-5.7C34.5 6.5 29.5 4.5 24 4.5c-7.4 0-13.8 4.2-17 10.2z"/><path fill="#4CAF50" d="M24 43.5c5.4 0 10.2-2 13.9-5.3l-6.4-5.4C29.4 34.5 26.8 35.5 24 35.5c-5.2 0-9.6-3.3-11.3-8L6 32.5c3.1 6 9.4 10 18 10z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.2 5.7l6.4 5.4c-.4.4 6.5-4.7 6.5-15.6 0-1.2-.1-2.3-.3-3.5z"/></svg>
              使用 Google 登录
            </span>
          </el-button>
        </el-form-item>
      </el-form>
      <p class="login-tip">演示账号: <code>admin</code> / <code>admin123</code></p>
    </div>
  </div>

  <script>
    const { createApp, ref, reactive } = Vue;
    const API = location.origin + '/api/v1';

    const app = createApp({
      setup() {
        const formRef = ref(null);
        const loading = ref(false);
        const form = reactive({ username: '', password: '', remember: false });
        const rules = {
          username: [{ required: true, message: '请输入账号', trigger: 'blur' }],
          password: [{ required: true, message: '请输入密码', trigger: 'blur' }, { min: 6, message: '至少 6 位', trigger: 'blur' }],
        };

        const onLogin = async () => {
          await formRef.value.validate();
          loading.value = true;
          try {
            // 真实后端登录 — username + password -> JWT
            const qs = new URLSearchParams({ username: form.username, password: form.password });
            const r = await fetch(API + '/login/username?' + qs, { method: 'POST', credentials: 'include' });
            const data = await r.json();
            if (data.code === 0 && data.data && data.data.access_token) {
              localStorage.setItem('zhs_token', data.data.access_token);
              localStorage.setItem('zhs_user', JSON.stringify({
                userId: data.data.user_id,
                userName: data.data.user_name,
                nickName: data.data.nick_name,
                roles: data.data.roles,
                avatar: data.data.avatar,
              }));
              ElementPlus.ElMessage.success('登录成功, 欢迎 ' + (data.data.nick_name || data.data.user_name));
              setTimeout(() => location.href = '/static/admin/index.html', 500);
            } else {
              ElementPlus.ElMessage.error(data.message || '登录失败');
            }
          } catch (e) {
            ElementPlus.ElMessage.error('网络错误: ' + e.message);
          } finally {
            loading.value = false;
          }
        };

        const onGoogleLogin = () => {
          // 跳到后端 Google OAuth 端点 (Java 原生路径)
          const clientId = (window.GOOGLE_APP_ID) || '';
          const redirectUri = encodeURIComponent(location.origin + '/static/admin/index.html');
          const scope = encodeURIComponent('openid email profile');
          const url = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${clientId}&redirect_uri=${redirectUri}&response_type=code&scope=${scope}`;
          if (clientId) {
            location.href = url;
          } else {
            ElementPlus.ElMessage.warning('Google OAuth 客户端未配置, 请用账号密码登录');
          }
        };

        return { form, rules, formRef, loading, onLogin, onGoogleLogin };
      },
    });
    app.use(ElementPlus);
    for (const [name, comp] of Object.entries(ElementPlusIconsVue)) {
      app.component(name, comp);
    }
    app.mount('#app');
  </script>
</body>
</html>
