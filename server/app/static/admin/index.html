<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 · ZHS Platform</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.prod.js"></script>
  <script src="https://unpkg.com/element-plus"></script>
  <script src="https://unpkg.com/@element-plus/icons-vue"></script>
  <style>
    /* 全局唯一容器样式 */
    html, body, #app { height: 100%; margin: 0; padding: 0; }
    body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; }
    .admin-shell { display: flex; height: 100%; }
    .admin-aside { width: 220px; background: #001529; color: #fff; overflow: auto; }
    .admin-aside h2 { padding: 16px; margin: 0; font-size: 18px; text-align: center; }
    .admin-main { flex: 1; padding: 16px; background: #f0f2f5; overflow: auto; }
    .admin-card { background: #fff; padding: 16px; border-radius: 4px; }
    .admin-toolbar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  </style>
</head>
<body>
  <div id="app">
    <router-view></router-view>
  </div>

  <script>
    const { createApp, ref, computed } = Vue;
    const API = location.origin + '/api/v1';

    // 通用 fetch — 自动注入 JWT Authorization header
    function _authHeaders() {
      const t = localStorage.getItem('zhs_token') || '';
      return t ? { 'Authorization': 'Bearer ' + t } : {};
    }
    function _handle401(r) {
      if (r.status === 401) {
        localStorage.removeItem('zhs_token');
        localStorage.removeItem('zhs_user');
        location.href = '/static/admin/login.html';
        return true;
      }
      return false;
    }
    async function apiGet(path, params) {
      const qs = params ? '?' + new URLSearchParams(params).toString() : '';
      const r = await fetch(API + path + qs, { credentials: 'include', headers: _authHeaders() });
      if (_handle401(r)) return { code: 401, message: '未登录' };
      return r.json();
    }
    async function apiPost(path, body) {
      const r = await fetch(API + path, {
        method: 'POST', credentials: 'include',
        headers: Object.assign({ 'Content-Type': 'application/json' }, _authHeaders()),
        body: JSON.stringify(body || {}),
      });
      if (_handle401(r)) return { code: 401, message: '未登录' };
      return r.json();
    }
    async function apiPut(path, body) {
      const r = await fetch(API + path, {
        method: 'PUT', credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body || {}),
      });
      return r.json();
    }
    async function apiDelete(path) {
      const r = await fetch(API + path, { method: 'DELETE', credentials: 'include' });
      return r.json();
    }

    // 9 个管理页面 - 共享 list 组件结构
    function makePage(opts) {
      return {
        data() {
          return {
            list: [], total: 0, page: 1, size: 20,
            loading: false, dialog: false, form: {}, search: {},
          };
        },
        template: `
          <div class="admin-card">
            <h3>${opts.title}</h3>
            <div class="admin-toolbar">
              <el-input v-model="search.keyword" placeholder="${opts.searchPh || '搜索'}" style="width:200px" clearable @clear="reload"/>
              <el-button type="primary" @click="reload">查询</el-button>
              <el-button type="success" @click="openAdd">新增</el-button>
              <el-button @click="reload">刷新</el-button>
            </div>
            <el-table :data="list" v-loading="loading" border stripe>
              ${opts.columns}
              <el-table-column label="操作" width="200" fixed="right">
                <template #default="{ row }">
                  <el-button size="small" @click="openEdit(row)">编辑</el-button>
                  <el-button size="small" type="danger" @click="del(row)">删除</el-button>
                </template>
              </el-table-column>
            </el-table>
            <el-pagination style="margin-top:12px"
              v-model:current-page="page" v-model:page-size="size"
              :total="total" :page-sizes="[10,20,50]"
              layout="total,sizes,prev,pager,next" @current-change="reload" @size-change="reload"/>
            <el-dialog v-model="dialog" :title="form.id?'编辑':'新增'" width="600px">
              ${opts.formFields}
              <template #footer>
                <el-button @click="dialog=false">取消</el-button>
                <el-button type="primary" @click="save">保存</el-button>
              </template>
            </el-dialog>
          </div>
        `,
        methods: {
          async reload() {
            this.loading = true;
            const r = await apiGet(opts.listPath, { page: this.page, size: this.size, ...this.search });
            this.list = (r.data && r.data.list) || (Array.isArray(r.data) ? r.data : []);
            this.total = (r.data && r.data.total) || this.list.length;
            this.loading = false;
          },
          openAdd() { this.form = {}; this.dialog = true; },
          openEdit(row) { this.form = { ...row }; this.dialog = true; },
          async save() {
            const id = this.form.userId || this.form.roleId || this.form.menuId || this.form.deptId
                    || this.form.postId || this.form.configId || this.form.dictId || this.form.dictCode
                    || this.form.noticeId || this.form.jobId || this.form.infoId;
            if (id) {
              await apiPut(opts.updatePath.replace('{id}', id), this.form);
            } else {
              await apiPost(opts.addPath, this.form);
            }
            this.dialog = false;
            this.reload();
          },
          async del(row) {
            await ElementPlus.ElMessageBox.confirm('确认删除?', '提示', { type: 'warning' });
            const id = row.userId || row.roleId || row.menuId || row.deptId || row.postId
                    || row.configId || row.dictId || row.dictCode || row.noticeId || row.jobId || row.infoId;
            await apiDelete(opts.delPath + '/' + id);
            this.reload();
          },
        },
        mounted() { this.reload(); },
      };
    }

    // 用户管理
    const UserPage = makePage({
      title: '用户管理', listPath: '/user/list', addPath: '/user', updatePath: '/user/{id}', delPath: '/user',
      searchPh: '用户名',
      columns: `
        <el-table-column prop="userId" label="ID" width="80"/>
        <el-table-column prop="userName" label="用户名"/>
        <el-table-column prop="nickName" label="昵称"/>
        <el-table-column prop="email" label="邮箱"/>
        <el-table-column prop="phone" label="电话" width="120"/>
        <el-table-column prop="status" label="状态" width="80"/>
      `,
      formFields: `
        <el-form label-width="80px">
          <el-form-item label="用户名"><el-input v-model="form.userName"/></el-form-item>
          <el-form-item label="昵称"><el-input v-model="form.nickName"/></el-form-item>
          <el-form-item label="密码"><el-input v-model="form.password" type="password"/></el-form-item>
          <el-form-item label="邮箱"><el-input v-model="form.email"/></el-form-item>
          <el-form-item label="电话"><el-input v-model="form.phone"/></el-form-item>
        </el-form>
      `,
    });

    // 角色管理
    const RolePage = makePage({
      title: '角色管理', listPath: '/role/list', addPath: '/role', updatePath: '/role/{id}', delPath: '/role',
      columns: `
        <el-table-column prop="roleId" label="ID" width="80"/>
        <el-table-column prop="roleName" label="角色名"/>
        <el-table-column prop="roleKey" label="权限字符"/>
        <el-table-column prop="roleSort" label="排序" width="80"/>
        <el-table-column prop="status" label="状态" width="80"/>
      `,
      formFields: `
        <el-form label-width="80px">
          <el-form-item label="角色名"><el-input v-model="form.roleName"/></el-form-item>
          <el-form-item label="权限字符"><el-input v-model="form.roleKey"/></el-form-item>
          <el-form-item label="排序"><el-input-number v-model="form.roleSort" :min="0"/></el-form-item>
        </el-form>
      `,
    });

    // 菜单管理
    const MenuPage = makePage({
      title: '菜单管理', listPath: '/menu/list', addPath: '/menu', updatePath: '/menu/{id}', delPath: '/menu',
      columns: `
        <el-table-column prop="menuId" label="ID" width="80"/>
        <el-table-column prop="menuName" label="菜单名"/>
        <el-table-column prop="path" label="路由"/>
        <el-table-column prop="menuType" label="类型" width="80"/>
        <el-table-column prop="orderNum" label="排序" width="80"/>
      `,
      formFields: `
        <el-form label-width="80px">
          <el-form-item label="菜单名"><el-input v-model="form.menuName"/></el-form-item>
          <el-form-item label="路由"><el-input v-model="form.path"/></el-form-item>
          <el-form-item label="类型"><el-select v-model="form.menuType"><el-option label="目录" value="M"/><el-option label="菜单" value="C"/><el-option label="按钮" value="F"/></el-select></el-form-item>
        </el-form>
      `,
    });

    // 部门管理
    const DeptPage = makePage({
      title: '部门管理', listPath: '/dept/list', addPath: '/dept', updatePath: '/dept/{id}', delPath: '/dept',
      columns: `
        <el-table-column prop="deptId" label="ID" width="80"/>
        <el-table-column prop="deptName" label="部门名"/>
        <el-table-column prop="parentId" label="父ID" width="80"/>
        <el-table-column prop="orderNum" label="排序" width="80"/>
        <el-table-column prop="leader" label="负责人"/>
      `,
      formFields: `
        <el-form label-width="80px">
          <el-form-item label="部门名"><el-input v-model="form.deptName"/></el-form-item>
          <el-form-item label="父ID"><el-input-number v-model="form.parentId" :min="0"/></el-form-item>
          <el-form-item label="负责人"><el-input v-model="form.leader"/></el-form-item>
        </el-form>
      `,
    });

    // 岗位管理
    const PostPage = makePage({
      title: '岗位管理', listPath: '/post/list', addPath: '/post', updatePath: '/post/{id}', delPath: '/post',
      columns: `
        <el-table-column prop="postId" label="ID" width="80"/>
        <el-table-column prop="postCode" label="编码"/>
        <el-table-column prop="postName" label="岗位名"/>
        <el-table-column prop="postSort" label="排序" width="80"/>
      `,
      formFields: `
        <el-form label-width="80px">
          <el-form-item label="编码"><el-input v-model="form.postCode"/></el-form-item>
          <el-form-item label="岗位名"><el-input v-model="form.postName"/></el-form-item>
        </el-form>
      `,
    });

    // 参数管理
    const ConfigPage = makePage({
      title: '参数管理', listPath: '/config/list', addPath: '/config', updatePath: '/config/{id}', delPath: '/config',
      columns: `
        <el-table-column prop="configId" label="ID" width="80"/>
        <el-table-column prop="configName" label="参数名"/>
        <el-table-column prop="configKey" label="Key"/>
        <el-table-column prop="configValue" label="Value"/>
      `,
      formFields: `
        <el-form label-width="80px">
          <el-form-item label="参数名"><el-input v-model="form.configName"/></el-form-item>
          <el-form-item label="Key"><el-input v-model="form.configKey"/></el-form-item>
          <el-form-item label="Value"><el-input v-model="form.configValue"/></el-form-item>
        </el-form>
      `,
    });

    // 字典管理
    const DictPage = makePage({
      title: '字典类型', listPath: '/dict/type/list', addPath: '/dict/type', updatePath: '/dict/type/{id}', delPath: '/dict/type',
      columns: `
        <el-table-column prop="dictId" label="ID" width="80"/>
        <el-table-column prop="dictName" label="字典名"/>
        <el-table-column prop="dictType" label="字典类型"/>
        <el-table-column prop="status" label="状态" width="80"/>
      `,
      formFields: `
        <el-form label-width="80px">
          <el-form-item label="字典名"><el-input v-model="form.dictName"/></el-form-item>
          <el-form-item label="字典类型"><el-input v-model="form.dictType"/></el-form-item>
        </el-form>
      `,
    });

    // 登录日志 (只读)
    const LoginInfoPage = makePage({
      title: '登录日志', listPath: '/logininfor/list', addPath: '/logininfor', updatePath: '/logininfor/{id}', delPath: '/logininfor',
      columns: `
        <el-table-column prop="infoId" label="ID" width="80"/>
        <el-table-column prop="userName" label="用户名"/>
        <el-table-column prop="ipaddr" label="IP"/>
        <el-table-column prop="status" label="状态" width="80"/>
        <el-table-column prop="loginTime" label="时间"/>
      `,
      formFields: `<div>日志为只读</div>`,
    });

    // 通知公告
    const NoticePage = makePage({
      title: '通知公告', listPath: '/notice/list', addPath: '/notice', updatePath: '/notice/{id}', delPath: '/notice',
      columns: `
        <el-table-column prop="noticeId" label="ID" width="80"/>
        <el-table-column prop="noticeTitle" label="标题"/>
        <el-table-column prop="noticeType" label="类型" width="80"/>
        <el-table-column prop="status" label="状态" width="80"/>
      `,
      formFields: `
        <el-form label-width="80px">
          <el-form-item label="标题"><el-input v-model="form.noticeTitle"/></el-form-item>
          <el-form-item label="类型"><el-select v-model="form.noticeType"><el-option label="通知" value="1"/><el-option label="公告" value="2"/></el-select></el-form-item>
          <el-form-item label="内容"><el-input v-model="form.noticeContent" type="textarea" :rows="4"/></el-form-item>
        </el-form>
      `,
    });

    // 定时任务
    const JobPage = makePage({
      title: '定时任务', listPath: '/job/list', addPath: '/job', updatePath: '/job/{id}', delPath: '/job',
      columns: `
        <el-table-column prop="jobId" label="ID" width="80"/>
        <el-table-column prop="jobName" label="任务名"/>
        <el-table-column prop="invokeTarget" label="调用目标"/>
        <el-table-column prop="cronExpression" label="Cron"/>
        <el-table-column prop="status" label="状态" width="80"/>
      `,
      formFields: `
        <el-form label-width="80px">
          <el-form-item label="任务名"><el-input v-model="form.jobName"/></el-form-item>
          <el-form-item label="调用目标"><el-input v-model="form.invokeTarget"/></el-form-item>
          <el-form-item label="Cron"><el-input v-model="form.cronExpression"/></el-form-item>
        </el-form>
      `,
    });

    // ---------------------------------------------------------------------------
    // Dashboard 首页
    // ---------------------------------------------------------------------------
    const Dashboard = {
      template: `
        <div class="admin-card">
          <h3>欢迎回来, {{ user.nickName || user.userName || 'admin' }} 👋</h3>
          <p style="color:#909399;margin-top:-4px;">{{ greeting }}</p>
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-top:24px;">
            <div v-for="card in cards" :key="card.title"
                 style="padding:20px;border-radius:8px;background:#f5f7fa;cursor:pointer;transition:.2s;"
                 @click="$router.push(card.path)">
              <div style="font-size:14px;color:#909399;">{{ card.title }}</div>
              <div style="font-size:28px;font-weight:bold;color:#303133;margin-top:8px;">{{ card.value }}</div>
              <div style="font-size:12px;color:#67c23a;margin-top:4px;">{{ card.tip }}</div>
            </div>
          </div>
          <el-divider/>
          <h4>快捷入口</h4>
          <el-space wrap>
            <el-button v-for="p in quickLinks" :key="p.path" @click="$router.push(p.path)">{{ p.name }}</el-button>
          </el-space>
        </div>
      `,
      data() {
        return {
          user: {},
          cards: [
            { title: '用户总数', value: '--', tip: '实时', path: '/user' },
            { title: '角色总数', value: '--', tip: '实时', path: '/role' },
            { title: '字典类型', value: '--', tip: '实时', path: '/dict' },
            { title: '定时任务', value: '--', tip: '实时', path: '/job' },
          ],
          quickLinks: [
            { name: '用户管理', path: '/user' },
            { name: '角色管理', path: '/role' },
            { name: '菜单管理', path: '/menu' },
            { name: '部门管理', path: '/dept' },
            { name: '岗位管理', path: '/post' },
            { name: '参数管理', path: '/config' },
            { name: '字典管理', path: '/dict' },
            { name: '通知公告', path: '/notice' },
            { name: '定时任务', path: '/job' },
          ],
        };
      },
      computed: {
        greeting() {
          const h = new Date().getHours();
          if (h < 6) return '凌晨好, 注意休息';
          if (h < 12) return '早上好, 又是元气满满的一天';
          if (h < 18) return '下午好, 继续加油';
          return '晚上好, 记得回家吃饭';
        },
      },
      async mounted() {
        try { this.user = JSON.parse(localStorage.getItem('zhs_user') || '{}'); } catch {}
        // 拉取真实统计
        const counts = [
          { idx: 0, url: '/user/list?size=1' },
          { idx: 1, url: '/role/list?size=1' },
          { idx: 2, url: '/dict/type/list?size=1' },
          { idx: 3, url: '/job/list?size=1' },
        ];
        for (const c of counts) {
          try {
            const r = await apiGet(c.url);
            this.cards[c.idx].value = (r.data && r.data.total) || 0;
          } catch {}
        }
      },
    };

    // ---------------------------------------------------------------------------
    // 视频 HLS 播放页 (hls.js + master.m3u8 自适应码率)
    // ---------------------------------------------------------------------------
    const VideoPage = {
      template: `
        <div class="admin-card">
          <h3>HLS 自适应码率播放器</h3>
          <p style="color:#909399;">输入 videoId, 后端用 ffmpeg 把视频切成 1080p/720p/480p 三档位, 浏览器根据网速自动切换</p>
          <el-form :inline="true" style="margin-top:16px;">
            <el-form-item label="视频ID">
              <el-input v-model="videoId" placeholder="请输入 videoId" style="width:240px;"/>
            </el-form-item>
            <el-form-item label="切片时长">
              <el-input-number v-model="segmentTime" :min="1" :max="30" :step="1"/>
            </el-form-item>
            <el-form-item>
              <el-button type="primary" :loading="loading" @click="transcode">转码并播放</el-button>
              <el-button @click="loadExisting">读取已有 m3u8</el-button>
            </el-form-item>
          </el-form>

          <!-- 转码进度面板 -->
          <el-alert
            v-if="loading || progress"
            :title="progressTitle"
            :type="loading ? 'info' : 'success'"
            :closable="false"
            show-icon
            style="margin:12px 0;"
          >
            <template v-if="loading">
              <el-skeleton :rows="3" animated style="margin-top:8px;"/>
              <p style="color:#909399;font-size:12px;margin-top:8px;">
                正在用 ffmpeg 切片... 首次转码可能需要 10-60 秒, 之后缓存命中秒开
              </p>
            </template>
            <template v-else-if="progress">
              <el-progress :percentage="progress" :status="progress === 100 ? 'success' : ''"/>
              <p v-if="progressText" style="color:#909399;font-size:12px;margin-top:4px;">{{ progressText }}</p>
            </template>
          </el-alert>

          <!-- 错误重试面板 -->
          <el-alert
            v-if="errorMsg"
            :title="errorMsg"
            type="error"
            show-icon
            :closable="true"
            @close="errorMsg = ''"
            style="margin:12px 0;"
          >
            <template #default>
              <p>{{ errorMsg }}</p>
              <el-button size="small" type="primary" @click="transcode" style="margin-top:8px;">重试</el-button>
            </template>
          </el-alert>

          <div v-if="masterContent" style="margin-top:16px;">
            <video ref="videoEl" controls style="width:100%;max-height:480px;background:#000;"></video>
            <div style="margin-top:8px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
              <el-tag>档位数: {{ bitrates.length }}</el-tag>
              <el-tag type="success" v-for="b in bitrates" :key="b.name">{{ b.name }} · {{ b.bitrate }}</el-tag>
              <el-tag type="info">已上传 .ts 切片: {{ segmentCount }}</el-tag>
              <el-tag v-if="cached" type="warning">已命中缓存, 立即播放</el-tag>
            </div>
            <el-collapse style="margin-top:12px;">
              <el-collapse-item title="master.m3u8 内容" name="1">
                <pre style="background:#f5f7fa;padding:12px;border-radius:4px;overflow:auto;max-height:240px;">{{ masterContent }}</pre>
              </el-collapse-item>
            </el-collapse>
          </div>
        </div>
      `,
      data() {
        return {
          videoId: '',
          segmentTime: 4,
          loading: false,
          errorMsg: '',
          masterContent: '',
          masterUrl: '',
          bitrates: [],
          segmentCount: 0,
          hls: null,
          cached: false,
          progress: 0,
          progressText: '',
        };
      },
      computed: {
        progressTitle() {
          if (this.loading) return '正在转码...';
          if (this.progress === 100) return '转码完成';
          if (this.progress > 0) return `转码中 ${this.progress}%`;
          return '';
        }
      },
      beforeUnmount() {
        if (this.hls) { try { this.hls.destroy(); } catch {} this.hls = null; }
      },
      methods: {
        async transcode() {
          if (!this.videoId) { this.errorMsg = '请填写 videoId'; return; }
          this.loading = true; this.errorMsg = '';
          this.progress = 0; this.progressText = '提交转码任务...';
          try {
            // 模拟进度 (真实场景可走 SSE 或轮询)
            const timer = setInterval(() => {
              if (this.progress < 90) this.progress += 10;
            }, 800);
            const r = await apiPost('/video/hls/transcode', { videoId: this.videoId, segmentTime: this.segmentTime });
            clearInterval(timer);
            if (r.code !== 0) { this.errorMsg = r.message || '转码失败'; this.progress = 0; return; }
            this.masterContent = r.data.masterContent;
            this.masterUrl = r.data.masterUrl;
            this.bitrates = r.data.bitrates;
            this.segmentCount = r.data.segmentCount;
            this.cached = !!r.data.cached;
            this.progressText = this.cached
              ? '从 Redis 缓存加载, 0.0s 立即播放'
              : `转码 ${r.data.transcodeSeconds || 0}s, 生成 ${this.segmentCount} 个 .ts 切片`;
            this.progress = 100;
            this._attachHls();
            // 2s 后收起进度面板
            setTimeout(() => { if (this.progress === 100) this.progress = 0; }, 2000);
          } catch (e) {
            this.errorMsg = String(e);
            this.progress = 0;
          } finally {
            this.loading = false;
          }
        },
        async loadExisting() {
          if (!this.videoId) { this.errorMsg = '请填写 videoId'; return; }
          this.errorMsg = '';
          try {
            const r = await fetch(API + '/video/hls/manifest/' + encodeURIComponent(this.videoId), { credentials: 'include' });
            if (!r.ok) { this.errorMsg = 'm3u8 尚未生成, 请先点击转码'; return; }
            this.masterContent = await r.text();
            this.masterUrl = location.origin + '/api/v1/video/hls/manifest/' + encodeURIComponent(this.videoId);
            this.bitrates = [{name:'?',height:0,bitrate:'?'}];
            this._attachHls();
          } catch (e) {
            this.errorMsg = String(e);
          }
        },
        _attachHls() {
          if (!this.masterUrl) return;
          const video = this.$refs.videoEl;
          if (this.hls) { try { this.hls.destroy(); } catch {} this.hls = null; }
          if (window.Hls && Hls.isSupported()) {
            this.hls = new Hls();
            this.hls.loadSource(this.masterUrl);
            this.hls.attachMedia(video);
          } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = this.masterUrl;
          } else {
            this.errorMsg = '当前浏览器不支持 HLS 播放';
          }
        },
      },
    };

    // ---------------------------------------------------------------------------
    // 主框架: 侧边栏 + 顶部 + 内容
    // ---------------------------------------------------------------------------
    const Shell = {
      template: `
        <div class="admin-shell">
          <aside class="admin-aside">
            <h2>ZHS 后台</h2>
            <el-menu
              :default-active="$route.path"
              router
              background-color="#001529"
              text-color="#fff">
              <el-menu-item index="/">
                <el-icon><DataAnalysis/></el-icon><span>首页</span>
              </el-menu-item>
              <el-sub-menu index="sys">
                <template #title><el-icon><Setting/></el-icon><span>系统管理</span></template>
                <el-menu-item index="/user">用户管理</el-menu-item>
                <el-menu-item index="/role">角色管理</el-menu-item>
                <el-menu-item index="/menu">菜单管理</el-menu-item>
                <el-menu-item index="/dept">部门管理</el-menu-item>
                <el-menu-item index="/post">岗位管理</el-menu-item>
              </el-sub-menu>
              <el-sub-menu index="mon">
                <template #title><el-icon><Monitor/></el-icon><span>系统监控</span></template>
                <el-menu-item index="/logininfor">登录日志</el-menu-item>
              </el-sub-menu>
              <el-sub-menu index="tool">
                <template #title><el-icon><Tools/></el-icon><span>系统工具</span></template>
                <el-menu-item index="/config">参数管理</el-menu-item>
                <el-menu-item index="/dict">字典管理</el-menu-item>
                <el-menu-item index="/notice">通知公告</el-menu-item>
              </el-sub-menu>
              <el-sub-menu index="jobm">
                <template #title><el-icon><Clock/></el-icon><span>任务调度</span></template>
                <el-menu-item index="/job">定时任务</el-menu-item>
              </el-sub-menu>
              <el-sub-menu index="videom">
                <template #title><el-icon><VideoCamera/></el-icon><span>媒体管理</span></template>
                <el-menu-item index="/video">HLS 视频播放</el-menu-item>
              </el-sub-menu>
            </el-menu>
          </aside>
          <main class="admin-main">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
              <el-breadcrumb separator="/">
                <el-breadcrumb-item :to="{ path: '/' }">首页</el-breadcrumb-item>
                <el-breadcrumb-item>{{ $route.meta.title || $route.path }}</el-breadcrumb-item>
              </el-breadcrumb>
              <div style="display:flex;align-items:center;gap:14px;">
                <!-- WebSocket 连接状态指示器 -->
                <el-tooltip :content="wsTooltip" placement="bottom">
                  <span style="display:inline-flex;align-items:center;gap:6px;cursor:default;">
                    <span :style="wsDotStyle"></span>
                    <span style="font-size:12px;color:#606266;">{{ wsStatusText }}</span>
                  </span>
                </el-tooltip>
                <el-dropdown @command="onCmd">
                  <span style="cursor:pointer;display:inline-flex;align-items:center;gap:6px;">
                    <el-avatar :size="28">{{ (user.nickName || user.userName || 'A').charAt(0) }}</el-avatar>
                    <span>{{ user.nickName || user.userName || 'admin' }}</span>
                    <el-icon><CaretBottom/></el-icon>
                  </span>
                  <template #dropdown>
                    <el-dropdown-menu>
                      <el-dropdown-item command="logout">退出登录</el-dropdown-item>
                    </el-dropdown-menu>
                  </template>
                </el-dropdown>
              </div>
            </div>
            <router-view/>
          </main>
        </div>
      `,
      data() { return { user: {} }; },
      mounted() {
        try { this.user = JSON.parse(localStorage.getItem('zhs_user') || '{}'); } catch {}
        // 把自己暴露到 window, 供 IIFE 模式的 WS 客户端更新 wsStatus
        try { window.__zhsShell = this; } catch {}
      },
      computed: {
        wsDotStyle() {
          const color = this.wsStatus === 'open' ? '#67c23a'
            : this.wsStatus === 'connecting' ? '#e6a23c'
            : this.wsStatus === 'closed' ? '#f56c6c' : '#909399';
          return {
            display: 'inline-block', width: '8px', height: '8px',
            borderRadius: '50%', background: color,
            boxShadow: this.wsStatus === 'open' ? '0 0 4px #67c23a' : 'none',
          };
        },
        wsStatusText() {
          return this.wsStatus === 'open' ? '实时通知在线'
            : this.wsStatus === 'connecting' ? '连接中...'
            : this.wsStatus === 'closed' ? `已断开(${this.wsRetryCount}次重试)`
            : '未连接';
        },
        wsTooltip() {
          return this.wsStatus === 'open'
            ? 'WebSocket 已连接, 实时接收通知'
            : this.wsStatus === 'connecting' ? '正在建立 WebSocket 连接'
            : this.wsStatus === 'closed' ? 'WebSocket 已断开, 指数退避重连中'
            : 'WebSocket 尚未连接';
        },
      },
      methods: {
        onCmd(cmd) {
          if (cmd === 'logout') {
            localStorage.removeItem('zhs_token');
            localStorage.removeItem('zhs_user');
            location.href = '/static/admin/login.html';
          }
        },
      },
      data() {
        return { user: {}, wsStatus: 'idle', wsRetryCount: 0 };
      },
    };

    // 暴露到 window 供 WS 客户端更新状态
    window.__zhsShell = null;

    // 路由表
    const routes = [
      { path: '/', component: Shell, children: [
        { path: '', component: Dashboard, meta: { title: '首页' } },
        { path: 'user', component: UserPage, meta: { title: '用户管理' } },
        { path: 'role', component: RolePage, meta: { title: '角色管理' } },
        { path: 'menu', component: MenuPage, meta: { title: '菜单管理' } },
        { path: 'dept', component: DeptPage, meta: { title: '部门管理' } },
        { path: 'post', component: PostPage, meta: { title: '岗位管理' } },
        { path: 'config', component: ConfigPage, meta: { title: '参数管理' } },
        { path: 'dict', component: DictPage, meta: { title: '字典管理' } },
        { path: 'logininfor', component: LoginInfoPage, meta: { title: '登录日志' } },
        { path: 'notice', component: NoticePage, meta: { title: '通知公告' } },
        { path: 'job', component: JobPage, meta: { title: '定时任务' } },
        { path: 'video', component: VideoPage, meta: { title: '视频 HLS 播放' } },
      ]},
      { path: '/login', component: { template: '<div></div>' }, meta: { public: true } },
    ];

    const router = VueRouter.createRouter({ history: VueRouter.createWebHashHistory(), routes });

    // 路由守卫: 未登录跳 login.html
    router.beforeEach((to) => {
      if (to.meta && to.meta.public) return true;
      const token = localStorage.getItem('zhs_token');
      // 验证 token 是真实 JWT (不是 demo 占位) — demo 占位直接踢回登录
      if (!token || token === 'demo' || token === 'demo-admin-token' || token.length < 20) {
        // 跳到外部 login.html
        if (location.pathname.indexOf('login.html') < 0) {
          location.href = '/static/admin/login.html';
        }
        return false;
      }
      return true;
    });

    const app = createApp({});
    app.use(ElementPlus);
    for (const [name, comp] of Object.entries(ElementPlusIconsVue)) {
      app.component(name, comp);
    }
    app.use(router);
    app.mount('#app');

    // ---------------------------------------------------------------------
    // 实时通知 WebSocket (公告 / 任务 / 系统)
    // ---------------------------------------------------------------------
    (function startNoticeWS() {
      let userId = 'demo';
      try { const u = JSON.parse(localStorage.getItem('zhs_user') || '{}'); userId = u.userId || u.uuid || 'demo'; } catch {}
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      const url = `${proto}://${location.host}/ws/notice?userId=${encodeURIComponent(userId)}&topics=announcement,job,system`;
      let ws;
      let retry = 0;
      function setShellStatus(status) {
        try {
          if (window.__zhsShell) {
            window.__zhsShell.wsStatus = status;
            window.__zhsShell.wsRetryCount = retry;
          }
        } catch {}
      }
      function connect() {
        setShellStatus('connecting');
        ws = new WebSocket(url);
        ws.onopen = () => { retry = 0; setShellStatus('open'); };
        ws.onmessage = (ev) => {
          try {
            const msg = JSON.parse(ev.data);
            if (msg.type === 'notice') {
              const t = msg.title || '通知';
              const c = msg.content || '';
              ElementPlus.ElNotification({
                title: t, message: c, type: msg.level || 'info',
                duration: msg.level === 'error' ? 0 : 4500,
                position: 'top-right',
              });
            }
          } catch {}
        };
        ws.onclose = () => {
          setShellStatus('closed');
          // 指数退避重连 (最多 30s)
          const delay = Math.min(30000, 1000 * Math.pow(2, retry++));
          setTimeout(connect, delay);
        };
        ws.onerror = () => { try { ws.close(); } catch {} };
      }
      connect();
      // 心跳 (30s)
      setInterval(() => { if (ws && ws.readyState === 1) ws.send(JSON.stringify({action: 'ping'})); }, 30000);
    })();
  </script>
</body>
</html>
