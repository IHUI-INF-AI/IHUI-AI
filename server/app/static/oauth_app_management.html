<!DOCTYPE html>
<html>
<head>
    <title>OAuth应用管理</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="/static/css/oauth_app_management.css">
</head>
<body>
    <div class="container">
        <h1>OAuth应用管理</h1>
        
        <h2>创建新应用</h2>
        <form id="createAppForm">
            <div class="form-group">
                <label>应用名称:</label>
                <input type="text" id="appName" required>
            </div>
            <div class="form-group">
                <label>应用描述:</label>
                <textarea id="appDescription" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label>回调地址 (每行一个):</label>
                <textarea id="redirectUris" rows="3" placeholder="https://www.coze.cn/api/permission/oauth/token&#10;https://www.coze.com/api/permission/oauth/token" required></textarea>
            </div>
            <div class="form-group">
                <label>应用类型:</label>
                <select id="appType">
                    <option value="web">Web应用</option>
                    <option value="mobile">移动应用</option>
                    <option value="desktop">桌面应用</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">创建应用</button>
        </form>
        
        <div class="app-list">
            <h2>已创建的应用</h2>
            <div id="appsList"></div>
        </div>
    </div>
    
    <script src="/static/js/oauth_app_management.js"></script>
</body>
</html>
