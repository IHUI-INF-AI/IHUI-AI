<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>多智能体协作平台 - 智汇AI</title>
<style>
:root {
  --bg-primary: #0f172a;
  --bg-secondary: #1e293b;
  --bg-card: #1e293b;
  --bg-input: #334155;
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --accent: #3b82f6;
  --accent-hover: #2563eb;
  --success: #10b981;
  --warning: #f59e0b;
  --error: #ef4444;
  --border: #334155;
  --border-light: #475569;
  --radius: 12px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans CJK SC', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.6;
}
.app { max-width: 1200px; margin: 0 auto; padding: 24px; }
.header { text-align: center; margin-bottom: 24px; }
.header h1 {
  font-size: 28px; font-weight: 700;
  background: linear-gradient(135deg, #3b82f6, #8b5cf6);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}
.header p { color: var(--text-secondary); font-size: 14px; }

/* 标签页 */
.tabs {
  display: flex; gap: 4px; margin-bottom: 20px;
  border-bottom: 1px solid var(--border);
  padding: 0 4px;
}
.tab {
  padding: 12px 20px; background: transparent; border: none;
  border-bottom: 2px solid transparent; color: var(--text-secondary);
  cursor: pointer; font-size: 14px; font-weight: 500;
  transition: color 0.15s, border-color 0.15s;
}
.tab:hover { color: var(--text-primary); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* 面板 */
.panel {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px; margin-bottom: 16px;
}
.panel-title {
  font-size: 15px; font-weight: 600; margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px;
  padding-bottom: 12px; border-bottom: 1px solid var(--border);
}
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }

/* 表单 */
.input-group { margin-bottom: 12px; }
.input-group label {
  display: block; font-size: 13px; color: var(--text-secondary);
  margin-bottom: 6px; font-weight: 500;
}
.input-group input,
.input-group textarea,
.input-group select {
  width: 100%; padding: 10px 12px;
  background: var(--bg-input); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text-primary); font-size: 14px;
  font-family: inherit; outline: none;
  transition: border-color 0.15s;
}
.input-group input:focus,
.input-group textarea:focus,
.input-group select:focus { border-color: var(--accent); }
.input-group textarea { resize: vertical; min-height: 80px; }
.row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* 按钮 */
.btn {
  padding: 10px 18px; border: 1px solid var(--border);
  border-radius: 8px; background: var(--bg-input); color: var(--text-primary);
  cursor: pointer; font-size: 14px; font-weight: 500;
  transition: background 0.15s, border-color 0.15s;
}
.btn:hover { background: var(--border); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
.btn-danger { background: var(--error); border-color: var(--error); color: #fff; }
.btn-danger:hover { opacity: 0.9; }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }

/* 状态徽章 */
.status-badge {
  display: inline-block; padding: 3px 10px; border-radius: 12px;
  font-size: 12px; font-weight: 500; border: 1px solid var(--border);
}
.status-pending { color: var(--text-muted); background: var(--bg-input); }
.status-running { color: var(--warning); background: rgba(245, 158, 11, 0.1); border-color: var(--warning); }
.status-completed, .status-completed { color: var(--success); background: rgba(16, 185, 129, 0.1); border-color: var(--success); }
.status-failed, .status-failed { color: var(--error); background: rgba(239, 68, 68, 0.1); border-color: var(--error); }

/* 智能体卡片 */
.agent-card {
  background: var(--bg-secondary); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px; margin-bottom: 8px;
  transition: border-color 0.15s;
}
.agent-card.active { border-color: var(--warning); }
.agent-card.done { border-color: var(--success); }
.agent-card.error { border-color: var(--error); }
.agent-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 6px;
}
.agent-role { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 14px; }
.agent-icon {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 13px; color: #fff;
}
.icon-planner { background: #3b82f6; }
.icon-researcher { background: #8b5cf6; }
.icon-executor { background: #10b981; }
.icon-reviewer { background: #f59e0b; }
.icon-reporter { background: #ec4899; }
.agent-desc { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }
.agent-content {
  font-size: 13px; color: var(--text-primary);
  background: var(--bg-input); border: 1px solid var(--border);
  border-radius: 6px; padding: 8px; margin-top: 6px;
  max-height: 200px; overflow-y: auto; white-space: pre-wrap;
}

/* 进度条 */
.progress-bar {
  height: 6px; background: var(--bg-input); border-radius: 3px;
  overflow: hidden; margin-top: 12px;
}
.progress-fill {
  height: 100%; background: var(--accent);
  transition: width 0.3s; width: 0%;
}

/* 日志 */
.log-area {
  background: var(--bg-primary); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px; max-height: 400px;
  overflow-y: auto; font-family: 'Consolas', 'Monaco', monospace; font-size: 12px;
}
.log-line { padding: 4px 0; border-bottom: 1px solid var(--border); }
.log-line:last-child { border-bottom: none; }
.log-line .ts { color: var(--text-muted); margin-right: 6px; }
.log-line .type { font-weight: 600; margin-right: 6px; }
.type-start { color: var(--accent); }
.type-planning, .type-plan { color: var(--warning); }
.type-task_start { color: var(--accent); }
.type-task_complete { color: var(--success); }
.type-task_error, .type-error { color: var(--error); }
.type-complete { color: var(--success); }

/* 结果 */
.result-box {
  background: var(--bg-secondary); border: 1px solid var(--border-light);
  border-radius: 8px; padding: 16px;
}
.result-box h3 { font-size: 14px; color: var(--accent); margin-bottom: 10px; }
.result-content {
  font-size: 14px; line-height: 1.8; white-space: pre-wrap;
  color: var(--text-primary);
}

/* 会话列表 */
.session-list { max-height: 500px; overflow-y: auto; }
.session-item {
  background: var(--bg-secondary); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px; margin-bottom: 8px;
  cursor: pointer; transition: border-color 0.15s;
}
.session-item:hover { border-color: var(--accent); }
.session-info { display: flex; justify-content: space-between; align-items: center; }
.session-title { font-weight: 600; font-size: 14px; }
.session-time { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

/* 空状态 */
.empty-state {
  text-align: center; padding: 32px 16px; color: var(--text-muted);
}
.empty-state .icon { font-size: 32px; margin-bottom: 8px; }

/* 知识库表格 */
.kb-table {
  width: 100%; border-collapse: collapse; font-size: 13px;
}
.kb-table th, .kb-table td {
  padding: 10px 12px; text-align: left;
  border-bottom: 1px solid var(--border);
}
.kb-table th { color: var(--text-secondary); font-weight: 600; font-size: 12px; }
.kb-table tr:hover td { background: var(--bg-secondary); }

/* 检索结果 */
.search-result {
  background: var(--bg-secondary); border: 1px solid var(--border);
  border-radius: 6px; padding: 10px; margin-bottom: 8px; font-size: 13px;
}
.search-result .score {
  display: inline-block; padding: 2px 8px; border-radius: 10px;
  font-size: 11px; font-weight: 600; color: var(--success);
  background: rgba(16, 185, 129, 0.1); border: 1px solid var(--success);
  margin-bottom: 6px;
}
.search-result .content { color: var(--text-primary); line-height: 1.6; }

/* 加载动画 */
.loading-spinner {
  display: inline-block; width: 14px; height: 14px;
  border: 2px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.8s linear infinite;
  vertical-align: middle; margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* 文件上传 */
.file-upload {
  border: 1px dashed var(--border-light); border-radius: 8px;
  padding: 16px; text-align: center; cursor: pointer;
  transition: border-color 0.15s; color: var(--text-secondary);
}
.file-upload:hover { border-color: var(--accent); color: var(--accent); }
.file-upload input { display: none; }
.file-name { font-size: 12px; color: var(--success); margin-top: 6px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>多智能体协作平台</h1>
    <p>Multi-Agent Crew System - 任务分解 / 角色协作 / 流式输出 / 知识库增强</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('crew', event)">智能体协作</button>
    <button class="tab" onclick="switchTab('knowledge', event)">知识库管理</button>
    <button class="tab" onclick="switchTab('history', event)">历史会话</button>
  </div>

  <!-- ===== Tab 1: 智能体协作 ===== -->
  <div class="tab-content active" id="tab-crew">
    <div class="grid-2">
      <div>
        <div class="panel">
          <div class="panel-title">任务输入</div>
          <div class="input-group">
            <label>用户需求</label>
            <textarea id="inputMessage" placeholder="请输入您需要多智能体协作完成的任务...">分析人工智能在教育领域的应用前景，包括技术趋势、主要应用场景和面临的挑战</textarea>
          </div>
          <div class="row">
            <div class="input-group">
              <label>LLM 模型</label>
              <select id="modelSelect"><option value="">加载中...</option></select>
            </div>
            <div class="input-group">
              <label>用户ID</label>
              <input type="text" id="userId" value="web_user" />
            </div>
          </div>
          <div class="input-group">
            <label>知识库集合 (可选)</label>
            <input type="text" id="collectionName" value="" placeholder="留空则不使用知识库" />
          </div>
          <div class="actions">
            <button class="btn" onclick="clearAll()">清空</button>
            <button class="btn btn-primary" id="runBtn" onclick="runCrew()">启动协作</button>
          </div>
        </div>

        <div class="panel" id="progressPanel" style="display:none;">
          <div class="panel-title">执行进度</div>
          <div id="agentCards"></div>
          <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
          <div style="display:flex;justify-content:space-between;margin-top:8px;font-size:12px;color:var(--text-muted);">
            <span id="progressText">准备中...</span>
            <span id="progressPercent">0%</span>
          </div>
        </div>

        <div class="panel" id="resultPanel" style="display:none;">
          <div class="panel-title">最终结果</div>
          <div class="result-box">
            <h3>Reported by Reporter</h3>
            <div class="result-content" id="resultContent"></div>
          </div>
        </div>
      </div>

      <div>
        <div class="panel">
          <div class="panel-title">智能体角色</div>
          <div id="agentList">
            <div class="empty-state"><div>加载中</div></div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-title">执行日志</div>
          <div class="log-area" id="logArea">
            <div class="log-line"><span class="ts">[系统]</span> 等待任务启动...</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== Tab 2: 知识库管理 ===== -->
  <div class="tab-content" id="tab-knowledge">
    <div class="grid-2">
      <div>
        <div class="panel">
          <div class="panel-title">文本入库</div>
          <div class="input-group">
            <label>所有者 UUID</label>
            <input type="text" id="kbOwnerUuid" value="web_user" />
          </div>
          <div class="input-group">
            <label>文档标题</label>
            <input type="text" id="kbTitle" placeholder="请输入文档标题" />
          </div>
          <div class="input-group">
            <label>集合名</label>
            <input type="text" id="kbCollection" value="default" />
          </div>
          <div class="input-group">
            <label>文档内容</label>
            <textarea id="kbText" placeholder="粘贴需要入库的文本内容..." style="min-height:140px;"></textarea>
          </div>
          <div class="actions">
            <button class="btn btn-primary" onclick="ingestText()">入库</button>
          </div>
        </div>

        <div class="panel">
          <div class="panel-title">文件上传入库</div>
          <div class="input-group">
            <label>文档标题 (可选)</label>
            <input type="text" id="kbFileTitle" placeholder="留空则使用文件名" />
          </div>
          <div class="input-group">
            <label>集合名</label>
            <input type="text" id="kbFileCollection" value="default" />
          </div>
          <label class="file-upload" for="kbFileInput">
            点击选择文件 (.txt / .md / .json / .csv)
            <input type="file" id="kbFileInput" accept=".txt,.md,.json,.csv,text/*" onchange="onFilePick(event)" />
          </label>
          <div class="file-name" id="kbFileName"></div>
          <div class="actions">
            <button class="btn btn-primary" onclick="ingestFile()">上传入库</button>
          </div>
        </div>
      </div>

      <div>
        <div class="panel">
          <div class="panel-title">语义检索测试</div>
          <div class="input-group">
            <label>查询语句</label>
            <textarea id="kbQuery" placeholder="输入查询语句测试检索效果..." style="min-height:80px;"></textarea>
          </div>
          <div class="row">
            <div class="input-group">
              <label>集合名</label>
              <input type="text" id="kbQueryCollection" value="default" />
            </div>
            <div class="input-group">
              <label>Top K</label>
              <input type="number" id="kbTopK" value="5" min="1" max="20" />
            </div>
          </div>
          <div class="actions">
            <button class="btn btn-primary" onclick="kbSearch()">检索</button>
          </div>
          <div id="kbSearchResults" style="margin-top:12px;"></div>
        </div>

        <div class="panel">
          <div class="panel-title">文档列表</div>
          <div class="actions" style="justify-content:flex-start;margin-top:0;margin-bottom:12px;">
            <button class="btn btn-sm" onclick="loadDocs()">刷新列表</button>
          </div>
          <div id="kbDocList">
            <div class="empty-state"><div>点击刷新加载文档</div></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== Tab 3: 历史会话 ===== -->
  <div class="tab-content" id="tab-history">
    <div class="grid-2">
      <div>
        <div class="panel">
          <div class="panel-title">会话列表</div>
          <div class="input-group">
            <label>用户ID</label>
            <input type="text" id="historyUserId" value="web_user" />
          </div>
          <div class="actions" style="justify-content:flex-start;">
            <button class="btn btn-sm" onclick="loadSessions()">刷新</button>
          </div>
          <div class="session-list" id="sessionList" style="margin-top:12px;">
            <div class="empty-state"><div>暂无历史会话</div></div>
          </div>
        </div>
      </div>

      <div>
        <div class="panel" id="historyDetailPanel" style="display:none;">
          <div class="panel-title">会话详情</div>
          <div id="historyDetail"></div>
        </div>
        <div class="panel" id="historyEmptyPanel">
          <div class="empty-state">
            <div style="font-size:32px;margin-bottom:8px;">&lt;/&gt;</div>
            <div>点击左侧会话查看详情</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const API_BASE = window.location.origin + '/api/v1/crew';
const KB_BASE = window.location.origin + '/api/v1/knowledge';
const AGENT_ICONS = {
  planner: { icon: 'P', cls: 'icon-planner', name: '规划师' },
  researcher: { icon: 'R', cls: 'icon-researcher', name: '研究员' },
  executor: { icon: 'E', cls: 'icon-executor', name: '执行者' },
  reviewer: { icon: 'V', cls: 'icon-reviewer', name: '审查员' },
  reporter: { icon: 'T', cls: 'icon-reporter', name: '报告员' },
};
let currentSessionId = null;
let agentRoles = [];
let pickedFile = null;

// ===== 标签页切换 =====
function switchTab(name, evt) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  const btn = evt.currentTarget || evt.target;
  btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'history') loadSessions();
  if (name === 'knowledge') loadDocs();
}

// ===== 初始化 =====
async function init() {
  await Promise.all([loadAgents(), loadModels(), loadSessions()]);
}

async function loadAgents() {
  try {
    const resp = await fetch(API_BASE + '/agents');
    const data = await resp.json();
    agentRoles = data.data || [];
    renderAgents();
  } catch (e) { console.error('加载角色失败:', e); }
}

function renderAgents() {
  const container = document.getElementById('agentList');
  if (!agentRoles.length) {
    container.innerHTML = '<div class="empty-state"><div>暂无角色</div></div>';
    return;
  }
  container.innerHTML = agentRoles.map(r => {
    const info = AGENT_ICONS[r.role] || { icon: '?', cls: '', name: r.role };
    return `
      <div class="agent-card" id="agent-${r.role}">
        <div class="agent-header">
          <div class="agent-role">
            <div class="agent-icon ${info.cls}">${info.icon}</div>
            <span>${info.name}</span>
            <span style="color:var(--text-muted);font-size:12px;font-weight:400;">(${r.role})</span>
          </div>
          <span class="status-badge status-pending" id="status-${r.role}">待命</span>
        </div>
        <div class="agent-desc">${r.goal}</div>
        <div class="agent-content" id="content-${r.role}" style="display:none;"></div>
      </div>
    `;
  }).join('');
}

async function loadModels() {
  try {
    const resp = await fetch(API_BASE + '/models');
    const data = await resp.json();
    const models = data.data || [];
    const select = document.getElementById('modelSelect');
    if (models.length === 0) {
      select.innerHTML = '<option value="">无可用模型</option>';
      return;
    }
    select.innerHTML = models.map(m =>
      `<option value="${m.model_id}">${m.name || m.model_id}</option>`
    ).join('');
    if (models.length > 0) select.value = models[0].model_id;
  } catch (e) {
    console.error('加载模型失败:', e);
    document.getElementById('modelSelect').innerHTML = '<option value="">加载失败</option>';
  }
}

async function loadSessions() {
  try {
    const userId = (document.getElementById('historyUserId') || document.getElementById('userId')).value;
    const resp = await fetch(API_BASE + '/sessions?user_id=' + userId + '&limit=20');
    const data = await resp.json();
    const sessions = data.data || [];
    const container = document.getElementById('sessionList');
    if (sessions.length === 0) {
      container.innerHTML = '<div class="empty-state"><div>暂无历史会话</div></div>';
      return;
    }
    container.innerHTML = sessions.map(s => `
      <div class="session-item" onclick="viewSession('${s.id}')">
        <div class="session-info">
          <div>
            <div class="session-title">${s.title || '未命名会话'}</div>
            <div class="session-time">${s.created_at || ''} · ${s.status}</div>
          </div>
          <span class="status-badge status-${s.status}">${s.status}</span>
        </div>
      </div>
    `).join('');
  } catch (e) { console.error('加载会话失败:', e); }
}

// ===== 日志与状态 =====
function log(type, content) {
  const area = document.getElementById('logArea');
  const ts = new Date().toLocaleTimeString('zh-CN');
  const typeLabel = {
    start: '开始', planning: '规划中', plan: '计划',
    task_start: '任务开始', task_complete: '任务完成',
    task_error: '任务错误', complete: '完成', error: '错误'
  }[type] || type;
  const line = document.createElement('div');
  line.className = 'log-line';
  line.innerHTML = `<span class="ts">[${ts}]</span> <span class="type type-${type}">${typeLabel}:</span> ${content.substring(0, 200)}`;
  area.appendChild(line);
  area.scrollTop = area.scrollHeight;
}

function updateAgentStatus(role, status, content) {
  const statusEl = document.getElementById('status-' + role);
  const cardEl = document.getElementById('agent-' + role);
  const contentEl = document.getElementById('content-' + role);
  if (!statusEl) return;
  const statusMap = {
    pending: { cls: 'status-pending', text: '待命' },
    running: { cls: 'status-running', text: '执行中' },
    completed: { cls: 'status-completed', text: '完成' },
    failed: { cls: 'status-failed', text: '失败' },
  };
  const s = statusMap[status] || statusMap.pending;
  statusEl.className = 'status-badge ' + s.cls;
  statusEl.textContent = s.text;
  cardEl.className = 'agent-card';
  if (status === 'running') cardEl.classList.add('active');
  else if (status === 'completed') cardEl.classList.add('done');
  else if (status === 'failed') cardEl.classList.add('error');
  if (content) {
    contentEl.style.display = 'block';
    contentEl.textContent = content;
  }
}

function updateProgress(current, total) {
  const pct = total > 0 ? Math.round((current / total) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPercent').textContent = pct + '%';
  document.getElementById('progressText').textContent = `步骤 ${current}/${total}`;
}

// ===== 执行协作 =====
async function runCrew() {
  const inputMessage = document.getElementById('inputMessage').value.trim();
  const modelId = document.getElementById('modelSelect').value;
  const userId = document.getElementById('userId').value.trim();
  const collectionName = document.getElementById('collectionName').value.trim();

  if (!inputMessage) { alert('请输入任务需求'); return; }

  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-spinner"></span>执行中...';

  document.getElementById('progressPanel').style.display = 'block';
  document.getElementById('resultPanel').style.display = 'none';
  document.getElementById('agentCards').innerHTML = '';
  agentRoles.forEach(r => updateAgentStatus(r.role, 'pending'));
  document.getElementById('logArea').innerHTML = '';

  try {
    log('start', '创建多智能体会话...');
    const createResp = await fetch(API_BASE + '/sessions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        user_id: userId,
        input_message: inputMessage,
        title: inputMessage.substring(0, 50),
        config: {
          model_id: modelId,
          collection_name: collectionName || undefined,
          max_retries: 2,
        }
      })
    });
    const createData = await createResp.json();
    if (createData.code !== 0) throw new Error(createData.msg || '创建失败');
    currentSessionId = createData.data.session_id;
    log('start', `会话已创建: ${currentSessionId.substring(0, 8)}...`);

    log('start', '开始流式执行...');
    const sseResp = await fetch(API_BASE + `/sessions/${currentSessionId}/stream`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
    });

    const reader = sseResp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let totalTasks = 0;
    let completedTasks = 0;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const event = JSON.parse(line.substring(6));
          handleEvent(event);
          if (event.type === 'plan' && event.tasks) {
            totalTasks = event.tasks.length;
          }
          if (event.type === 'task_complete') {
            completedTasks++;
            updateProgress(completedTasks, totalTasks);
          }
          if (event.type === 'complete') {
            showResult(event.content);
            log('complete', '多智能体协作完成!');
            break;
          }
          if (event.type === 'error') {
            log('error', event.content);
            break;
          }
        } catch (e) { /* skip parse errors */ }
      }
    }
    await loadSessions();
  } catch (e) {
    log('error', e.message);
    alert('执行失败: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '启动协作';
  }
}

function handleEvent(event) {
  const { type, role, content, tasks } = event;
  switch (type) {
    case 'start':
      log('start', content);
      break;
    case 'planning':
      log('planning', content);
      break;
    case 'plan':
      log('plan', `任务分解完成, 共 ${tasks?.length || 0} 个步骤`);
      if (tasks) {
        const container = document.getElementById('agentCards');
        container.innerHTML = tasks.map((t, i) => {
          const info = AGENT_ICONS[t.role] || { icon: '?', cls: '', name: t.role };
          return `
            <div class="agent-card" id="card-${i}">
              <div class="agent-header">
                <div class="agent-role">
                  <div class="agent-icon ${info.cls}">${info.icon}</div>
                  <span>${info.name}</span>
                  <span style="color:var(--text-muted);font-size:12px;">步骤 ${i+1}</span>
                </div>
                <span class="status-badge status-pending" id="card-status-${i}">待命</span>
              </div>
              <div class="agent-desc">${(t.description || '').substring(0, 100)}</div>
              <div class="agent-content" id="card-content-${i}" style="display:none;"></div>
            </div>
          `;
        }).join('');
      }
      break;
    case 'task_start':
      log('task_start', `[${role}] ${content}`);
      updateAgentStatus(role, 'running');
      break;
    case 'task_complete':
      log('task_complete', `[${role}] 完成`);
      updateAgentStatus(role, 'completed', content);
      break;
    case 'task_error':
      log('task_error', `[${role}] ${content}`);
      updateAgentStatus(role, 'failed', content);
      break;
    case 'complete':
      break;
    case 'error':
      log('error', content);
      break;
  }
}

function showResult(content) {
  document.getElementById('resultPanel').style.display = 'block';
  document.getElementById('resultContent').textContent = content;
  document.getElementById('resultPanel').scrollIntoView({ behavior: 'smooth' });
}

function clearAll() {
  document.getElementById('inputMessage').value = '';
  document.getElementById('progressPanel').style.display = 'none';
  document.getElementById('resultPanel').style.display = 'none';
  document.getElementById('logArea').innerHTML = '<div class="log-line"><span class="ts">[系统]</span> 等待任务启动...</div>';
  agentRoles.forEach(r => updateAgentStatus(r.role, 'pending'));
}

// ===== 历史会话详情 =====
async function viewSession(sessionId) {
  try {
    const resp = await fetch(API_BASE + `/sessions/${sessionId}`);
    const data = await resp.json();
    if (data.code !== 0) return;
    const session = data.data;
    currentSessionId = sessionId;

    document.getElementById('historyEmptyPanel').style.display = 'none';
    document.getElementById('historyDetailPanel').style.display = 'block';

    const tasksResp = await fetch(API_BASE + `/sessions/${sessionId}/tasks`);
    const tasksData = await tasksResp.json();
    const tasks = tasksData.data || [];

    const msgsResp = await fetch(API_BASE + `/sessions/${sessionId}/messages`);
    const msgsData = await msgsResp.json();
    const msgs = msgsData.data || [];

    const detailEl = document.getElementById('historyDetail');
    detailEl.innerHTML = `
      <div class="input-group">
        <label>会话标题</label>
        <div style="padding:8px 12px;background:var(--bg-input);border:1px solid var(--border);border-radius:6px;">${session.title || '未命名'}</div>
      </div>
      <div class="input-group">
        <label>输入</label>
        <div class="agent-content">${session.input_message || ''}</div>
      </div>
      <div class="input-group">
        <label>最终输出</label>
        <div class="agent-content">${session.output_message || '(无输出)'}</div>
      </div>
      <div class="input-group">
        <label>任务步骤 (${tasks.length})</label>
        ${tasks.map((t, i) => {
          const info = AGENT_ICONS[t.agent_role] || { icon: '?', cls: '', name: t.agent_role };
          return `
            <div class="agent-card ${t.status === 'completed' ? 'done' : t.status === 'failed' ? 'error' : ''}" style="margin-top:6px;">
              <div class="agent-header">
                <div class="agent-role">
                  <div class="agent-icon ${info.cls}">${info.icon}</div>
                  <span>${info.name}</span>
                  <span style="color:var(--text-muted);font-size:12px;">步骤 ${i+1}</span>
                </div>
                <span class="status-badge status-${t.status}">${t.status}</span>
              </div>
              <div class="agent-desc">${(t.description || '').substring(0, 120)}</div>
              ${t.output_data ? `<div class="agent-content">${(t.output_data || '').substring(0, 400)}</div>` : ''}
              ${t.error_message ? `<div class="agent-content" style="color:var(--error);">${t.error_message}</div>` : ''}
            </div>
          `;
        }).join('')}
      </div>
      <div class="input-group">
        <label>消息日志 (${msgs.length})</label>
        <div class="log-area" style="max-height:240px;">
          ${msgs.length === 0 ? '<div class="log-line"><span class="ts">[系统]</span> 无消息记录</div>' :
            msgs.map(m => `<div class="log-line"><span class="ts">[${m.from_role || 'sys'}]</span> ${(m.content || '').substring(0, 150)}</div>`).join('')}
        </div>
      </div>
    `;
  } catch (e) {
    console.error('查看会话失败:', e);
  }
}

// ===== 知识库管理 =====
async function ingestText() {
  const ownerUuid = document.getElementById('kbOwnerUuid').value.trim();
  const title = document.getElementById('kbTitle').value.trim();
  const text = document.getElementById('kbText').value.trim();
  const collection = document.getElementById('kbCollection').value.trim() || 'default';
  if (!ownerUuid) { alert('请填写所有者 UUID'); return; }
  if (!title) { alert('请填写文档标题'); return; }
  if (!text) { alert('请填写文档内容'); return; }
  try {
    const resp = await fetch(KB_BASE + '/ingest', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ owner_uuid: ownerUuid, title, text, collection_name: collection })
    });
    const data = await resp.json();
    if (data.code === 0) {
      alert(`入库成功, 切片数: ${data.data.chunk_count}`);
      document.getElementById('kbTitle').value = '';
      document.getElementById('kbText').value = '';
      loadDocs();
    } else {
      alert('入库失败: ' + (data.detail || data.msg));
    }
  } catch (e) {
    alert('入库失败: ' + e.message);
  }
}

function onFilePick(event) {
  const file = event.target.files[0];
  if (!file) return;
  pickedFile = file;
  document.getElementById('kbFileName').textContent = '已选择: ' + file.name;
}

async function ingestFile() {
  const ownerUuid = document.getElementById('kbOwnerUuid').value.trim();
  const title = document.getElementById('kbFileTitle').value.trim();
  const collection = document.getElementById('kbFileCollection').value.trim() || 'default';
  if (!ownerUuid) { alert('请填写所有者 UUID'); return; }
  if (!pickedFile) { alert('请先选择文件'); return; }
  try {
    const formData = new FormData();
    formData.append('owner_uuid', ownerUuid);
    formData.append('title', title);
    formData.append('collection_name', collection);
    formData.append('file', pickedFile);
    const resp = await fetch(KB_BASE + '/ingest/file', {
      method: 'POST',
      body: formData
    });
    const data = await resp.json();
    if (data.code === 0) {
      alert(`上传入库成功, 切片数: ${data.data.chunk_count}`);
      document.getElementById('kbFileName').textContent = '';
      pickedFile = null;
      document.getElementById('kbFileInput').value = '';
      loadDocs();
    } else {
      alert('上传失败: ' + (data.detail || data.msg));
    }
  } catch (e) {
    alert('上传失败: ' + e.message);
  }
}

async function kbSearch() {
  const query = document.getElementById('kbQuery').value.trim();
  const collection = document.getElementById('kbQueryCollection').value.trim() || 'default';
  const topK = parseInt(document.getElementById('kbTopK').value) || 5;
  const ownerUuid = document.getElementById('kbOwnerUuid').value.trim();
  if (!query) { alert('请输入查询语句'); return; }
  try {
    const resp = await fetch(KB_BASE + '/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query, collection_name: collection, top_k: topK, owner_uuid: ownerUuid })
    });
    const data = await resp.json();
    const results = data.data || [];
    const container = document.getElementById('kbSearchResults');
    if (results.length === 0) {
      container.innerHTML = '<div class="empty-state"><div>未检索到相关内容</div></div>';
      return;
    }
    container.innerHTML = results.map(r => `
      <div class="search-result">
        <span class="score">分数: ${r.score.toFixed(4)}</span>
        <div class="content">${r.content}</div>
      </div>
    `).join('');
  } catch (e) {
    alert('检索失败: ' + e.message);
  }
}

async function loadDocs() {
  const ownerUuid = document.getElementById('kbOwnerUuid').value.trim();
  if (!ownerUuid) {
    document.getElementById('kbDocList').innerHTML = '<div class="empty-state"><div>请先填写所有者 UUID</div></div>';
    return;
  }
  try {
    const resp = await fetch(KB_BASE + '/docs?owner_uuid=' + ownerUuid);
    const data = await resp.json();
    const docs = data.data || [];
    const container = document.getElementById('kbDocList');
    if (docs.length === 0) {
      container.innerHTML = '<div class="empty-state"><div>暂无文档</div></div>';
      return;
    }
    container.innerHTML = `
      <table class="kb-table">
        <thead>
          <tr><th>ID</th><th>标题</th><th>切片数</th><th>创建时间</th><th>操作</th></tr>
        </thead>
        <tbody>
          ${docs.map(d => `
            <tr>
              <td>${d.id}</td>
              <td>${d.title}</td>
              <td>${d.chunk_count}</td>
              <td>${(d.created_at || '').substring(0, 19)}</td>
              <td><button class="btn btn-danger btn-sm" onclick="deleteDoc(${d.id})">删除</button></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  } catch (e) {
    document.getElementById('kbDocList').innerHTML = '<div class="empty-state"><div>加载失败: ' + e.message + '</div></div>';
  }
}

async function deleteDoc(docId) {
  if (!confirm('确认删除该文档?')) return;
  const ownerUuid = document.getElementById('kbOwnerUuid').value.trim();
  try {
    const resp = await fetch(KB_BASE + `/docs/${docId}?owner_uuid=${ownerUuid}`, { method: 'DELETE' });
    const data = await resp.json();
    if (data.code === 0) {
      alert('已删除');
      loadDocs();
    } else {
      alert('删除失败: ' + (data.detail || data.msg));
    }
  } catch (e) {
    alert('删除失败: ' + e.message);
  }
}

// 启动
init();
</script>
