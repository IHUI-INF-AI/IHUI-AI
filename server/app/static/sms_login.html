<!DOCTYPE html>
<html>
<head>
    <title>手机验证码登录与授权</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="alternate icon" href="/static/favicon.svg">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 450px;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h2 {
            color: #333;
            margin-bottom: 10px;
        }
        .app-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 25px;
            border-left: 4px solid #667eea;
        }
        .login-section {
            margin-bottom: 25px;
            padding: 20px;
            border: 1px solid #e9ecef;
            border-radius: 5px;
            background: #fafafa;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.2);
        }
        .input-group {
            display: flex;
            gap: 10px;
        }
        .input-group input {
            flex: 1;
        }
        .sms-btn {
            padding: 12px 20px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            min-width: 120px;
        }
        .sms-btn:hover {
            background: #218838;
        }
        .sms-btn:disabled {
            background: #6c757d;
            cursor: not-allowed;
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        .login-btn:hover {
            background: #5a6fd8;
        }
        .login-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .auth-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e9ecef;
        }
        .user-info {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            display: none;
        }
        .btn {
            padding: 12px 25px;
            margin: 5px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            min-width: 100px;
        }
        .allow {
            background: #28a745;
            color: white;
        }
        .allow:hover {
            background: #218838;
        }
        .allow:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .deny {
            background: #dc3545;
            color: white;
        }
        .deny:hover {
            background: #c82333;
        }
        .button-group {
            text-align: center;
            margin-top: 20px;
        }
        .error-message {
            color: #dc3545;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        .success-message {
            color: #28a745;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @media (max-width: 600px) {
            body {
                padding: 20px;
            }
            .container {
                padding: 30px 20px;
            }
            .input-group {
                flex-direction: column;
            }
            .sms-btn {
                min-width: auto;
                width: 100%;
            }
        }

        /* Tab切换样式 */
        .tab-container {
            margin: 20px 0;
        }
        .tab-buttons {
            display: flex;
            border-bottom: 2px solid #e9ecef;
            margin-bottom: 20px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            background: transparent;
            color: #6c757d;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }
        .tab-btn.active {
            color: #007bff;
            border-bottom-color: #007bff;
        }
        .tab-btn:hover {
            color: #007bff;
            background: #f8f9fa;
        }

        /* Tab内容样式 */
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }

        /* 注册成功提示 */
        .register-success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>📱 AI|智汇社区手机验证码授权</h2>
        </div>

        <div class="app-info" id="appInfo">
            <p><strong>应用名称:</strong> <span id="clientId">火山Coze授权</span></p>
            <p><strong>请求权限:</strong> <span id="scopeDisplay">授权智能体发布</span></p>
        </div>

        <!-- Tab切换 -->
        <div class="tab-container">
            <div class="tab-buttons">
                <button class="tab-btn active" onclick="switchTab('login')">登录</button>
                <button class="tab-btn" onclick="switchTab('register')">快速注册</button>
            </div>
        </div>

        <!-- 登录Tab内容 -->
        <div id="loginTab" class="tab-content active">
            <div class="login-section">
                <h3 style="margin-top: 0; color: #333;">请使用手机验证码登录</h3>
            <form id="loginForm">
                <div class="form-group">
                    <label for="phone">手机号码:</label>
                    <input type="tel" id="phone" name="phone" required placeholder="请输入手机号码" maxlength="11">
                    <div class="error-message" id="phoneError">请输入正确的手机号码</div>
                </div>
                <div class="form-group">
                    <label for="smsCode">验证码:</label>
                    <div class="input-group">
                        <input type="text" id="smsCode" name="smsCode" required placeholder="请输入验证码" maxlength="6">
                        <button type="button" class="sms-btn" id="sendSmsBtn" onclick="sendSmsCode()">发送验证码</button>
                    </div>
                    <div class="error-message" id="smsCodeError">请输入验证码</div>
                    <div class="success-message" id="smsSuccess">验证码已发送</div>
                </div>
                <button type="button" class="login-btn" onclick="performLogin()" id="loginBtn">验证登录</button>
            </form>
            </div>
        </div>

        <!-- 注册Tab内容 -->
        <div id="registerTab" class="tab-content">
            <div class="login-section">
                <h3 style="margin-top: 0; color: #333;">手机验证码快速注册</h3>
                <form id="registerForm">
                    <div class="form-group">
                        <label for="regPhone">手机号码:</label>
                        <input type="tel" id="regPhone" name="regPhone" required placeholder="请输入手机号码" maxlength="11">
                        <div class="error-message" id="regPhoneError">请输入正确的手机号码</div>
                    </div>
                    <div class="form-group">
                        <label for="regSmsCode">验证码:</label>
                        <div class="input-group">
                            <input type="text" id="regSmsCode" name="regSmsCode" required placeholder="请输入验证码" maxlength="6">
                            <button type="button" class="sms-btn" id="sendRegSmsBtn" onclick="sendRegisterSmsCode()">发送验证码</button>
                        </div>
                        <div class="error-message" id="regSmsCodeError">请输入验证码</div>
                        <div class="success-message" id="regSmsSuccess">验证码已发送</div>
                    </div>
                    <button type="button" class="login-btn" onclick="performRegister()" id="registerBtn">快速注册</button>
                </form>
            </div>
        </div>

        <!-- 用户信息显示 -->
        <div class="user-info" id="userInfo">
            <strong>✅ 登录成功!</strong><br>
            用户: <span id="loggedInUser"></span>
        </div>

        <!-- 注册成功提示 -->
        <div class="register-success" id="registerSuccess">
            <strong>✅ 注册成功!</strong><br>
            用户: <span id="registeredUser"></span>
        </div>

        <!-- 授权区域 -->
        <div class="auth-section">
            <h3 style="color: #333;">授权确认</h3>
            <p>是否允许火山Coze平台访问并授权你的AI|智汇社区</strong> 账户信息？</p>

            <form method="post" action="/cozeZhsApi/oauth/authorize/confirm" id="authForm">
                <input type="hidden" name="session_id" id="sessionId" value="">
                <input type="hidden" name="user_id" id="userId" value="">
                <div class="button-group">
                    <button type="submit" name="action" value="allow" class="btn allow" id="allowBtn" disabled>
                        ✅ 同意授权
                    </button>
                    <button type="submit" name="action" value="deny" class="btn deny">
                        ❌ 拒绝授权
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let isLoggedIn = false;
        let countdown = 0;
        let countdownTimer = null;
        let smsConfig = null; // 存储短信配置

        // 从URL参数获取授权信息
        function getUrlParams() {
            const urlParams = new URLSearchParams(window.location.search);
            return {
                client_id: urlParams.get('client_id') || 'Unknown App',
                scope: urlParams.get('scope') || '基本信息访问',
                session_id: urlParams.get('session_id') || '',
                redirect_uri: urlParams.get('redirect_uri') || '',
                state: urlParams.get('state') || ''
            };
        }

        // 获取短信配置
        async function loadSmsConfig() {
            try {
                const response = await fetch('/cozeZhsApi/oauth/sms-config');
                const result = await response.json();

                if (result.success) {
                    smsConfig = result.data;
                    console.log('短信配置加载成功:', smsConfig);
                    console.log('使用代理:', smsConfig.use_proxy);
                } else {
                    console.error('短信配置加载失败:', result.error);
                    // 使用代理接口的默认配置
                    smsConfig = {
                        sms_verify_url: '/api/sms-proxy/send',
                        sms_code_verify_url: '/api/sms-proxy/verify',
                        sms_send_interval: 60,
                        temp_id: 1,
                        temp_code: "1",
                        use_proxy: true,
                        allow_insecure: true
                    };
                }
            } catch (error) {
                console.error('获取短信配置异常:', error);
                // 使用代理接口的默认配置
                smsConfig = {
                    sms_verify_url: '/api/sms-proxy/send',
                    sms_code_verify_url: '/api/sms-proxy/verify',
                    sms_send_interval: 60,
                    temp_id: 1,
                    temp_code: "1",
                    use_proxy: true,
                    allow_insecure: true
                };
            }
        }

        // 初始化页面
        async function initializePage() {
            const params = getUrlParams();

            // 设置应用信息
            //document.getElementById('clientId').textContent = params.client_id;
            //document.getElementById('scopeDisplay').textContent = params.scope;
            //document.getElementById('authClientId').textContent = params.client_id;
            document.getElementById('sessionId').value = params.session_id;

            // 加载短信配置
            await loadSmsConfig();

            console.log('页面初始化参数:', params);
            console.log('短信配置:', smsConfig);
        }

        // 手机号码验证
        function validatePhone(phone) {
            const phoneRegex = /^1[3-9]\d{9}$/;
            return phoneRegex.test(phone);
        }

        // 验证码验证
        function validateSmsCode(code) {
            return code && code.length === 6 && /^\d{6}$/.test(code);
        }

        // 发送验证码
        async function sendSmsCode() {
            const phone = document.getElementById('phone').value.trim();
            const sendBtn = document.getElementById('sendSmsBtn');

            // 检查配置是否加载
            if (!smsConfig) {
                document.getElementById('phoneError').textContent = '系统配置未加载，请刷新页面重试';
                document.getElementById('phoneError').style.display = 'block';
                return;
            }

            // 清除错误信息
            document.getElementById('phoneError').style.display = 'none';
            document.getElementById('smsSuccess').style.display = 'none';

            // 验证手机号
            if (!validatePhone(phone)) {
                document.getElementById('phoneError').textContent = '请输入正确的手机号码';
                document.getElementById('phoneError').style.display = 'block';
                return;
            }

            // 开始倒计时
            startCountdown();

            try {
                // 显示加载状态
                sendBtn.innerHTML = '<span class="loading"></span>发送中...';

                // 使用配置中的URL和参数，添加HTTPS支持
                const fetchOptions = {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        phone: phone,
                        tempId: smsConfig.temp_id,
                        tempCode: smsConfig.temp_code
                    })
                };

                // 如果是HTTPS且允许不安全连接，添加相应选项
                if (smsConfig.protocol === 'https' && smsConfig.allow_insecure) {
                    // 注意：在生产环境中应该使用有效的SSL证书
                    console.warn('⚠️ 使用不安全的HTTPS连接');
                }

                const response = await fetch(smsConfig.sms_verify_url, fetchOptions);

                const result = await response.json();
                console.log('发送验证码结果:', result);

                // 检查代理接口的响应格式
                if (response.ok && result.success) {
                    document.getElementById('smsSuccess').textContent = '验证码已发送到您的手机';
                    document.getElementById('smsSuccess').style.display = 'block';
                } else {
                    throw new Error(result.msg || '发送失败');
                }
            } catch (error) {
                console.error('发送验证码失败:', error);

                // 检查是否是混合内容错误
                if (error.message.includes('Mixed Content') || error.message.includes('blocked')) {
                    document.getElementById('phoneError').textContent = '网络安全限制，请联系管理员配置HTTPS';
                } else {
                    document.getElementById('phoneError').textContent = '发送验证码失败: ' + error.message;
                }
                document.getElementById('phoneError').style.display = 'block';

                // 发送失败时重置按钮
                resetSendButton();
            }
        }

        // 开始倒计时
        function startCountdown() {
            // 使用配置中的发送间隔时间
            countdown = smsConfig ? smsConfig.sms_send_interval : 60;
            const sendBtn = document.getElementById('sendSmsBtn');
            sendBtn.disabled = true;

            countdownTimer = setInterval(() => {
                sendBtn.textContent = `${countdown}秒后重发`;
                countdown--;

                if (countdown < 0) {
                    resetSendButton();
                }
            }, 1000);
        }

        // 重置发送按钮
        function resetSendButton() {
            const sendBtn = document.getElementById('sendSmsBtn');
            sendBtn.disabled = false;
            sendBtn.textContent = '发送验证码';
            
            if (countdownTimer) {
                clearInterval(countdownTimer);
                countdownTimer = null;
            }
            countdown = 0;
        }

        // 执行登录验证
        async function performLogin() {
            const phone = document.getElementById('phone').value.trim();
            const smsCode = document.getElementById('smsCode').value.trim();
            const loginBtn = document.getElementById('loginBtn');

            // 检查配置是否加载
            if (!smsConfig) {
                document.getElementById('smsCodeError').textContent = '系统配置未加载，请刷新页面重试';
                document.getElementById('smsCodeError').style.display = 'block';
                return;
            }

            // 清除之前的错误信息
            document.getElementById('phoneError').style.display = 'none';
            document.getElementById('smsCodeError').style.display = 'none';

            // 基本验证
            if (!validatePhone(phone)) {
                document.getElementById('phoneError').textContent = '请输入正确的手机号码';
                document.getElementById('phoneError').style.display = 'block';
                return;
            }

            if (!validateSmsCode(smsCode)) {
                document.getElementById('smsCodeError').textContent = '请输入6位数字验证码';
                document.getElementById('smsCodeError').style.display = 'block';
                return;
            }

            try {
                // 显示加载状态
                loginBtn.innerHTML = '<span class="loading"></span>验证中...';
                loginBtn.disabled = true;

                // 使用配置中的验证URL，添加HTTPS支持
                const fetchOptions = {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        phone: phone,
                        code: smsCode
                    })
                };

                // 如果是HTTPS且允许不安全连接，添加相应选项
                if (smsConfig.protocol === 'https' && smsConfig.allow_insecure) {
                    console.warn('⚠️ 使用不安全的HTTPS连接进行验证');
                }

                const response = await fetch(smsConfig.sms_code_verify_url, fetchOptions);

                const result = await response.json();
                console.log('验证结果:', result);

                // 检查代理接口的响应格式
                if (response.ok && result.success && result.code === "200" && result.msg === "success") {
                    // 验证码验证成功，但需要检查用户是否已注册

                    // 检查uuid是否为空（用户未注册）
                    if (!result.uuid || result.uuid === null || result.uuid === '') {
                        // 用户未注册，显示提示信息
                        document.getElementById('smsCodeError').textContent = '用户未注册，请点击快速注册';
                        document.getElementById('smsCodeError').style.display = 'block';
                        document.getElementById('smsCodeError').style.color = '#ff6b6b';

                        // 不启用授权按钮
                        document.getElementById('allowBtn').disabled = true;

                        // 不设置登录状态
                        isLoggedIn = false;

                        return; // 停止执行后续逻辑
                    }

                    // 用户已注册，验证成功
                    isLoggedIn = true;

                    // 显示登录成功信息
                    document.getElementById('loggedInUser').textContent = phone;
                    document.getElementById('userInfo').style.display = 'block';

                    // 直接使用UUID作为用户ID，清理可能包含的手机号前缀
                    let userId = result.uuid;
                    // 如果uuid包含手机号前缀，移除它
                    if (userId.startsWith(phone)) {
                        userId = userId.substring(phone.length);
                        // 移除可能的分隔符
                        userId = userId.replace(/^[_-]/, '');
                    }

                    console.log('原始uuid:', result.uuid);
                    console.log('最终userId:', userId);

                    document.getElementById('userId').value = userId;

                    // 启用授权按钮
                    document.getElementById('allowBtn').disabled = false;

                    // 隐藏登录表单
                    document.querySelector('.login-section').style.opacity = '0.6';
                    document.querySelector('.login-section').style.pointerEvents = 'none';

                    alert('登录成功！现在可以进行授权操作。');
                } else {
                    // 验证失败
                    throw new Error(result.msg || '验证码错误');
                }
            } catch (error) {
                console.error('登录验证失败:', error);

                // 检查是否是混合内容错误
                if (error.message.includes('Mixed Content') || error.message.includes('blocked')) {
                    document.getElementById('smsCodeError').textContent = '网络安全限制，请联系管理员配置HTTPS';
                } else {
                    document.getElementById('smsCodeError').textContent = '验证失败: ' + error.message;
                }
                document.getElementById('smsCodeError').style.display = 'block';
            } finally {
                // 恢复按钮状态
                loginBtn.innerHTML = '验证登录';
                loginBtn.disabled = false;
            }
        }

        // 回车键登录
        document.getElementById('phone').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendSmsCode();
            }
        });

        document.getElementById('smsCode').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                performLogin();
            }
        });

        // 注册页面键盘事件
        document.getElementById('regPhone').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendRegisterSmsCode();
            }
        });

        document.getElementById('regSmsCode').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                performRegister();
            }
        });

        // 防止未登录时提交授权表单
        document.getElementById('authForm').addEventListener('submit', function(e) {
            if (!isLoggedIn && e.submitter && e.submitter.value === 'allow') {
                e.preventDefault();
                alert('请先完成手机验证码登录！');
            }
        });

        // Tab切换功能
        function switchTab(tabName) {
            // 移除所有active类
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            // 添加active类到当前tab
            event.target.classList.add('active');
            document.getElementById(tabName + 'Tab').classList.add('active');

            // 清除错误信息
            clearAllErrors();
        }

        // 清除所有错误信息
        function clearAllErrors() {
            const errorElements = document.querySelectorAll('.error-message, .success-message');
            errorElements.forEach(el => el.style.display = 'none');
        }

        // 发送注册验证码
        async function sendRegisterSmsCode() {
            const phone = document.getElementById('regPhone').value.trim();
            const sendBtn = document.getElementById('sendRegSmsBtn');

            // 检查配置是否加载
            if (!smsConfig) {
                document.getElementById('regPhoneError').textContent = '系统配置未加载，请刷新页面重试';
                document.getElementById('regPhoneError').style.display = 'block';
                return;
            }

            // 清除错误信息
            document.getElementById('regPhoneError').style.display = 'none';
            document.getElementById('regSmsSuccess').style.display = 'none';

            // 验证手机号
            if (!validatePhone(phone)) {
                document.getElementById('regPhoneError').textContent = '请输入正确的手机号码';
                document.getElementById('regPhoneError').style.display = 'block';
                return;
            }

            // 开始倒计时
            startRegisterCountdown();

            try {
                const fetchOptions = {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        phone: phone,
                        tempId: smsConfig.temp_id,
                        tempCode: smsConfig.temp_code
                    })
                };

                const response = await fetch(smsConfig.sms_verify_url, fetchOptions);
                const result = await response.json();
                console.log('注册验证码发送结果:', result);

                if (response.ok && result.success) {
                    document.getElementById('regSmsSuccess').textContent = '验证码已发送到您的手机';
                    document.getElementById('regSmsSuccess').style.display = 'block';
                } else {
                    throw new Error(result.msg || '发送失败');
                }
            } catch (error) {
                console.error('发送注册验证码失败:', error);
                document.getElementById('regPhoneError').textContent = '发送验证码失败: ' + error.message;
                document.getElementById('regPhoneError').style.display = 'block';

                // 重置按钮状态
                clearInterval(registerCountdownTimer);
                sendBtn.textContent = '发送验证码';
                sendBtn.disabled = false;
            }
        }

        // 注册倒计时
        let registerCountdownTimer;
        function startRegisterCountdown() {
            const sendBtn = document.getElementById('sendRegSmsBtn');
            let countdown = smsConfig.sms_send_interval || 60;

            sendBtn.disabled = true;

            registerCountdownTimer = setInterval(() => {
                sendBtn.textContent = `${countdown}秒后重发`;
                countdown--;

                if (countdown < 0) {
                    clearInterval(registerCountdownTimer);
                    sendBtn.textContent = '发送验证码';
                    sendBtn.disabled = false;
                }
            }, 1000);
        }

        // 执行注册验证
        async function performRegister() {
            const phone = document.getElementById('regPhone').value.trim();
            const smsCode = document.getElementById('regSmsCode').value.trim();
            const registerBtn = document.getElementById('registerBtn');

            // 检查配置是否加载
            if (!smsConfig) {
                document.getElementById('regSmsCodeError').textContent = '系统配置未加载，请刷新页面重试';
                document.getElementById('regSmsCodeError').style.display = 'block';
                return;
            }

            // 清除之前的错误信息
            document.getElementById('regPhoneError').style.display = 'none';
            document.getElementById('regSmsCodeError').style.display = 'none';

            // 基本验证
            if (!validatePhone(phone)) {
                document.getElementById('regPhoneError').textContent = '请输入正确的手机号码';
                document.getElementById('regPhoneError').style.display = 'block';
                return;
            }

            if (!validateSmsCode(smsCode)) {
                document.getElementById('regSmsCodeError').textContent = '请输入6位数字验证码';
                document.getElementById('regSmsCodeError').style.display = 'block';
                return;
            }

            try {
                // 显示加载状态
                registerBtn.innerHTML = '<span class="loading"></span>注册中...';
                registerBtn.disabled = true;

                // 调用注册接口
                const response = await fetch('/api/sms-proxy/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        phone: phone,
                        code: smsCode
                    })
                });

                const result = await response.json();
                console.log('注册结果:', result);

                if (response.ok && result.success && result.code === "200") {
                    // 注册成功或用户已注册
                    if (result.already_registered) {
                        // 用户已注册，直接登录
                        isLoggedIn = true;
                        document.getElementById('loggedInUser').textContent = phone;
                        document.getElementById('userInfo').style.display = 'block';

                        // 直接使用UUID作为用户ID，清理可能包含的手机号前缀
                        let userId = result.uuid;
                        // 如果uuid包含手机号前缀，移除它
                        if (userId.startsWith(phone)) {
                            userId = userId.substring(phone.length);
                            // 移除可能的分隔符
                            userId = userId.replace(/^[_-]/, '');
                        }

                        console.log('注册-原始uuid:', result.uuid);
                        console.log('注册-最终userId:', userId);

                        document.getElementById('userId').value = userId;

                        // 启用授权按钮
                        document.getElementById('allowBtn').disabled = false;

                        alert('用户已注册，登录成功！现在可以进行授权操作。');
                    } else if (result.register_success) {
                        // 新用户注册成功
                        isLoggedIn = true;

                        // 显示注册成功信息
                        document.getElementById('registeredUser').textContent = phone;
                        document.getElementById('registerSuccess').style.display = 'block';

                        // 同时显示登录成功信息
                        document.getElementById('loggedInUser').textContent = phone;
                        document.getElementById('userInfo').style.display = 'block';

                        // 直接使用UUID作为用户ID，清理可能包含的手机号前缀
                        let userId = result.uuid;
                        // 如果uuid包含手机号前缀，移除它
                        if (userId.startsWith(phone)) {
                            userId = userId.substring(phone.length);
                            // 移除可能的分隔符
                            userId = userId.replace(/^[_-]/, '');
                        }

                        console.log('快速注册-原始uuid:', result.uuid);
                        console.log('快速注册-最终userId:', userId);

                        document.getElementById('userId').value = userId;

                        // 启用授权按钮
                        document.getElementById('allowBtn').disabled = false;

                        // 隐藏注册表单
                        document.querySelector('#registerTab .login-section').style.opacity = '0.6';
                        document.querySelector('#registerTab .login-section').style.pointerEvents = 'none';

                        alert('注册成功！现在可以进行授权操作。');
                    }
                } else {
                    // 注册失败
                    throw new Error(result.msg || '注册失败');
                }
            } catch (error) {
                console.error('注册失败:', error);
                document.getElementById('regSmsCodeError').textContent = '注册失败: ' + error.message;
                document.getElementById('regSmsCodeError').style.display = 'block';
            } finally {
                // 恢复按钮状态
                registerBtn.innerHTML = '快速注册';
                registerBtn.disabled = false;
            }
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            initializePage();
        });
    </script>
</body>
</html>
