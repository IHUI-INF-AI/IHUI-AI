<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - 页面未找到 | ZHS Platform</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --error: #ef4444;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f8fafc;
        --surface: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      line-height: 1.6;
    }
    .container {
      max-width: 480px;
      width: 100%;
      background: var(--surface);
      border-radius: 16px;
      padding: 48px 32px;
      text-align: center;
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
    }
    .code {
      font-size: 96px;
      font-weight: 700;
      color: var(--error);
      line-height: 1;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 12px;
      font-weight: 600;
    }
    p {
      color: var(--muted);
      margin-bottom: 32px;
    }
    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    a, button {
      display: inline-flex;
      align-items: center;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: background-color 0.15s;
    }
    .btn-primary {
      background: var(--primary);
      color: white;
    }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--muted);
    }
    .btn-secondary:hover { background: var(--bg); }
  </style>
</head>
<body>
  <main class="container" role="main" aria-labelledby="title">
    <div class="code" aria-hidden="true">404</div>
    <h1 id="title">页面未找到</h1>
    <p>抱歉, 您访问的页面不存在或已被移除.</p>
    <nav class="actions" aria-label="错误页面操作">
      <a href="/" class="btn-primary">返回首页</a>
      <a href="javascript:history.back()" class="btn-secondary">返回上一页</a>
    </nav>
  </main>
</body>
</html>
