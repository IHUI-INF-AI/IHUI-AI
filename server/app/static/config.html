<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coze客户端模式配置</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
        }
        .mode-option {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            margin: 15px 0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .mode-option:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        .mode-option.active {
            background: rgba(76, 175, 80, 0.3);
            border: 2px solid #4CAF50;
        }
        .mode-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .mode-desc {
            font-size: 14px;
            opacity: 0.9;
        }
        .save-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
            width: 100%;
            transition: background 0.3s ease;
        }
        .save-btn:hover {
            background: #45a049;
        }
        .status {
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
        }
        .success {
            background: rgba(76, 175, 80, 0.3);
        }
        .error {
            background: rgba(244, 67, 54, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Coze客户端模式配置</h1>
        
        <div class="mode-option" data-mode="http">
            <div class="mode-title">🌐 HTTP客户端模式</div>
            <div class="mode-desc">
                使用curl方式调用Coze API<br>
                • 参数格式：简单字符串<br>
                • JWT token自动管理<br>
                • 更接近官方curl示例
            </div>
        </div>
        
        <div class="mode-option" data-mode="sdk">
            <div class="mode-title">📦 SDK客户端模式</div>
            <div class="mode-desc">
                使用官方cozepy SDK<br>
                • 参数格式：序列化JSON字符串<br>
                • 功能更完整<br>
                • 适合复杂参数处理
            </div>
        </div>
        
        <button class="save-btn" onclick="saveConfig()">保存配置</button>
        
        <div id="status" class="status" style="display: none;"></div>
    </div>

    <script>
        let selectedMode = 'http'; // 默认HTTP模式

        // 从 cookie 读取 CSRF token (XSRF-TOKEN)
        function getCsrfToken() {
            const match = document.cookie.match(/XSRF-TOKEN=([^;]+)/);
            return match ? match[1] : "";
        }

        // 加载当前配置
        async function loadConfig() {
            try {
                const response = await fetch('/api/config/client-mode');
                const data = await response.json();
                selectedMode = data.mode || 'http';
                updateUI();
            } catch (error) {
                console.error('加载配置失败:', error);
                updateUI();
            }
        }
        
        // 更新UI
        function updateUI() {
            document.querySelectorAll('.mode-option').forEach(option => {
                option.classList.remove('active');
                if (option.dataset.mode === selectedMode) {
                    option.classList.add('active');
                }
            });
        }
        
        // 选择模式
        document.querySelectorAll('.mode-option').forEach(option => {
            option.addEventListener('click', () => {
                selectedMode = option.dataset.mode;
                updateUI();
            });
        });
        
        // 保存配置
        async function saveConfig() {
            try {
                const response = await fetch('/api/config/client-mode', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRF-Token': getCsrfToken()
                    },
                    body: JSON.stringify({ mode: selectedMode })
                });
                
                const result = await response.json();
                
                const status = document.getElementById('status');
                if (response.ok) {
                    status.className = 'status success';
                    status.textContent = '✅ 配置保存成功！重启服务后生效。';
                } else {
                    status.className = 'status error';
                    status.textContent = '❌ 配置保存失败：' + result.error;
                }
                status.style.display = 'block';
                
                setTimeout(() => {
                    status.style.display = 'none';
                }, 3000);
                
            } catch (error) {
                const status = document.getElementById('status');
                status.className = 'status error';
                status.textContent = '❌ 保存失败：' + error.message;
                status.style.display = 'block';
            }
        }
        
        // 页面加载时加载配置
        loadConfig();
    </script>
</body>
</html>
