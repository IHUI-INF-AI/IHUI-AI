<!DOCTYPE html>
<html>
<head>
    <title>智能体管理</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="/static/css/agent_management.css">
</head>
<body>
    <div class="container">
        <h1>智能体管理系统</h1>
        
        <div class="tabs">
            <div class="tab active" onclick="switchTab('create')">创建智能体</div>
            <div class="tab" onclick="switchTab('list')">智能体列表</div>
            <div class="tab" onclick="switchTab('callbacks')">回调记录</div>
        </div>
        
        <!-- 创建智能体 -->
        <div id="create-tab" class="tab-content active">
            <h2>创建新智能体</h2>
            <form id="createAgentForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>智能体名称 *:</label>
                        <input type="text" id="agentName" required>
                    </div>
                    <div class="form-group">
                        <label>版本号:</label>
                        <input type="text" id="agentVersion" value="1.0.0">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>智能体描述:</label>
                    <textarea id="agentDescription" rows="3" placeholder="描述智能体的功能和用途"></textarea>
                </div>
                
                <div class="form-group">
                    <label>头像URL:</label>
                    <input type="url" id="agentAvatar" placeholder="https://example.com/avatar.png">
                </div>
                
                <div class="form-group">
                    <label>提示词:</label>
                    <textarea id="agentPrompt" rows="5" placeholder="输入智能体的系统提示词"></textarea>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>使用模型:</label>
                        <select id="agentModel">
                            <option value="gpt-3.5-turbo">GPT-3.5 Turbo</option>
                            <option value="gpt-4">GPT-4</option>
                            <option value="claude-3">Claude-3</option>
                            <option value="gemini-pro">Gemini Pro</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>温度参数:</label>
                        <input type="number" id="agentTemperature" value="0.7" min="0" max="2" step="0.1">
                    </div>
                    <div class="form-group">
                        <label>最大Token数:</label>
                        <input type="number" id="agentMaxTokens" value="2048" min="1" max="8192">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>分类:</label>
                        <select id="category">
                            <option value="">选择分类</option>
                            <option value="assistant">助手</option>
                            <option value="creative">创意</option>
                            <option value="business">商务</option>
                            <option value="education">教育</option>
                            <option value="entertainment">娱乐</option>
                            <option value="productivity">效率</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>访问级别:</label>
                        <select id="accessLevel">
                            <option value="private">私有</option>
                            <option value="internal">内部</option>
                            <option value="public">公开</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>标签 (用逗号分隔):</label>
                    <input type="text" id="tags" placeholder="AI, 助手, 聊天">
                </div>
                
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="isPublic"> 公开发布
                    </label>
                </div>
                
                <div class="form-group">
                    <label>创建者名称:</label>
                    <input type="text" id="creatorName" value="admin">
                </div>
                
                <button type="submit" class="btn btn-primary">创建智能体</button>
            </form>
        </div>
        
        <!-- 智能体列表 -->
        <div id="list-tab" class="tab-content">
            <h2>智能体列表</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>状态筛选:</label>
                    <select id="statusFilter" onchange="loadAgents()">
                        <option value="">全部状态</option>
                        <option value="draft">草稿</option>
                        <option value="published">已发布</option>
                        <option value="unpublished">已下架</option>
                        <option value="rejected">已拒绝</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>分类筛选:</label>
                    <select id="categoryFilter" onchange="loadAgents()">
                        <option value="">全部分类</option>
                        <option value="assistant">助手</option>
                        <option value="creative">创意</option>
                        <option value="business">商务</option>
                        <option value="education">教育</option>
                        <option value="entertainment">娱乐</option>
                        <option value="productivity">效率</option>
                        <option value="coze_bot">Coze智能体</option>
                    </select>
                </div>
            </div>
            <div id="agentsList"></div>
        </div>
        
        <!-- 回调记录 -->
        <div id="callbacks-tab" class="tab-content">
            <h2>Coze回调记录</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>回调类型筛选:</label>
                    <select id="callbackTypeFilter" onchange="loadCallbacks()">
                        <option value="">全部类型</option>
                        <option value="bot.published">智能体发布</option>
                        <option value="bot.updated">智能体更新</option>
                        <option value="bot.unpublished">智能体下架</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>处理状态筛选:</label>
                    <select id="processStatusFilter" onchange="loadCallbacks()">
                        <option value="">全部状态</option>
                        <option value="pending">处理中</option>
                        <option value="success">成功</option>
                        <option value="failed">失败</option>
                    </select>
                </div>
            </div>
            <div id="callbacksList"></div>
        </div>
    </div>
    
    <script src="/static/js/agent_management.js"></script>
</body>
</html>
