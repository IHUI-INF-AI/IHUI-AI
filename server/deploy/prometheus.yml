# Prometheus scrape 配置 - P29 可观测性栈
# 抓取 zhs-server 指标 + OTel Collector 导出的指标
# 用法: 挂载到 prometheus 容器 /etc/prometheus/prometheus.yml

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: zhs-production
    region: cn-east-1

# 告警规则加载
rule_files:
  - /etc/prometheus/rules.yml

# Alertmanager 接入
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  # zhs-server 业务指标
  - job_name: zhs-server
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ["localhost:8000"]
        labels:
          service: zhs-server
          env: production

  # OTel Collector 导出的指标 (端口 8889)
  - job_name: otel-collector
    metrics_path: /metrics
    static_configs:
      - targets: ["otel-collector:8889"]
        labels:
          service: otel-collector

  # Prometheus 自监控
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
