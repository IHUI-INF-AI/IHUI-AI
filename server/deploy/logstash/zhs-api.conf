# Logstash 接收 ZHS API 日志配置
# 用于 codec/json_lines 解析 (每行一个 JSON 对象)
# 部署: /etc/logstash/conf.d/zhs-api.conf

input {
  tcp {
    port  => 5044
    codec => json_lines
    tags  => ["zhs-api", "jsonl"]
  }
}

# 也支持 beats (Filebeat/Metricbeat)
input {
  beats {
    port => 5045
    host => "0.0.0.0"
  }
}

filter {
  # 标记 ZHS API 来源
  if "zhs-api" in [tags] {
    mutate {
      add_field => {
        "[@metadata][target_index]" => "zhs-api-%{+YYYY.MM.dd}"
        "[@metadata][pipeline]"     => "zhs-api"
      }
    }
  }

  # 时间戳解析
  date {
    match  => ["@timestamp", "ISO8601"]
    target => "@timestamp"
  }

  # 提取 OpenTelemetry trace_id
  if [trace_id] and [trace_id] != "" {
    mutate {
      add_field => { "[@metadata][has_trace]" => "true" }
    }
  }

  # 用户脱敏 (敏感字段)
  if [extra][password] {
    mutate {
      replace => { "[extra][password]" => "******" }
    }
  }
  if [extra][token] {
    mutate {
      replace => { "[extra][token]" => "******" }
    }
  }
  if [extra][phone] {
    mutate {
      replace => { "[extra][phone]" => "***masked***" }
    }
  }

  # 限流指标增强
  if [extra][endpoint_class] {
    mutate {
      add_field => { "[metrics][endpoint_class]" => "%{[extra][endpoint_class]}" }
    }
  }

  # ERROR 级别告警通道
  if [level] == "ERROR" or [level] == "CRITICAL" {
    mutate {
      add_tag => ["alert"]
    }
  }
}

output {
  # 通用日志
  elasticsearch {
    hosts => ["http://es-cluster.internal:9200"]
    index => "%{[@metadata][target_index]}"
    user  => "${ES_USER}"
    password => "${ES_PASSWORD}"
    ilm_enabled => true
    ilm_policy => "zhs-api-30d"
  }

  # ERROR 级别额外输出到告警队列
  if "alert" in [tags] {
    elasticsearch {
      hosts => ["http://es-cluster.internal:9200"]
      index => "zhs-alerts-%{+YYYY.MM.dd}"
      user  => "${ES_USER}"
      password => "${ES_PASSWORD}"
    }
  }

  # 本地 debug
  if [@metadata][debug] {
    stdout {
      codec => rubydebug
    }
  }
}

# === ILM 策略 (30 天保留) ===
