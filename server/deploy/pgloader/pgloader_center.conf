# pgloader 配置: zhs_educational_center (中心模块) -> PostgreSQL
# 用法: pgloader deploy/pgloader/pgloader_center.conf
#
# 源库: MySQL zhs_educational_center
# 目标库: PostgreSQL zhs_platform (schema: center)
#
# 注意: 运行前需设置环境变量
#   export SOURCE_MYSQL_HOST=172.21.0.15
#   export SOURCE_MYSQL_USER=Raindrop_L
#   export SOURCE_MYSQL_PASSWORD=xxx
#   export TARGET_PG_HOST=127.0.0.1
#   export TARGET_PG_USER=zhs
#   export TARGET_PG_PASSWORD=zhs_pg_pass

LOAD DATABASE
  FROM mysql://Raindrop_L:password@172.21.0.15:3306/zhs_educational_center
  INTO postgresql://zhs:zhs_pg_pass@127.0.0.1:5432/zhs_platform

WITH include drop, create tables, create indexes, reset sequences,
     workers = 8, concurrency = 1, batch rows = 5000, prefetch rows = 5000

SET maintenance_work_mem to '128MB',
    work_mem to '12MB'

CAST type tinyint to smallint,
     type datetime to timestamp,
     type longtext to text,
     type enum to text,
     type char when (= precision 1) to boolean using tinyint-to-boolean,
     type bigint to bigint

BEFORE LOAD DO
  $$ CREATE SCHEMA IF NOT EXISTS center; $$,
  $$ SET search_path TO center, public; $$

ALTER schema 'zhs_educational_center' rename to 'center'
;
