  DB_PASSWORD: cGxhY2Vob2xkZXItZGI=
  # base64 of "placeholder-jwt"
  JWT_SECRET: cGxhY2Vob2xkZXItand0
  # base64 of "placeholder-vault"
  VAULT_TOKEN: cGxhY2Vob2xkZXItdmF1bHQ=
