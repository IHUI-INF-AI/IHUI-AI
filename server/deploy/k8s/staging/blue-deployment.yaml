# P29 minikube 演练: 蓝环境 Deployment
# 蓝绿发布 - 蓝环境 (当前活跃)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zhs-staging-api-blue
  namespace: zhs-staging
  labels:
    app: zhs-staging
    component: api
    slot: blue
    environment: staging
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: zhs-staging
      component: api
      slot: blue
  template:
    metadata:
      labels:
        app: zhs-staging
        component: api
        slot: blue
        environment: staging
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: api
          image: zhs-staging:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: zhs-staging-config
            - secretRef:
                name: zhs-staging-secret
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 40
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
