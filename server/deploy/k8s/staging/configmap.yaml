# P29 minikube 演练: ConfigMap
# ZHS staging 环境非敏感配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: zhs-staging-config
  namespace: zhs-staging
  labels:
    app: zhs-staging
    environment: staging
data:
  DB_HOST: "postgres.zhs-staging.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "zhs_staging"
  REDIS_HOST: "redis.zhs-staging.svc.cluster.local"
  REDIS_PORT: "6379"
  ENV: "staging"
  GUNICORN_WORKERS: "4"
  GUNICORN_TIMEOUT: "120"
  LOG_LEVEL: "debug"
