# P29 minikube 演练: Ingress
# ZHS staging 环境入口流量路由
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zhs-staging-ingress
  namespace: zhs-staging
  labels:
    app: zhs-staging
    environment: staging
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
spec:
  tls:
    - hosts:
        - api.staging.zhs.local
      secretName: zhs-staging-tls
  rules:
    - host: api.staging.zhs.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-service
                port:
                  number: 8000
