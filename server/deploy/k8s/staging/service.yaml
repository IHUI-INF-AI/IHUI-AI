# P29 minikube 演练: Service
# ZHS staging 环境 ClusterIP 服务
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: zhs-staging
  labels:
    app: zhs-staging
    component: api
    environment: staging
spec:
  type: ClusterIP
  selector:
    app: zhs-staging
    component: api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
