# P29-5 K8s 真实集群演练: Ingress
# ZHS 生产环境入口流量路由 (nginx ingress controller + TLS)
# 路径: / -> api-service:8000
# 域名: api.zhs-platform.com
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zhs-platform-ingress
  namespace: zhs-platform
  labels:
    app: zhs-platform
    environment: production
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - api.zhs-platform.com
      secretName: zhs-platform-tls
  rules:
    - host: api.zhs-platform.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-service
                port:
                  number: 8000
