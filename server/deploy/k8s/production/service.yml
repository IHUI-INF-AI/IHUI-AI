# P29-5 K8s 真实集群演练: Service
# ZHS 生产环境 API 服务暴露 (ClusterIP, 端口 8000)
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: zhs-platform
  labels:
    app: zhs-platform
    component: api
    environment: production
spec:
  type: ClusterIP
  selector:
    app: zhs-platform
    component: api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
