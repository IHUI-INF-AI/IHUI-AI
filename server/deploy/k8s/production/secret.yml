# P29-5 K8s 真实集群演练: Secret
# ZHS 生产环境敏感配置 (base64 编码占位符)
#
# 注意: 此处为占位符, 仅用于演练与本地测试.
# 生产环境请使用以下方案替代:
#   1. Sealed Secrets (bitnami-labs/sealed-secrets) - 加密后可安全提交 Git
#   2. HashiCorp Vault + External Secrets Operator - 集中密钥管理
#   3. 云厂商 KMS (阿里云 KMS / AWS Secrets Manager)
#
# 部署前请用真实值替换:
#   echo -n 'real-password' | base64
apiVersion: v1
kind: Secret
metadata:
  name: zhs-platform-secret
  namespace: zhs-platform
  labels:
    app: zhs-platform
    environment: production
type: Opaque
data:
  # 数据库密码 (base64 of "placeholder-db")
  DB_PASSWORD: cGxhY2Vob2xkZXItZGI=
  # JWT 密钥 (base64 of "placeholder-jwt")
  JWT_SECRET: cGxhY2Vob2xkZXItand0
  # Vault 令牌 (base64 of "placeholder-vault")
  VAULT_TOKEN: cGxhY2Vob2xkZXItdmF1bHQ=
