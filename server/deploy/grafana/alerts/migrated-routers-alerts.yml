groups:
  - name: migrated-router-alerts
    interval: 30s
    rules:
      # ---------------------------------------------------------------
      # Phase 1-6 迁移 router 健康度 (P0)
      # ---------------------------------------------------------------
      - alert: LLMWSErrorRateHigh
        expr: |
          sum(rate(zhs_migrated_router_requests_total{router="llm_ws",status=~"5.."}[5m]))
          /
          sum(rate(zhs_migrated_router_requests_total{router="llm_ws"}[5m])) > 0.05
        for: 3m
        labels:
          severity: critical
          category: migrated
          router: llm_ws
        annotations:
          summary: "核心 LLM WebSocket 错误率 > 5%"
          description: "迁移自 coze_zhs_py 的核心 LLM 流式接口 5 分钟内 5xx 比例超过 5%, 当前 {{ $value | humanizePercentage }}."

      - alert: LLMWSLatencyHigh
        expr: |
          histogram_quantile(0.95,
            sum(rate(zhs_migrated_router_request_duration_seconds_bucket{router="llm_ws"}[5m])) by (le)
          ) > 30
        for: 5m
        labels:
          severity: warning
          category: migrated
          router: llm_ws
        annotations:
          summary: "LLM WebSocket p95 延迟 > 30s"
          description: "LLM WS 95 分位响应延迟超过 30s (当前 {{ $value }}s), 影响流式对话体验."

      - alert: AgentUploadErrorRateHigh
        expr: |
          sum(rate(zhs_migrated_router_requests_total{router="agent_upload_process",status=~"5.."}[5m]))
          /
          sum(rate(zhs_migrated_router_requests_total{router="agent_upload_process"}[5m])) > 0.10
        for: 3m
        labels:
          severity: warning
          category: migrated
          router: agent_upload_process
        annotations:
          summary: "Agent 上传/处理 5xx 率 > 10%"
          description: "Agent 上传流程错误率过高, 当前 {{ $value | humanizePercentage }}."

      - alert: ResourceWatermarkErrorRateHigh
        expr: |
          sum(rate(zhs_migrated_router_requests_total{router="resource_watermark",status=~"5.."}[5m]))
          /
          sum(rate(zhs_migrated_router_requests_total{router="resource_watermark"}[5m])) > 0.05
        for: 3m
        labels:
          severity: warning
          category: migrated
          router: resource_watermark
        annotations:
          summary: "图片/视频水印服务错误率 > 5%"
          description: "水印服务 (ImageWatermarkUtil/VideoWatermarkUtil) 5xx 率过高, 影响内容发布."

      - alert: TBoxNotifyQueueStuck
        expr: |
          sum(rate(zhs_migrated_router_requests_total{router="tbox_notify"}[10m])) == 0
        for: 10m
        labels:
          severity: warning
          category: migrated
          router: tbox_notify
        annotations:
          summary: "TBox 智能体事件通知 10 分钟无流量"
          description: "TBox 通知 (TBoxController) 10 分钟内无任何请求, 可能是上游服务挂了或事件链路异常."

      - alert: TimbreWSConnectionsHigh
        expr: zhs_migrated_websocket_connections{router="timbre_generate"} > 500
        for: 5m
        labels:
          severity: warning
          category: migrated
          router: timbre_generate
        annotations:
          summary: "实时音色 WebSocket 连接数 > 500"
          description: "TimbreWebSocket 当前活跃连接 {{ $value }}, 接近容量上限."

      - alert: CategorySyncLatencyHigh
        expr: |
          histogram_quantile(0.95,
            sum(rate(zhs_migrated_router_request_duration_seconds_bucket{router="category_sync"}[5m])) by (le)
          ) > 5
        for: 5m
        labels:
          severity: warning
          category: migrated
          router: category_sync
        annotations:
          summary: "分类同步 p95 延迟 > 5s"
          description: "cozeZhsApi 分类同步端点响应慢, 影响下游分类下拉."

      # ---------------------------------------------------------------
      # DB 池 (建议 5.1)
      # ---------------------------------------------------------------
      - alert: DBPoolCheckoutTimeouts
        expr: rate(zhs_db_pool_checkout_timeouts_total[5m]) > 0.1
        for: 2m
        labels:
          severity: critical
          category: db
        annotations:
          summary: "数据库连接池取连接超时"
          description: "过去 5 分钟有 {{ $value }} 次/秒的连接池 checkout 超时, 需要扩容或排查慢 SQL."

      - alert: DBPoolUtilizationHigh
        expr: |
          zhs_db_pool_in_use / zhs_db_pool_size > 0.9
        for: 5m
        labels:
          severity: warning
          category: db
        annotations:
          summary: "数据库连接池使用率 > 90%"
          description: "engine={{ $labels.engine }} 连接池使用率 {{ $value | humanizePercentage }}, 建议扩容."
