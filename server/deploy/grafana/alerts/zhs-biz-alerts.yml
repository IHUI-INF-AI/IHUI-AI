# =====================================================================
# ZHS Platform 业务多租户告警规则 (建议 119)
# =====================================================================
# 覆盖:
#   - 业务 5xx > 1% 持续 5 分钟 → critical
#   - 慢 SQL > 100ms QPS > 10 持续 10 分钟 → warning
#   - 单一 tenant 流量超均值 5 倍 → warning (防单租户刷爆)
#   - 跨租户访问异常 (同一 request_id 命中多 tenant) → critical
#   - tenant 错误率分化 (某租户 5xx 显著高于均值) → warning
#   - 慢 SQL 单租户突增 (某租户慢 SQL 是均值 3 倍) → warning
#   - tenant 流量 0 活跃 (tenant 失联 5 分钟) → warning
#   - shadow 流量不一致率 (双写对照异常) → critical
#
# 部署位置: deploy/grafana/alerts/zhs-biz-alerts.yml
# 由 Prometheus rule_files 加载, 与 deploy/helm/zhs-platform/prometheus/rules.yml 并行
# =====================================================================

groups:
  # -----------------------------------------------------------------
  # Group 1: 业务 5xx / 慢 SQL / 跨租户异常
  # -----------------------------------------------------------------
  - name: zhs-biz-multitenant.rules
    interval: 30s
    rules:
      # ---------- 业务 5xx 错误率 (按 endpoint 拆分) ----------
      - alert: ZHSBiz5xxHigh
        expr: |
          sum by (endpoint) (rate(zhs_biz_requests_total{status=~"5.."}[5m]))
            / sum by (endpoint) (rate(zhs_biz_requests_total[5m])) > 0.01
        for: 5m
        labels:
          severity: critical
          service: zhs-platform
          category: biz-error-rate
        annotations:
          summary: "endpoint={{ $labels.endpoint }} 5xx > 1% (持续 5 分钟)"
          description: "近 5 分钟 5xx 错误率 {{ $value | humanizePercentage }}, 持续 5 分钟, 建议查 tenant={{ $labels.tenant_id }} 的日志."

      # ---------- 业务 4xx 错误率 (按 endpoint 拆分) ----------
      - alert: ZHSBiz4xxHigh
        expr: |
          sum by (endpoint) (rate(zhs_biz_requests_total{status=~"4.."}[5m]))
            / sum by (endpoint) (rate(zhs_biz_requests_total[5m])) > 0.20
        for: 10m
        labels:
          severity: warning
          service: zhs-platform
          category: biz-error-rate
        annotations:
          summary: "endpoint={{ $labels.endpoint }} 4xx > 20% (持续 10 分钟)"
          description: "近 5 分钟 4xx 错误率 {{ $value | humanizePercentage }}, 检查 tenant={{ $labels.tenant_id }} 鉴权是否过期."

      # ---------- 慢 SQL 速率 (按 engine 拆分, 带 trace) ----------
      - alert: ZHSSlowSQLHighQPS
        expr: |
          sum by (engine, table) (rate(zhs_slow_sql_with_trace_total[5m])) > 10
        for: 10m
        labels:
          severity: warning
          service: zhs-platform
          category: slow-sql
        annotations:
          summary: "{{ $labels.engine }}.{{ $labels.table }} 慢 SQL QPS > 10 (持续 10 分钟)"
          description: "近 5 分钟慢 SQL 速率 {{ $value }} 次/秒, tenant={{ $labels.tenant_id }}, 建议查 Loki 找 trace_id 定位."

      # ---------- 跨租户访问异常 ----------
      # 同一 request_id 命中多 tenant (用 tenant_id label 计数 > 1)
      # 实际项目可由 Loki 日志聚合生成, 此处用占位指标模拟
      - alert: ZHSCrossTenantAccess
        expr: |
          sum by (request_id) (
            count by (request_id, tenant_id) (zhs_biz_requests_total)
          ) > 1
        for: 2m
        labels:
          severity: critical
          service: zhs-platform
          category: cross-tenant
        annotations:
          summary: "request_id={{ $labels.request_id }} 跨多 tenant 访问"
          description: "同一 request_id 命中 {{ $value }} 个 tenant, 极可能是数据隔离 bug 或攻击, 立即排查."

      # -----------------------------------------------------------------
      # Group 2: 单一 tenant 异常 (防单租户刷爆 + 失联检测)
      # -----------------------------------------------------------------
  - name: zhs-biz-tenant-isolation.rules
    interval: 30s
    rules:
      # ---------- 单一 tenant 流量超均值 5 倍 ----------
      - alert: ZHSTenantTrafficSpike
        expr: |
          max by (tenant_id) (rate(zhs_biz_requests_total[5m]))
            > 5 * avg(rate(zhs_biz_requests_total[5m]))
        for: 5m
        labels:
          severity: warning
          service: zhs-platform
          category: tenant-isolation
        annotations:
          summary: "tenant={{ $labels.tenant_id }} 流量超均值 5 倍 (持续 5 分钟)"
          description: "该租户 QPS={{ $value }}, 可能刷数据或异常行为, 建议限流 / 临时禁用."

      # ---------- 单一 tenant 错误率显著高于均值 ----------
      - alert: ZHSTenantErrorRateHigh
        expr: |
          (
            sum by (tenant_id) (rate(zhs_biz_requests_total{status=~"5.."}[5m]))
            / sum by (tenant_id) (rate(zhs_biz_requests_total[5m]))
          )
            > 2 * (
              sum(rate(zhs_biz_requests_total{status=~"5.."}[5m]))
              / sum(rate(zhs_biz_requests_total[5m]))
            )
        for: 10m
        labels:
          severity: warning
          service: zhs-platform
          category: tenant-isolation
        annotations:
          summary: "tenant={{ $labels.tenant_id }} 5xx 率是均值 2 倍"
          description: "该租户错误率 {{ $value | humanizePercentage }}, 排查租户侧业务问题 (数据脏 / 集成 bug)."

      # ---------- 单一 tenant 慢 SQL 突增 ----------
      - alert: ZHSTenantSlowSQLSpike
        expr: |
          sum by (tenant_id, table) (rate(zhs_slow_sql_with_trace_total[5m]))
            > 3 * avg(rate(zhs_slow_sql_with_trace_total[5m]))
        for: 5m
        labels:
          severity: warning
          service: zhs-platform
          category: tenant-isolation
        annotations:
          summary: "tenant={{ $labels.tenant_id }} 表 {{ $labels.table }} 慢 SQL 是均值 3 倍"
          description: "可能租户数据膨胀, 建议查 PG 索引 + 业务 EXPLAIN."

      # ---------- tenant 失联 (突然 0 流量) ----------
      - alert: ZHSTenantOffline
        expr: |
          (
            sum by (tenant_id) (rate(zhs_biz_requests_total[5m])) == 0
          )
          and
          (
            sum by (tenant_id) (rate(zhs_biz_requests_total[1h] offset 5m)) > 0.1
          )
        for: 5m
        labels:
          severity: warning
          service: zhs-platform
          category: tenant-isolation
        annotations:
          summary: "tenant={{ $labels.tenant_id }} 失联 5 分钟"
          description: "该租户 5 分钟前还有流量, 现在骤降为 0, 可能是客户端故障 / DNS / 网关."

      # -----------------------------------------------------------------
      # Group 3: 影子流量一致性 (建议 120 接入后, 由 ShadowRouter 上报)
      # -----------------------------------------------------------------
  - name: zhs-biz-shadow-traffic.rules
    interval: 30s
    rules:
      # ---------- shadow 流量不一致率 ----------
      - alert: ZHSShadowTrafficMismatch
        expr: |
          sum(rate(zhs_shadow_compare_mismatch_total[5m]))
            / sum(rate(zhs_shadow_compare_total[5m])) > 0.05
        for: 5m
        labels:
          severity: critical
          service: zhs-platform
          category: shadow-traffic
        annotations:
          summary: "影子流量不一致率 > 5%"
          description: "近 5 分钟 {{ $value | humanizePercentage }} 影子请求与主请求响应不一致, 立即排查 tenant={{ $labels.tenant_id }} 业务差异."

      # ---------- shadow 流量数量级差异 ----------
      - alert: ZHSShadowTrafficMagnitude
        expr: |
          abs(
            sum by (tenant_id) (rate(zhs_shadow_compare_total[5m]))
            - sum by (tenant_id) (rate(zhs_biz_requests_total[5m]))
          )
            / sum by (tenant_id) (rate(zhs_biz_requests_total[5m])) > 0.3
        for: 5m
        labels:
          severity: warning
          service: zhs-platform
          category: shadow-traffic
        annotations:
          summary: "tenant={{ $labels.tenant_id }} 影子流量与主流量差距 > 30%"
          description: "可能 ShadowRouter 异常注入失败, 查 app/shadow_traffic.py 日志."

      # ---------- shadow 流量本身异常高 (压垮业务) ----------
      - alert: ZHSShadowTrafficOverhead
        expr: |
          sum(rate(zhs_shadow_request_duration_seconds_count[5m]))
            / sum(rate(zhs_biz_requests_total[5m])) > 0.5
        for: 10m
        labels:
          severity: warning
          service: zhs-platform
          category: shadow-traffic
        annotations:
          summary: "影子流量占比 > 50% (持续 10 分钟)"
          description: "影子请求数 = 实际请求数 * {{ $value }}, 灰度压垮生产, 立即调整 ZHS_SHADOW_TRAFFIC_RATIO."

      # -----------------------------------------------------------------
      # Group 4: Loki / 日志告警 (建议 119 配合 Loki 部署)
      # 实际由 Loki ruler 加载 loki-biz-alerts.yml
      # -----------------------------------------------------------------
