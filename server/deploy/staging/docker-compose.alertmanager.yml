# Alertmanager + Prometheus + 后端 端到端 docker-compose.
#
# 用法:
#   docker-compose -f deploy/staging/docker-compose.alertmanager.yml up -d
#   docker-compose -f deploy/staging/docker-compose.alertmanager.yml logs -f
#   docker-compose -f deploy/staging/docker-compose.alertmanager.yml down
#
# 组件:
#   - prometheus: 抓取 postgres-exporter / 业务 exporter / 自监控
#   - alertmanager: 应用告警规则 + 路由 + 抑制
#   - app: ZHS 平台后端 (接收 alertmanager webhook)
#   - postgres-exporter: 暴露 PG 指标给 prometheus
#   - grafana: 展示大盘 (可选)

version: "3.8"

networks:
  zhs-monitoring:
    driver: bridge

volumes:
  prometheus-data:
  alertmanager-data:
  grafana-data:

services:
  # PostgreSQL Exporter (暴露 PG 指标给 Prometheus)
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: zhs-postgres-exporter
    networks:
      - zhs-monitoring
    environment:
      DATA_SOURCE_NAME: "postgresql://zhs:zhs_pg_pass@pg-primary:5432/zhs_ai_project?sslmode=disable"
    ports:
      - "9187:9187"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9187/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Prometheus (抓取 exporter + 自监控 + 告警规则)
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: zhs-prometheus
    networks:
      - zhs-monitoring
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/rules.yml:/etc/prometheus/rules.yml:ro
      - prometheus-data:/prom
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prom"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    depends_on:
      postgres-exporter:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Alertmanager (接收 prometheus 告警 + 路由 + 推 8 通道)
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: zhs-alertmanager
    networks:
      - zhs-monitoring
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./monitoring/templates/:/etc/alertmanager/templates/:ro
      - alertmanager-data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.external-url=http://alertmanager.zhs.local:9093"
    ports:
      - "9093:9093"
    depends_on:
      - prometheus
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ZHS 平台后端 (接收 alertmanager webhook)
  app:
    image: zhs-platform:latest
    container_name: zhs-app
    networks:
      - zhs-monitoring
    environment:
      ENV: production
      DINGTALK_WEBHOOK: "${DINGTALK_WEBHOOK:-http://127.0.0.1:7001/dingtalk}"
      WECHAT_WORK_WEBHOOK: "${WECHAT_WORK_WEBHOOK:-http://127.0.0.1:7002/wechat}"
      FEISHU_WEBHOOK: "${FEISHU_WEBHOOK:-http://127.0.0.1:7003/feishu}"
      SLACK_WEBHOOK: "${SLACK_WEBHOOK:-http://127.0.0.1:7004/slack}"
      TEAMS_WEBHOOK: "${TEAMS_WEBHOOK:-http://127.0.0.1:7005/teams}"
      GENERIC_WEBHOOK_URL: "${GENERIC_WEBHOOK_URL:-http://127.0.0.1:7006/generic}"
      SMTP_HOST: "${SMTP_HOST:-smtp.example.com}"
      SMTP_PORT: "${SMTP_PORT:-465}"
      SMTP_USER: "${SMTP_USER:-alerts@example.com}"
      ALERT_EMAIL_TO: "${ALERT_EMAIL_TO:-oncall@example.com}"
      PAGERDUTY_ROUTING_KEY: "${PAGERDUTY_ROUTING_KEY:-mock-routing-key}"
      PAGERDUTY_API_URL: "${PAGERDUTY_API_URL:-https://events.pagerduty.com/v2/enqueue}"
    ports:
      - "8000:8000"
    depends_on:
      - alertmanager
    restart: unless-stopped

  # Grafana (展示大盘, 可选)
  grafana:
    image: grafana/grafana:11.2.0
    container_name: zhs-grafana
    networks:
      - zhs-monitoring
    volumes:
      - ./grafana/dashboards/:/var/lib/grafana/dashboards/:ro
      - ./grafana/provisioning/:/etc/grafana/provisioning/:ro
      - grafana-data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GF_ADMIN_PASSWORD:-admin}"
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
