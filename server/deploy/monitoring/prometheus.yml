# Prometheus 配置 (供 alertmanager + grafana 抓取)
#
# 在 docker-compose.alertmanager.yml 中挂载到 /etc/prometheus/prometheus.yml

global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    cluster: "zhs-staging"
    region: "cn-east-1"

# 告警规则加载
rule_files:
  - "/etc/prometheus/rules.yml"

# Alertmanager 接入
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

# 抓取目标
scrape_configs:
  # Prometheus 自监控
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # PostgreSQL Exporter
  - job_name: "postgres-exporter"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  # ZHS 平台后端 (业务指标)
  - job_name: "zhs-app"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["app:8000"]

  # Node Exporter (主机指标)
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  # Alertmanager 自监控
  - job_name: "alertmanager"
    static_configs:
      - targets: ["alertmanager:9093"]
