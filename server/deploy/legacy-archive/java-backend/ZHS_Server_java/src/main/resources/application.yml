  redis:
    port: 6379
#    host: 127.0.0.1
#    password:
    host: 172.21.0.15
    password: c61mK5QH
    # 数据库索引（默认 0，Redis 支持 0-15 共 16 个数据库）
    database: 0
    # 连接超时时间（毫秒）
    timeout: 3000ms
    # 连接池配置（使用 Lettuce 或 Jedis，Spring Boot 2.x+ 默认 Lettuce）
    lettuce:
      pool:
        # 最大连接数（默认 8）
        max-active: 8
        # 最大空闲连接（默认 8）
        max-idle: 8
        # 最小空闲连接（默认 0）
        min-idle: 2
        # 最大等待时间（毫秒，-1 表示无限制）
        max-wait: 1000ms

  # 动态多数据源配置（兼容 dynamic-datasource-spring-boot-starter）
  datasource:
    dynamic:
