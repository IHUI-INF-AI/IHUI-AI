<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="renderer" content="webkit">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link rel="icon" type="image/png" href="/favicon.ico">
    <link rel="shortcut icon" type="image/png" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/favicon.ico">
    <!-- 预加载字体文件，优化字体加载性能 -->
    <!-- 字体预加载已移至 fonts-unified.scss，此处不再需要 -->
    <title>智汇AI管理端</title>
    <!--[if lt IE 11]><script>window.location.href='/html/ie.html';</script><![endif]-->
	  <style>
    html,
    body,
    #app {
      height: 100vh;
      max-height: 100vh;
      width: 100%;
      max-width: 100%;
      margin: 0px;
      padding: 0px;
      overflow: hidden;
      /* 默认白色背景，避免白屏，主题类会覆盖 */
      background-color: #ffffff;
    }
    .chromeframe {
      margin: 0.2em 0;
      background: #ccc;
      color: #000;
      padding: 0.2em 0;
    }

  </style>
  <script>
    // 抑制 sockjs-client 的 removeEventListener 弃用警告
    // 必须在所有其他脚本之前执行，在页面加载前覆盖相关方法
    (function() {
      if (typeof window !== 'undefined') {
        // 保存原始方法（只保存需要的）
        const originalRemoveEventListener = window.removeEventListener;
        
        // 覆盖 removeEventListener 以抑制弃用警告
        window.removeEventListener = function(type, listener, options) {
          try {
            // 检查调用栈，如果是来自 sockjs-client，则静默处理
            const stack = new Error().stack || '';
            if (stack.includes('sockjs-client') || stack.includes('sockjs.js')) {
              // 静默执行，不抛出警告
              try {
                return originalRemoveEventListener.call(this, type, listener, options);
              } catch (e) {
                // 如果是弃用相关的错误，完全忽略
                return;
              }
            }
            return originalRemoveEventListener.call(this, type, listener, options);
          } catch (e) {
            // 如果是弃用警告相关的错误，静默忽略
            if (e && (String(e.message || '') + String(e.stack || '')).includes('deprecated')) {
              return;
            }
            throw e;
          }
        };
        
        // 注意：不再覆盖 console 方法，以保持控制台的完整功能（包括复制、筛选等）
        // 只通过 removeEventListener 的覆盖来抑制 sockjs-client 的弃用警告
        // 这样可以确保控制台的所有原生功能正常工作
      }
    })();
  </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
