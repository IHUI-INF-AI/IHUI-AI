# OTel Collector 配置 - P29 可观测性栈
# 接收应用 OTLP 数据, 经处理后导出到 Prometheus / Jaeger / 日志
# 用法: 挂载到 otel-collector 容器 /etc/otelcol/config.yaml

receivers:
  # OTLP gRPC 接收 (应用推送 trace/metrics)
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  # 批量处理, 降低导出频率
  batch:
    timeout: 5s
    send_batch_size: 1024
  # 内存限制, 防止 OOM
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128
  # 资源属性补充
  resource:
    attributes:
      - key: deployment.environment
        value: production
        action: upsert

exporters:
  # Prometheus 指标导出 (端口 8889)
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: zhs
  # Jaeger trace 导出 (端口 14250)
  jaeger:
    endpoint: jaeger:14250
    tls:
      insecure: true
  # 日志导出 (调试用)
  logging:
    loglevel: info

service:
  pipelines:
    # Trace 管道
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [jaeger, logging]
    # 指标管道
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [prometheus, logging]
    # 日志管道
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [logging]
