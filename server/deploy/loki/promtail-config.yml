# ZHS Platform Promtail 配置 (建议 116)
# 收集容器日志 + 业务 app 日志 (JSON), 推到 Loki

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /tmp/positions.yaml

# Loki 推送地址
clients:
  - url: http://loki:3100/loki/api/v1/push
    batchwait: 1s
    batchsize: 1048576
    backoff_config:
      min_period: 500ms
      max_period: 5m
      max_retries: 10

# 抓取配置
scrape_configs:
  # ---------------------------------------------------------------------------
  # 1. Docker 容器日志 (所有容器)
  # ---------------------------------------------------------------------------
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["zhs=true"]   # 只抓带 zhs=true label 的容器
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_label_zhs_service']
        target_label: 'service'
      - source_labels: ['__meta_docker_container_label_zhs_tenant']
        target_label: 'tenant_id'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'log_stream'
    pipeline_stages:
      # 尝试解析 JSON (业务 app 用 ZHS_LOG_FORMAT=json)
      - json:
          expressions:
            level: level
            request_id: request_id
            trace_id: trace_id
            tenant_id: tenant_id
            user_id: user_id
            module: module
            engine: engine
            table: table
          source: message
      - labels:
          level:
          request_id:
          trace_id:
          tenant_id:
          service:
          container:

  # ---------------------------------------------------------------------------
  # 2. 业务 app 文件日志 (宿主机 /var/log/zhs/*.jsonl)
  # ---------------------------------------------------------------------------
  - job_name: zhs-app-files
    static_configs:
      - targets:
          - localhost
        labels:
          service: zhs-platform
          job: zhs-app-files
          __path__: /var/log/zhs/*.jsonl
    pipeline_stages:
      - json:
          expressions:
            level: level
            request_id: request_id
            trace_id: trace_id
            tenant_id: tenant_id
            user_id: user_id
            module: module
            engine: engine
            table: table
            time: time
            message: message
      - labels:
          level:
          request_id:
          tenant_id:
          service:
