# ZHS Platform Loki 配置 (建议 116)
# 收集 ZHS Platform app 日志 (JSON 格式), 按 service / tenant / level 索引

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info
  graceful_shutdown_timeout: 30s

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: 744h  # 31 天
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32
  # 建议 116: 按 service 限流, 防止单租户刷爆
  per_stream_rate_limit: 8MB
  per_stream_rate_limit_burst: 16MB
  max_query_length: 30d
  max_query_parallelism: 32

# 查询前端
query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

# 建议 116: 规则 — 检测单租户错误率突增
ruler:
  alertmanager_url: http://alertmanager:9093
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /loki/rules-tmp
  ring:
    kvstore:
      store: inmemory
  enable_api: true

# 告警规则 (Loki LogQL)
frontend:
  max_outstanding_per_tenant: 2048
  compress_responses: true
