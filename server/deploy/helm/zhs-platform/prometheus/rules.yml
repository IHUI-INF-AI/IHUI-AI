# Prometheus 告警规则 (8 大类: 实例/连接/死锁/回滚/缓存/复制/膨胀/长事务)
# 项目硬约束要求覆盖 8 类场景, 本文件已实现.
# 建议 117: 新增业务指标多租户聚合告警 (zhs_biz_requests_total + sum by (tenant))

groups:
  # 0. 业务指标多租户告警 (建议 117)
  - name: zhs-biz-tenant-traffic
    interval: 30s
    rules:
      - alert: BizTenantTrafficSpike
        expr: sum by (tenant) (rate(zhs_biz_requests_total[5m])) > 10
        for: 5m
        labels:
          severity: warning
          category: biz-tenant
        annotations:
          summary: "租户 {{ $labels.tenant }} 业务 QPS {{ $value }}"
          description: "某租户 5 分钟内业务请求速率 > 10 req/s, 可能是异常流量或限流未生效"

      - alert: BizTenantErrorRateHigh
        expr: |
          sum by (tenant) (rate(zhs_biz_requests_total{status="500"}[5m]))
          /
          clamp_min(sum by (tenant) (rate(zhs_biz_requests_total[5m])), 1) > 0.1
        for: 5m
        labels:
          severity: critical
          category: biz-tenant
        annotations:
          summary: "租户 {{ $labels.tenant }} 业务错误率 {{ $value | humanizePercentage }}"
          description: "某租户 5xx 错误率 > 10%, 检查业务逻辑/下游依赖"

      - alert: BizTenantNoTraffic
        expr: sum by (tenant) (zhs_biz_requests_total) == 0
        for: 30m
        labels:
          severity: info
          category: biz-tenant
        annotations:
          summary: "租户 {{ $labels.tenant }} 30 分钟无业务流量"
          description: "某租户长时间无业务请求, 可能是租户停用或接入故障"

  # 1. 实例存活
  - name: zhs-pg-instance
    interval: 30s
    rules:
      - alert: PGInstanceDown
        expr: pg_up == 0
        for: 2m
        labels:
          severity: critical
          category: instance
        annotations:
          summary: "PG 实例 {{ $labels.instance }} down"
          description: "PostgreSQL 实例 {{ $labels.instance }} 不可达 2 分钟, 检查网络/进程"

  # 2. 连接数
  - name: zhs-pg-connections
    interval: 30s
    rules:
      - alert: PGConnectionsHigh
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
          category: connection
        annotations:
          summary: "PG {{ $labels.instance }} 连接数 {{ $value }}"
          description: "活跃连接数持续 5 分钟 > 80, 阈值 100"

      - alert: PGConnectionsExhausted
        expr: pg_stat_activity_count > 95
        for: 1m
        labels:
          severity: critical
          category: connection
        annotations:
          summary: "PG {{ $labels.instance }} 连接数 {{ $value }} 接近上限"

  # 3. 死锁
  - name: zhs-pg-deadlocks
    interval: 30s
    rules:
      - alert: PGDeadlockDetected
        expr: increase(pg_stat_database_deadlocks[5m]) > 0
        for: 1m
        labels:
          severity: warning
          category: deadlock
        annotations:
          summary: "PG {{ $labels.instance }} 检测到 {{ $value }} 次死锁"
          description: "5 分钟内发生 {{ $value }} 次死锁, 检查应用事务设计"

  # 4. 事务回滚
  - name: zhs-pg-rollback
    interval: 30s
    rules:
      - alert: PGRollbackHigh
        expr: |
          rate(pg_stat_database_xact_rollback[5m]) /
          (rate(pg_stat_database_xact_rollback[5m]) + rate(pg_stat_database_xact_commit[5m])) > 0.1
        for: 5m
        labels:
          severity: warning
          category: rollback
        annotations:
          summary: "PG {{ $labels.instance }} 事务回滚率 {{ $value | humanizePercentage }}"

  # 5. 缓存命中率
  - name: zhs-pg-cache
    interval: 30s
    rules:
      - alert: PGCacheHitLow
        expr: |
          rate(pg_stat_database_blks_hit[5m]) /
          (rate(pg_stat_database_blks_hit[5m]) + rate(pg_stat_database_blks_read[5m])) < 0.95
        for: 10m
        labels:
          severity: warning
          category: cache
        annotations:
          summary: "PG {{ $labels.instance }} 缓存命中率 {{ $value | humanizePercentage }}"
          description: "缓存命中率持续 10 分钟 < 95%, 检查 shared_buffers / 工作集"

  # 6. 复制延迟
  - name: zhs-pg-replication
    interval: 30s
    rules:
      - alert: PGReplicationLagHigh
        expr: pg_stat_replication_lag > 30
        for: 5m
        labels:
          severity: warning
          category: replication
        annotations:
          summary: "PG replica {{ $labels.instance }} 延迟 {{ $value }}s"

  # 7. 表膨胀
  - name: zhs-pg-bloat
    interval: 5m
    rules:
      - alert: PGBloatHigh
        expr: |
          (pg_stat_user_tables_n_live_tup * 100) > 1000000
          AND
          (pg_stat_user_tables_n_dead_tup / pg_stat_user_tables_n_live_tup) > 0.2
        for: 30m
        labels:
          severity: warning
          category: bloat
        annotations:
          summary: "PG 表 {{ $labels.relname }} 膨胀率 {{ $value | humanizePercentage }}"
          description: "建议执行 VACUUM FULL 或 pg_repack"

  # 8. 长事务
  - name: zhs-pg-longtx
    interval: 30s
    rules:
      - alert: PGLongTransaction
        expr: pg_stat_activity_max_tx_duration > 300
        for: 1m
        labels:
          severity: warning
          category: longtx
        annotations:
          summary: "PG {{ $labels.instance }} 存在 {{ $value }}s 长事务"
          description: "长事务持有锁 5+ 分钟, 可能阻塞 vacuum / ddl"

      - alert: PGLongTransactionCritical
        expr: pg_stat_activity_max_tx_duration > 1800
        for: 1m
        labels:
          severity: critical
          category: longtx
        annotations:
          summary: "PG {{ $labels.instance }} 存在 {{ $value }}s (30min+) 极长事务"
