# 智护数平台 - 默认 values
# 生产环境可使用 -f values.prod.yaml 覆盖

replicaCount: 2

# Grafana dashboard 自动加载 (ConfigMap + sidecar 模式, 默认开启)
grafanaDashboards:
  enabled: true

image:
  repository: zhs/platform
  pullPolicy: IfNotPresent
  tag: "1.0.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8000"
  prometheus.io/path: "/metrics"

podSecurityContext:
  fsGroup: 2000

securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: zhs.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - zhs.example.com
      secretName: zhs-tls

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

# 应用配置 (以 Secret/ConfigMap 形式注入)
app:
  env: production
  logLevel: info
  corsOrigins: "https://zhs.example.com"

# 数据库 (生产 PostgreSQL, 默认不启用, 由运维在外部提供)
database:
  # 三个独立库: ai / center / course
  ai:
    host: pg-ai.zhs.svc.cluster.local
    port: 5432
    name: zhs_ai_project
    user: zhs_ai
    passwordSecret: zhs-db-ai
    passwordKey: password
  center:
    host: pg-center.zhs.svc.cluster.local
    port: 5432
    name: zhs_center_project
    user: zhs_center
    passwordSecret: zhs-db-center
    passwordKey: password
  course:
    host: pg-course.zhs.svc.cluster.local
    port: 5432
    name: zhs_educational_training
    user: zhs_course
    passwordSecret: zhs-db-course
    passwordKey: password

# Redis
redis:
  host: redis.zhs.svc.cluster.local
  port: 6379
  passwordSecret: zhs-redis
  passwordKey: password
  db: 0

# JWT
jwt:
  secretSecret: zhs-jwt
  secretKey: secret
  algorithm: HS256
  accessMinutes: 60
  refreshDays: 7

# HLS 切片
hls:
  segmentTime: 6
  bitrates:
    - name: 1080p
      height: 1080
      bitrate: 5000k
    - name: 720p
      height: 720
      bitrate: 2800k
    - name: 480p
      height: 480
      bitrate: 1400k
  storageDir: /data/hls

# WebSocket
websocket:
  heartbeatSeconds: 30
  maxConnections: 5000

# 业务指标
metrics:
  enabled: true
  path: /metrics

# PostgreSQL Exporter (Prometheus 监控, 默认开启)
postgresExporter:
  enabled: true
  image: prometheuscommunity/postgres-exporter:v0.15.0
  port: 9187
  # 数据源 Secret (包含 datasource 键, 值为 postgresql://user:pass@host:port/db?sslmode=disable)
  datasourceSecret: zhs-pg-exporter-dsn
  datasourceKey: datasource
  # 资源配额
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi
  # 自动发现所有库 (false = 仅监控指定库)
  autoDiscoverDatabases: false

# 前端 (静态资源, 可选 CDN)
frontend:
  enabled: true
  staticPath: /data/static

# 存储卷
persistence:
  hls:
    enabled: true
    size: 50Gi
    storageClassName: ssd
    accessModes:
      - ReadWriteOnce
  static:
    enabled: true
    size: 5Gi
    storageClassName: standard
    accessModes:
      - ReadWriteOnce

# 健康检查
livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

# 优雅停机
terminationGracePeriodSeconds: 30
