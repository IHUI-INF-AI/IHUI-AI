# 智护数平台 - 生产环境 values 覆盖

replicaCount: 4

image:
  repository: harbor.zhs.local/platform/zhs-platform
  pullPolicy: Always
  tag: "1.0.0-prod"

resources:
  limits:
    cpu: 2000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 4
  maxReplicas: 20
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 75

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "200m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "1200"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "1200"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_http_version 1.1;
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: api.zhs.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - api.zhs.example.com
      secretName: zhs-tls-prod

# 跨 AZ 反亲和, Pod 不要全跑在同节点
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: zhs-platform
              app.kubernetes.io/instance: zhs
          topologyKey: topology.kubernetes.io/zone

tolerations:
  - key: "workload"
    operator: "Equal"
    value: "api"
    effect: "NoSchedule"

# 数据库指向运维托管的 PostgreSQL
database:
  ai:
    host: pg-ai.zhs-prod.svc.cluster.local
    port: 5432
    name: zhs_ai_project
    user: zhs_ai_app
  center:
    host: pg-center.zhs-prod.svc.cluster.local
    port: 5432
    name: zhs_center_project
    user: zhs_center_app
  course:
    host: pg-course.zhs-prod.svc.cluster.local
    port: 5432
    name: zhs_educational_training
    user: zhs_course_app

# Redis 哨兵模式
redis:
  host: redis-sentinel.zhs-prod.svc.cluster.local
  port: 26379
  db: 0

# 业务参数
websocket:
  heartbeatSeconds: 30
  maxConnections: 20000

hls:
  segmentTime: 4
  storageDir: /data/hls
