apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "zhs-platform.fullname" . }}-config
  labels:
    {{- include "zhs-platform.labels" . | nindent 4 }}
data:
  ENV: {{ .Values.app.env | quote }}
  LOG_LEVEL: {{ .Values.app.logLevel | quote }}
  CORS_ORIGINS: {{ .Values.app.corsOrigins | quote }}
  REDIS_HOST: {{ .Values.redis.host | quote }}
  REDIS_PORT: {{ .Values.redis.port | toString | quote }}
  REDIS_DB: {{ .Values.redis.db | toString | quote }}
  DB1_HOST: {{ .Values.database.ai.host | quote }}
  DB1_PORT: {{ .Values.database.ai.port | toString | quote }}
  DB1_NAME: {{ .Values.database.ai.name | quote }}
  DB1_USER: {{ .Values.database.ai.user | quote }}
  DB2_HOST: {{ .Values.database.center.host | quote }}
  DB2_PORT: {{ .Values.database.center.port | toString | quote }}
  DB2_NAME: {{ .Values.database.center.name | quote }}
  DB2_USER: {{ .Values.database.center.user | quote }}
  DB3_HOST: {{ .Values.database.course.host | quote }}
  DB3_PORT: {{ .Values.database.course.port | toString | quote }}
  DB3_NAME: {{ .Values.database.course.name | quote }}
  DB3_USER: {{ .Values.database.course.user | quote }}
  HLS_SEGMENT_TIME: {{ .Values.hls.segmentTime | toString | quote }}
  HLS_STORAGE_DIR: {{ .Values.hls.storageDir | quote }}
  HLS_BITRATES: {{ "1080p:5000k,720p:2800k,480p:1400k" | quote }}
  WS_HEARTBEAT_SECONDS: {{ .Values.websocket.heartbeatSeconds | toString | quote }}
  WS_MAX_CONNECTIONS: {{ .Values.websocket.maxConnections | toString | quote }}
  METRICS_ENABLED: {{ .Values.metrics.enabled | toString | quote }}
  METRICS_PATH: {{ .Values.metrics.path | quote }}
  FRONTEND_STATIC_PATH: {{ .Values.frontend.staticPath | quote }}
