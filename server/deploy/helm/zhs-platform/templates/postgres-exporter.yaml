{{/*
PostgreSQL Exporter Deployment + Service (Prometheus 监控).

触发条件: .Values.postgresExporter.enabled = true (默认 true).
依赖: 外部 PostgreSQL 服务 + Secret (zhs-pg-exporter-dsn, 包含 datasource 键).
*/}}
{{- if .Values.postgresExporter.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zhs-platform.fullname" . }}-postgres-exporter
  labels:
    {{- include "zhs-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "zhs-platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres-exporter
  template:
    metadata:
      labels:
        {{- include "zhs-platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgres-exporter
    spec:
      containers:
        - name: postgres-exporter
          image: {{ .Values.postgresExporter.image }}
          imagePullPolicy: IfNotPresent
          env:
            - name: DATA_SOURCE_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresExporter.datasourceSecret }}
                  key: {{ .Values.postgresExporter.datasourceKey }}
            - name: PG_EXPORTER_AUTO_DISCOVER_DATABASES
              value: {{ .Values.postgresExporter.autoDiscoverDatabases | quote }}
            - name: PG_EXPORTER_DISABLE_DEFAULT_METRICS
              value: "false"
            - name: PG_EXPORTER_DISABLE_SETTINGS_METRICS
              value: "true"
            - name: TZ
              value: Asia/Shanghai
          ports:
            - name: metrics
              containerPort: {{ .Values.postgresExporter.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            {{- toYaml .Values.postgresExporter.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "zhs-platform.fullname" . }}-postgres-exporter
  labels:
    {{- include "zhs-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres-exporter
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: {{ .Values.postgresExporter.port }}
      targetPort: metrics
      protocol: TCP
  selector:
    {{- include "zhs-platform.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres-exporter
{{- end }}
