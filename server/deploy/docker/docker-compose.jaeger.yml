# Docker Compose — Jaeger APM 链路追踪
# 用法:
#   docker compose -f deploy/docker/docker-compose.jaeger.yml up -d
#   # 应用配置 OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
#   # 浏览器访问 http://localhost:16686 查看 trace
#   docker compose -f deploy/docker/docker-compose.jaeger.yml down

version: "3.9"

services:
  jaeger:
    image: jaegertracing/all-in-one:1.62
    restart: always
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      # 内存存储 (dev/staging 用, 生产改用 Elasticsearch/Cassandra)
      SPAN_STORAGE_TYPE: memory
      # 采样率 (Jaeger 自身采样, 与应用端 OTEL_TRACES_SAMPLER_ARG 独立)
      SAMPLING_STRATEGIES_FILE: /etc/jaeger/sampling_strategies.json
      TZ: Asia/Shanghai
    volumes:
      - ../../jaeger/sampling_strategies.json:/etc/jaeger/sampling_strategies.json:ro
    ports:
      # OTLP gRPC (应用推送 trace)
      - "4317:4317"
      # OTLP HTTP (备选)
      - "4318:4318"
      # Jaeger UI
      - "16686:16686"
      # Jaeger Collector gRPC (legacy)
      - "14250:14250"
      # Jaeger Collector HTTP (legacy)
      - "14268:14268"
      # Zipkin 兼容 (可选)
      - "9411:9411"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:16686"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - zhs_apm

networks:
  zhs_apm:
    driver: bridge
