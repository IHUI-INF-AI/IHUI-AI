# Docker Compose 编排 — ZHS Platform 生产环境
# 完整 PostgreSQL 架构
# 用法:
#   cp .env.production.template .env.production  # 填入真实值
#   docker compose up -d
#   docker compose exec api alembic upgrade head
#   docker compose logs -f api

version: "3.9"

x-common-env: &common-env
  ENV: production
  TZ: Asia/Shanghai
  PYTHONUNBUFFERED: "1"

services:
  # ---------- PostgreSQL 主库 (三套分库 schema 隔离) ----------
  postgres:
    image: postgres:14-alpine
    restart: always
    environment:
      POSTGRES_DB: ${PG_DATABASE:-zhs_platform}
      POSTGRES_USER: ${PG_USER:-zhs}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-zhs_pg_pass}
      TZ: Asia/Shanghai
      # multi-tenant: 启用后建议用独立 schema 隔离租户数据
      MULTI_TENANT_ENABLED: ${MULTI_TENANT_ENABLED:-false}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../alembic/versions/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
      - ../../docker/postgresql/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-zhs} -d ${PG_DATABASE:-zhs_platform}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------- pgBouncer (PostgreSQL 连接池) ----------
  pgbouncer:
    image: edoburu/pgbouncer:1.22.0
    restart: always
    environment:
      DB_USER: ${PG_USER:-zhs}
      DB_PASSWORD: ${PG_PASSWORD:-zhs_pg_pass}
      DB_HOST: postgres
      DB_PORT: 5432
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 50
      AUTH_TYPE: trust
      TZ: Asia/Shanghai
    volumes:
      - ../../docker/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ../../docker/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    ports:
      - "6432:6432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U ${PG_USER:-zhs}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- Redis ----------
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ---------- API 服务 ----------
  api:
    build: .
    restart: always
    environment:
      <<: *common-env
      # PostgreSQL 3 套引擎 (通过 schema 隔离)
      DB1_URL: postgresql+psycopg2://${PG_USER:-zhs}:${PG_PASSWORD:-zhs_pg_pass}@postgres:5432/${PG_DATABASE:-zhs_platform}
      DB2_URL: postgresql+psycopg2://${PG_USER:-zhs}:${PG_PASSWORD:-zhs_pg_pass}@postgres:5432/${PG_DATABASE:-zhs_platform}
      DB3_URL: postgresql+psycopg2://${PG_USER:-zhs}:${PG_PASSWORD:-zhs_pg_pass}@postgres:5432/${PG_DATABASE:-zhs_platform}
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      GOOGLE_APP_ID: ${GOOGLE_APP_ID}
      GOOGLE_ANDROID_ID: ${GOOGLE_ANDROID_ID}
      GOOGLE_SECRET: ${GOOGLE_SECRET}
      VIDEO_ROOT: /data/videos
      OSS_ENDPOINT: ${OSS_ENDPOINT}
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET}
      OSS_BUCKET: ${OSS_BUCKET}
      JWT_SECRET: ${JWT_SECRET}
      # OpenTelemetry APM → Jaeger OTLP
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_EXPORTER_OTLP_INSECURE: "1"
      ZHS_PLATFORM_SERVICE_NAME: zhs-platform
      OTEL_TRACES_SAMPLER_ARG: "0.1"
      ZHS_OTEL_SAMPLE_BUSINESS: "1.0"
      ZHS_OTEL_SAMPLE_RATIO: "0.1"
    volumes:
      - video_data:/data/videos
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------- Jaeger APM 链路追踪 ----------
  jaeger:
    image: jaegertracing/all-in-one:1.62
    restart: always
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: memory
      TZ: Asia/Shanghai
    ports:
      - "4317:4317"
      - "4318:4318"
      - "16686:16686"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:16686"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ---------- PostgreSQL Exporter (Prometheus 监控) ----------
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    restart: always
    environment:
      DATA_SOURCE_NAME: "postgresql://${PG_USER:-zhs}:${PG_PASSWORD:-zhs_pg_pass}@postgres:5432/zhs_ai_project?sslmode=disable"
      PG_EXPORTER_AUTO_DISCOVER_DATABASES: "false"
      PG_EXPORTER_DISABLE_DEFAULT_METRICS: "false"
      PG_EXPORTER_DISABLE_SETTINGS_METRICS: "true"
      TZ: Asia/Shanghai
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:9187/metrics"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ---------- Prometheus 监控 ----------
  prometheus:
    image: prom/prometheus:v2.54.0
    restart: always
    volumes:
      - ../../docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../docker/prometheus/prometheus-federate.yml:/etc/prometheus/prometheus-federate.yml:ro
      - ../../docker/prometheus/rules.yml:/etc/prometheus/rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    depends_on:
      - postgres-exporter

  # ---------- Nginx 反向代理 (HTTPS + 静态资源) ----------
  nginx:
    image: nginx:alpine
    restart: always
    volumes:
      - ../../nginx.conf:/etc/nginx/nginx.conf:ro
      - ../../app/static:/usr/share/nginx/html/static:ro
      - ../../certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  video_data:
  prometheus_data:
