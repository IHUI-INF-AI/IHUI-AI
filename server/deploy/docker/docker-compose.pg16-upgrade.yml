# PostgreSQL 16 升级 staging 环境
# 用法: docker-compose -f deploy/docker/docker-compose.pg16-upgrade.yml up -d
#
# 升级流程 (逻辑升级方案 A):
#   1. 启动 PG16 新实例 (本文件)
#   2. 从 PG14 全量备份恢复到 PG16
#   3. 验证数据一致性
#   4. 切换应用连接串
#   5. 下线 PG14
#
# 注意: PG16 实例使用独立数据卷 pg16_data, 不影响 PG14 数据
version: "3.9"

services:
  # ---------- PostgreSQL 16 新实例 (升级目标) ----------
  postgres16:
    image: postgres:16-alpine
    restart: "no"  # 升级期间不自动重启
    environment:
      POSTGRES_DB: ${PG_DATABASE:-zhs_platform}
      POSTGRES_USER: ${PG_USER:-zhs}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-zhs_pg_pass}
      TZ: Asia/Shanghai
    volumes:
      - pg16_data:/var/lib/postgresql/data
      - ../../docker/postgresql/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ../../alembic/versions/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    ports:
      - "5433:5432"  # 端口 5433 避免与 PG14 冲突
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-zhs} -d ${PG_DATABASE:-zhs_platform}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pg16_data:
