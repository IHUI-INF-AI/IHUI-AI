# HashiCorp Vault 开发环境 (密钥管理)
#
# 用法: docker-compose -f deploy/docker/docker-compose.vault.yml up -d
#
# 初始化:
#   docker exec -it vault vault operator init
#   docker exec -it vault vault operator unseal <key>
#   vault login <root_token>
#   vault secrets enable -path=secret kv
#   vault kv put secret/zhs/pg-backup encryption_key="<32+字符密钥>"
version: "3.9"

services:
  vault:
    image: hashicorp/vault:1.15.2
    restart: always
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_ROOT_TOKEN:-root}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - vault_data:/vault/data

volumes:
  vault_data:
