# PostgreSQL 17 staging 环境部署
#
# 用途: PG17 升级前的 staging 环境验证
# 端口: 5434 (避免与 PG14:5432, PG16:5433 冲突)
# 数据卷: pg17_staging_data (独立)
#
# 使用: docker compose -f deploy/docker/docker-compose.pg17-staging.yml up -d
version: "3.8"

services:
  postgres17:
    image: postgres:17-alpine
    restart: "no"
    environment:
      POSTGRES_DB: ${PG_DATABASE:-zhs_platform}
      POSTGRES_USER: ${PG_USER:-zhs}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-zhs_pg_pass}
      TZ: Asia/Shanghai
    volumes:
      - pg17_staging_data:/var/lib/postgresql/data
      - ../../docker/postgresql/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ../../alembic/versions/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-zhs} -d ${PG_DATABASE:-zhs_platform}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pg17_staging_data:
