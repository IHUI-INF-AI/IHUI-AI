# Docker Compose 编排 — P29-5 Staging 环境适配层中间件
#
# 用法:
#   docker compose --env-file config/staging.env -f deploy/docker/docker-compose.staging.yml up -d
#   python scripts/p29_init_staging.py
#
# 包含服务:
#   - Vault:      HashiCorp 密钥管理 (dev 模式, 端口 8200)
#   - ClickHouse: OLAP 列式数仓 (HTTP 8123 / Native 9000)
#   - Consul:     HashiCorp 服务注册中心 (dev 模式, UI 8500)
#   - Etcd:       备选服务注册中心 (端口 2379)
#
# 注意: dev 模式仅用于 staging 环境, 生产环境请使用正式集群部署.
version: "3.9"

services:
  # ---------- Vault 密钥管理 (dev 模式) ----------
  # 适配层: app/security/vault_adapter.py (USE_REAL_VAULT=true)
  vault:
    image: hashicorp/vault:1.15
    container_name: zhs-staging-vault
    restart: unless-stopped
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN:-staging-token}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://0.0.0.0:8200
      TZ: Asia/Shanghai
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 6
    volumes:
      - vault_data:/vault/data
    networks:
      - staging_net

  # ---------- ClickHouse OLAP 数仓 ----------
  # 适配层: app/services/clickhouse_adapter.py (USE_REAL_CLICKHOUSE=true)
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: zhs-staging-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DATABASE:-staging}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-staging}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-staging-pass}
      TZ: Asia/Shanghai
    ports:
      - "8123:8123"
      - "9000:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 6
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - staging_net

  # ---------- Consul 服务注册中心 (dev 模式) ----------
  # 适配层: app/architecture/service_registry_adapter.py (SERVICE_REGISTRY_BACKEND=consul)
  consul:
    image: hashicorp/consul:1.17
    container_name: zhs-staging-consul
    restart: unless-stopped
    environment:
      CONSUL_BIND_INTERFACE: eth0
      CONSUL_CLIENT_INTERFACE: 0.0.0.0
      TZ: Asia/Shanghai
    command: agent -dev -client=0.0.0.0 -ui
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - staging_net

  # ---------- Etcd 备选服务注册中心 ----------
  # 适配层: app/architecture/service_registry_adapter.py (SERVICE_REGISTRY_BACKEND=etcd)
  etcd:
    image: quay.io/coreos/etcd:v3.5
    container_name: zhs-staging-etcd
    restart: unless-stopped
    environment:
      ETCD_NAME: etcd-staging
      ETCD_DATA_DIR: /etcd-data
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://etcd:2380
      ETCD_INITIAL_CLUSTER: etcd-staging=http://etcd:2380
      ETCD_INITIAL_CLUSTER_STATE: new
      ETCD_INITIAL_CLUSTER_TOKEN: etcd-staging-token
      TZ: Asia/Shanghai
    ports:
      - "2379:2379"
      - "2380:2380"
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 6
    volumes:
      - etcd_data:/etcd-data
    networks:
      - staging_net

volumes:
  vault_data:
  clickhouse_data:
  etcd_data:

networks:
  staging_net:
    driver: bridge
