# Docker Compose - P29 可观测性栈
# 包含: OTel Collector / Prometheus / Grafana / Jaeger
# 用法:
#   docker compose -f deploy/docker/docker-compose.observability.yml up -d
#   # 应用配置 OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
#   docker compose -f deploy/docker/docker-compose.observability.yml down

version: "3.9"

services:
  # OTel Collector - 接收应用 OTLP 数据
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.95
    restart: always
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ../otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
      - otel-collector-data:/var/lib/otelcol
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8889/metrics"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - zhs_observability

  # Prometheus - 指标采集与存储
  prometheus:
    image: prom/prometheus:v2.50
    restart: always
    volumes:
      - ../prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - zhs_observability

  # Grafana - 可视化仪表盘
  grafana:
    image: grafana/grafana:10.3
    restart: always
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ../grafana/dashboards/overview_dashboard.json:/var/lib/grafana/dashboards/dashboard.json:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      - prometheus
    networks:
      - zhs_observability

  # Jaeger - 分布式链路追踪
  jaeger:
    image: jaegertracing/all-in-one:1.55
    restart: always
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: memory
      TZ: Asia/Shanghai
    ports:
      - "16686:16686"
      - "14250:14250"
      - "14268:14268"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:16686"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - zhs_observability

volumes:
  otel-collector-data:
  prometheus-data:
  grafana-data:

networks:
  zhs_observability:
    driver: bridge
