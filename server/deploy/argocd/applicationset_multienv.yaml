# ArgoCD ApplicationSet 多环境多集群配置 (Round 11 P0-11)
#
# 功能:
#   - 3 套环境: dev / staging / production
#   - 3 个云集群: aliyun / huawei / aws
#   - 4 个应用: zhs-core / zhs-api / zhs-web / zhs-worker
#   - 同步窗口 (生产环境业务低峰期)
#   - 自动修复 (selfHeal)
#   - 通知集成 (Slack + 钉钉)
#   - 健康检查 + 渐进式 rollout
#   - 多集群 GitOps 部署

###############################################################################
# ApplicationSet: 多环境 + 多集群
###############################################################################
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: zhs-platform-multienv
  namespace: argocd
  labels:
    app.kubernetes.io/name: zhs-platform
    zhs.team: platform
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    # 矩阵生成器: 环境 × 集群 × 应用
    - matrix:
        generators:
          - list:
              elements:
                - env: dev
                  replicaCount: "1"
                  ingressHost: dev.zhs.example.com
                  logLevel: debug
                  syncWindow: "always"
                - env: staging
                  replicaCount: "2"
                  ingressHost: staging.zhs.example.com
                  logLevel: info
                  syncWindow: "always"
                - env: production
                  replicaCount: "4"
                  ingressHost: app.zhs.example.com
                  logLevel: warning
                  syncWindow: "02:00-06:00"
          - list:
              elements:
                - cluster: aliyun-prod
                  clusterUrl: https://aliyun-prod.k8s.example.com
                  clusterRegion: cn-hangzhou
                  clusterType: primary
                - cluster: huawei-prod
                  clusterUrl: https://huawei-prod.k8s.example.com
                  clusterRegion: cn-south-1
                  clusterType: dr
                - cluster: aws-dr
                  clusterUrl: https://aws-dr.k8s.example.com
                  clusterRegion: ap-northeast-1
                  clusterType: dr
          - list:
              elements:
                - app: zhs-core
                  image: zhs/core
                  port: "8080"
                - app: zhs-api
                  image: zhs/api
                  port: "8000"
                - app: zhs-web
                  image: zhs/web
                  port: "3000"
                - app: zhs-worker
                  image: zhs/worker
                  port: "9000"
  template:
    metadata:
      name: 'zhs-{{.app}}-{{.env}}-{{.cluster}}'
      labels:
        app.kubernetes.io/name: '{{.app}}'
        app.kubernetes.io/environment: '{{.env}}'
        app.kubernetes.io/cluster: '{{.cluster}}'
        zhs.team: platform
    spec:
      project: zhs-platform
      sources:
        - repoURL: git@github.com:zhs/zhs-gitops.git
          targetRevision: main
          path: 'charts/{{.app}}'
          helm:
            valueFiles:
              - 'values-{{.env}}.yaml'
              - 'values-{{.cluster}}.yaml'
            parameters:
              - name: image.repository
                value: '{{.image}}'
              - name: image.tag
                value: '{{.env}}-latest'
              - name: replicaCount
                value: '{{.replicaCount}}'
              - name: ingress.host
                value: '{{.ingressHost}}'
              - name: log.level
                value: '{{.logLevel}}'
              - name: cluster.region
                value: '{{.clusterRegion}}'
              - name: cluster.type
                value: '{{.clusterType}}'
              - name: service.port
                value: '{{.port}}'
      destination:
        server: '{{.clusterUrl}}'
        namespace: 'zhs-{{.env}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
          - ApplyOutOfSyncOnly=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
        retry:
          limit: 5
          backoff:
            duration: 30s
            factor: 2
            maxDuration: 10m
      revisionHistoryLimit: 10
      ignoreDifferences:
        - group: apps
          kind: Deployment
          jsonPointers:
            - /spec/replicas

---
###############################################################################
# AppProject: 多环境项目隔离
###############################################################################
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: zhs-platform
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: ZHS Platform Multi-Environment Project
  sourceRepos:
    - git@github.com:zhs/zhs-gitops.git
    - https://github.com/zhs/zhs-gitops.git
  destinations:
    - namespace: 'zhs-*'
      server: https://aliyun-prod.k8s.example.com
    - namespace: 'zhs-*'
      server: https://huawei-prod.k8s.example.com
    - namespace: 'zhs-*'
      server: https://aws-dr.k8s.example.com
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: Secret
    - group: ""
      kind: Service
    - group: ""
      kind: ServiceAccount
    - group: apps
      kind: Deployment
    - group: apps
      kind: StatefulSet
    - group: networking.k8s.io
      kind: Ingress
    - group: networking.k8s.io
      kind: NetworkPolicy
    - group: autoscaling
      kind: HorizontalPodAutoscaler
    - group: policy
      kind: PodDisruptionBudget
  roles:
    - name: admin
      description: Admin access
      policies:
        - p, proj:zhs-platform:admin, applications, *, zhs-platform/*, allow
      groups:
        - zhs:admins
    - name: developer
      description: Developer access (read-only)
      policies:
        - p, proj:zhs-platform:developer, applications, get, zhs-platform/*, allow
      groups:
        - zhs:developers
    - name: releaser
      description: Release Manager (sync production)
      policies:
        - p, proj:zhs-platform:releaser, applications, sync, zhs-platform/*, allow
      groups:
        - zhs:releasers
  syncWindows:
    # 周末禁止生产部署
    - kind: deny
      schedule: '0 0 * * 6'
      duration: 24h
      applications:
        - '*-production-*'
      manualSync: true
      description: "周末禁止生产部署"
    # 业务高峰期禁止生产同步
    - kind: deny
      schedule: '0 9 * * 1-5'
      duration: 8h
      applications:
        - '*-production-*'
      manualSync: true
      description: "工作日 09:00-17:00 禁止生产自动同步"
    # 业务低峰期允许生产部署
    - kind: allow
      schedule: '0 2 * * 1-5'
      duration: 4h
      applications:
        - '*-production-*'
      manualSync: false
      description: "工作日 02:00-06:00 允许生产自动同步"

---
###############################################################################
# AppProject: 多集群联邦
###############################################################################
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: zhs-federation
  namespace: argocd
spec:
  description: ZHS Cross-Cluster Federation
  sourceRepos:
    - '*'
  destinations:
    - server: '*'
  clusterResourceWhitelist:
    - group: ""
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
  roles:
    - name: federation-admin
      policies:
        - p, proj:zhs-federation:admin, applications, *, zhs-federation/*, allow
      groups:
        - zhs:federation-admins

---
###############################################################################
# Notifications: 钉钉 + Slack
###############################################################################
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-notifications-cm
    app.kubernetes.io/part-of: argocd
data:
  service.dingtalk: |
    type: dingtalk
    endpoints:
      - name: dingtalk-zhs
        url: $dingtalk-webhook
  service.slack: |
    type: slack
    endpoints:
      - name: slack-zhs
        token: $slack-token
        icon: ":argo:"

  trigger.on-deployed: |
    - when: app.status.operationState.phase in ['Succeeded']
      send: [app-deployed]
  trigger.on-health-degraded: |
    - when: app.status.health.status == 'Degraded'
      send: [app-health-degraded]
  trigger.on-sync-failed: |
    - when: app.status.operationState.phase in ['Error', 'Failed']
      send: [app-sync-failed]
  trigger.on-deployed-prod: |
    - when: app.status.operationState.phase in ['Succeeded'] and any(app.metadata.labels, {.key == "app.kubernetes.io/environment" && .value == "production"})
      send: [app-deployed-prod]

  template.app-deployed: |
    message: |
      Application {{.app.metadata.name}} has been deployed.
      Environment: {{.app.metadata.labels.appKubernetesIoEnvironment}}
      Cluster: {{.app.metadata.labels.appKubernetesIoCluster}}
      Revision: {{.app.status.operationState.syncResult.revision}}
    dingtalk:
      mentions:
        - users: ["$dingtalk-oncall"]
      message: |
        ✅ 部署成功: {{.app.metadata.name}}
        环境: {{.app.metadata.labels.appKubernetesIoEnvironment}}
        集群: {{.app.metadata.labels.appKubernetesIoCluster}}
        版本: {{.app.status.operationState.syncResult.revision}}
    slack:
      attachments: |
        [{"color": "good", "title": "Deployed: {{.app.metadata.name}}", "fields": [{"title": "Env", "value": "{{.app.metadata.labels.appKubernetesIoEnvironment}}", "short": true}, {"title": "Cluster", "value": "{{.app.metadata.labels.appKubernetesIoCluster}}", "short": true}]}]

  template.app-sync-failed: |
    message: |
      ❌ 同步失败: {{.app.metadata.name}}
      错误: {{.app.status.operationState.message}}
    dingtalk:
      message: |
        ❌ 同步失败: {{.app.metadata.name}}
        错误: {{.app.status.operationState.message}}
    slack:
      attachments: |
        [{"color": "danger", "title": "Sync Failed: {{.app.metadata.name}}", "text": "{{.app.status.operationState.message}}"}]

  template.app-health-degraded: |
    message: |
      ⚠️ 健康降级: {{.app.metadata.name}}
    dingtalk:
      message: |
        ⚠️ 健康降级: {{.app.metadata.name}}
    slack:
      attachments: |
        [{"color": "warning", "title": "Health Degraded: {{.app.metadata.name}}"}]

  template.app-deployed-prod: |
    message: |
      🚀 生产部署: {{.app.metadata.name}}
    dingtalk:
      mentions:
        - users: ["$dingtalk-oncall", "$dingtail-sre"]
      message: |
        🚀 生产部署成功: {{.app.metadata.name}}
        版本: {{.app.status.operationState.syncResult.revision}}
    slack:
      channel: zhs-prod-deploys
      attachments: |
        [{"color": "good", "title": "PROD Deployed: {{.app.metadata.name}}", "fields": [{"title": "Revision", "value": "{{.app.status.operationState.syncResult.revision}}", "short": true}]}]

  subscriptions:
    - recipients:
        - dingtalk:dingtalk-zhs
        - slack:slack-zhs
      triggers:
        - on-deployed
        - on-sync-failed
        - on-health-degraded
    - recipients:
        - dingtalk:dingtalk-zhs
        - slack:slack-zhs
      triggers:
        - on-deployed-prod
      selector: app.kubernetes.io/environment=production
