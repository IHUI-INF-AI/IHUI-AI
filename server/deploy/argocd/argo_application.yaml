# ArgoCD Application 清单
# 监听 Git 仓库自动同步
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zhs-platform-staging
  namespace: argocd
  labels:
    app.kubernetes.io/name: zhs-platform
    app.kubernetes.io/environment: staging
    zhs.team: platform
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: zhs-platform
  source:
    repoURL: git@github.com:zhs/zhs-gitops.git
    targetRevision: main
    path: charts/zhs-platform
    helm:
      valueFiles:
        - values-staging.yaml
      parameters:
        - name: image.tag
          value: staging-latest
        - name: replicaCount
          value: "2"
        - name: ingress.host
          value: staging.zhs.example.com
  destination:
    server: https://kubernetes.default.svc
    namespace: zhs-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
  revisionHistoryLimit: 10
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
---
# ApplicationSet: 多环境
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: zhs-platform
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - env: staging
            cluster: https://kubernetes.default.svc
            namespace: zhs-staging
            host: staging.zhs.example.com
          - env: production
            cluster: https://kubernetes.default.svc
            namespace: zhs-production
            host: app.zhs.example.com
  template:
    metadata:
      name: 'zhs-platform-{{.env}}'
      labels:
        app.kubernetes.io/name: zhs-platform
        app.kubernetes.io/environment: '{{.env}}'
    spec:
      project: zhs-platform
      source:
        repoURL: git@github.com:zhs/zhs-gitops.git
        targetRevision: main
        path: charts/zhs-platform
        helm:
          valueFiles:
            - 'values-{{.env}}.yaml'
      destination:
        server: '{{.cluster}}'
        namespace: '{{.namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
        retry:
          limit: 5
          backoff:
            duration: 30s
            factor: 2
            maxDuration: 10m
---
# AppProject: 项目隔离
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: zhs-platform
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: ZHS Platform Project
  sourceRepos:
    - git@github.com:zhs/zhs-gitops.git
    - https://github.com/zhs/zhs-gitops.git
  destinations:
    - namespace: zhs-staging
      server: https://kubernetes.default.svc
    - namespace: zhs-production
      server: https://kubernetes.default.svc
    - namespace: zhs-*
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: Secret
    - group: ""
      kind: Service
    - group: apps
      kind: Deployment
    - group: apps
      kind: StatefulSet
    - group: networking.k8s.io
      kind: Ingress
    - group: autoscaling
      kind: HorizontalPodAutoscaler
  roles:
    - name: admin
      description: Admin access
      policies:
        - p, proj:zhs-platform:admin, applications, *, zhs-platform/*, allow
      groups:
        - zhs:admins
    - name: developer
      description: Developer access (read-only)
      policies:
        - p, proj:zhs-platform:developer, applications, get, zhs-platform/*, allow
      groups:
        - zhs:developers
  syncWindows:
    - kind: deny
      schedule: '0 0 * * 6'
      duration: 24h
      applications:
        - '*-production'
      manualSync: true
      description: "周末禁止生产部署"
