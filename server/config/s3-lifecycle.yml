# ZHS-Platform S3 归档冷存储分级规则
# Phase 10 建议 5: 把热数据按时间下沉到 Glacier Instant → Deep Archive, 控制成本
#
# 三级存储:
#   Standard (0~30d)        : 热数据, 毫秒取回, 高频访问
#   Glacier Instant (30~180d): 温数据, 毫秒取回, 成本 ~ 1/3
#   Deep Archive (180d+)    : 冷数据, 12h 取回, 成本 ~ 1/20
#
# 前缀策略 (按数据重要性分级):
#   logs/zhs-platform/    : 应用日志      90d 过期
#   metrics/              : Prometheus 远端 365d 过期
#   audit/                : 审计日志      永久保存
#   canary-reports/       : 金丝雀报告    365d 过期
#   backups/              : DB 备份       730d 过期
#   drill-archives/       : Phase 演练归档 永久保存
#   phase8/               : Phase 8 报告   永久保存
#
# 注意:
#   - abort_incomplete_multipart_upload_days=7 防碎片
#   - noncurrent_version_expiration 防历史版本堆栈
#   - transitions 用 Days (相对对象创建时间)

rules:
  # 规则 1: 应用日志 - 热→温→冷→过期
  - id: zhs-logs-tiering
    status: Enabled
    prefix: logs/zhs-platform/
    transitions:
      - days: 30
        storage_class: GLACIER_IR
      - days: 180
        storage_class: DEEP_ARCHIVE
    expiration:
      days: 90
    abort_incomplete_multipart_upload:
      days: 7
    noncurrent_version_expiration:
      noncurrent_days: 30

  # 规则 2: Prometheus 远端指标 - 热→温→冷→过期
  - id: zhs-metrics-tiering
    status: Enabled
    prefix: metrics/
    transitions:
      - days: 30
        storage_class: GLACIER_IR
      - days: 180
        storage_class: DEEP_ARCHIVE
    expiration:
      days: 365
    abort_incomplete_multipart_upload:
      days: 7
    noncurrent_version_expiration:
      noncurrent_days: 30

  # 规则 3: 审计日志 - 热→温→冷→永久保存
  - id: zhs-audit-tiering
    status: Enabled
    prefix: audit/
    transitions:
      - days: 30
        storage_class: GLACIER_IR
      - days: 180
        storage_class: DEEP_ARCHIVE
    # 永不过期, 合规要求 ≥ 7 年 (需配合 Object Lock)

  # 规则 4: 金丝雀报告 - 热→温→冷→过期
  - id: zhs-canary-tiering
    status: Enabled
    prefix: canary-reports/
    transitions:
      - days: 30
        storage_class: GLACIER_IR
      - days: 180
        storage_class: DEEP_ARCHIVE
    expiration:
      days: 365

  # 规则 5: DB 备份 - 温→冷→过期
  - id: zhs-backups-tiering
    status: Enabled
    prefix: backups/
    transitions:
      - days: 7
        storage_class: GLACIER_IR
      - days: 90
        storage_class: DEEP_ARCHIVE
    expiration:
      days: 730

  # 规则 6: Phase 演练归档 - 温→冷→永久保存
  - id: zhs-drill-tiering
    status: Enabled
    prefix: drill-archives/
    transitions:
      - days: 30
        storage_class: GLACIER_IR
      - days: 180
        storage_class: DEEP_ARCHIVE

  # 规则 7: Phase 8 报告 - 温→冷→永久保存
  - id: zhs-phase8-tiering
    status: Enabled
    prefix: phase8/
    transitions:
      - days: 30
        storage_class: GLACIER_IR
      - days: 180
        storage_class: DEEP_ARCHIVE

  # 规则 8: 关键备份 (Compliance 标记) - 用 tag-based 过滤
  - id: zhs-compliance-backup-tiering
    status: Enabled
    filter:
      prefix: backups/
      tags:
        Compliance: "true"
        # EC2 标签路由示例: 业务团队 tag "Project" = "zhs-platform" 走此规则
        Project: "zhs-platform"
    transitions:
      - days: 1     # 关键备份 1 天就下沉
        storage_class: GLACIER_IR
      - days: 30
        storage_class: DEEP_ARCHIVE
    expiration:
      days: 2555   # 7 年合规保留
    abort_incomplete_multipart_upload:
      days: 1

  # 规则 9: 临时数据 (Tier=cold 标记) - 快速过期
  - id: zhs-temp-cold-tiering
    status: Enabled
    filter:
      tags:
        Tier: "cold"
    transitions:
      - days: 7
        storage_class: GLACIER_IR
    expiration:
      days: 30

  # 规则 10: 金丝雀灰度数据 (Canary=true 标记) - 7 天过期
  - id: zhs-canary-tag-tiering
    status: Enabled
    filter:
      tags:
        Canary: "true"
    expiration:
      days: 7
