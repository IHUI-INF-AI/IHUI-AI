name: CI Fast (PR 快速反馈, < 5min)

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [feature/**, fix/**]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"

# 推荐的 PR feedback pipeline:
#  1. ruff lint (~5s)
#  2. 纯单测子集 (utils 签名/工具, 核心 controller, 业务任务)
#  3. 烟雾测试: app 端点注册
#  4. alert rules 规范化 + canary 闭环
#
# 全量 (含 e2e_basic / alembic / integration / docker) 走 ci.yml (push main) + ci-nightly.yml (cron).

jobs:
  # -------------------------------------------------------------------------
  # Job 1: 静态检查 (ruff)
  # -------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check app/ tests/ --output-format=github

  # -------------------------------------------------------------------------
  # Job 2: 纯单测 fast subset (无外部依赖, 无 ffmpeg, 无 PostgreSQL)
  # -------------------------------------------------------------------------
  unit-fast:
    name: Unit Tests (Fast Subset)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install "bcrypt<4.0"
          pip install -e .
          pip install pytest pytest-asyncio pytest-cov httpx respx cryptography fakeredis

      - name: Smoke: app 端点注册
        env:
          ENV: test
        run: |
          python -c "
          from app.main import create_app
          app = create_app()
          paths = sorted({r.path for r in app.routes if hasattr(r, 'path')})
          print(f'OK: {len(paths)} endpoints registered')
          "

      - name: Run unit fast subset
        env:
          ENV: test
        run: |
          # 纯单测 / 工具 / 核心 controller / 业务任务 / 告警自检
          # 跳过: e2e_basic, e2e_smoke, e2e_reconciliation, e2e_payments, e2e_coze_agents, e2e_education,
          #       video_ffmpeg_real, alembic_*, helm_*, loadtest_*, drillon_*, prometheus_alerts,
          #       ws_real_redis, ws_manager_cluster, ws_pubsub_cluster, slow_sql_trace
          pytest tests/ \
            --ignore=tests/test_e2e_basic.py \
            --ignore=tests/test_e2e_smoke.py \
            --ignore=tests/test_e2e_reconciliation.py \
            --ignore=tests/test_e2e_payments.py \
            --ignore=tests/test_e2e_coze_agents.py \
            --ignore=tests/test_e2e_education.py \
            --ignore=tests/test_video_ffmpeg_real.py \
            --ignore=tests/test_alembic_audit.py \
            --ignore=tests/test_alembic_ci.py \
            --ignore=tests/test_helm_chart.py \
            --ignore=tests/test_loadtest_thresholds.py \
            --ignore=tests/test_drill_alert_webhook.py \
            --ignore=tests/test_drill_slow_sql_alert.py \
            --ignore=tests/test_prometheus_alerts.py \
            --ignore=tests/test_ws_real_redis.py \
            --ignore=tests/test_ws_manager_cluster.py \
            --ignore=tests/test_ws_pubsub_cluster.py \
            --ignore=tests/test_slow_sql_trace.py \
            --ignore=tests/test_remote_video_ruoyi.py \
            --ignore=tests/test_ruoyi_frontend.py \
            -p no:cacheprovider \
            --tb=short \
            -q

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-fast
          path: |
            coverage.xml
          if-no-files-found: ignore

  # -------------------------------------------------------------------------
  # Job 3: 告警规则自检 (Phase 4-C 新增)
  # -------------------------------------------------------------------------
  alert-rules:
    name: Alert Rules Check (Phase 4-C / 6-A)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Check Prometheus rules
        run: python scripts/ci/check_alert_rules.py

      - name: Check Grafana biz alerts
        run: python scripts/ci/check_biz_alerts.py

      - name: Check inhibition rules
        run: python scripts/ci/check_inhibition_rules.py

      - name: Check canary/backfill closure
        run: python scripts/ci/check_canary_alert_closure.py

      - name: Check business KPI SLA baseline (Phase 6-A)
        run: python scripts/ci/check_business_kpi.py --strict

  # -------------------------------------------------------------------------
  # Job 4: Alembic 迁移脚本链 Dry-Run (Phase 8 新增)
  # 校验 3 库 (zhs_ai_project / zhs_center_project / zhs_educational_training)
  # 迁移链连贯/可逆, 不实际连 DB, 仅校验 ScriptDirectory 链
  # -------------------------------------------------------------------------
  alembic-ci-dryrun:
    name: Alembic CI Dry-Run (3 库脚本链校验)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements*.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install "bcrypt<4.0"
          pip install -e .

      - name: Alembic script chain dry-run (3 库)
        env:
          ENV: test
        run: |
          # 校验 ai/center/course 三库脚本链连贯 + 可逆, 不连真实 DB
          # 仅校验 ScriptDirectory.walk_revisions(), 不会触发 PostgreSQL 连接
          python scripts/ci/alembic_ci.py dry-run --env .env.production
          python scripts/ci/alembic_ci.py history --env .env.production
          # current 需要连真实 DB, 留给 ci.yml (push main) 里跑; 这里不触发

      - name: Alembic reversibility check (ScriptDirectory, 不连库)
        env:
          ENV: test
        run: |
          # 校验每条 revision 都有 down_revision, 链无断裂
          python -c "
          from alembic.script import ScriptDirectory
          from pathlib import Path
          for cfg_name in ('alembic_ai.ini', 'alembic_center.ini', 'alembic_course.ini'):
              ini = Path('alembic') / cfg_name
              if not ini.exists():
                  print(f'SKIP: {ini} 不存在')
                  continue
              sd = ScriptDirectory.from_config(ini)
              revs = list(sd.walk_revisions())
              print(f'{cfg_name}: {len(revs)} revisions, head={revs[0].revision if revs else None}')
              for r in revs:
                  assert r.down_revision is not None or r.revision == '001', f'{r.revision} 缺少 down_revision'
          print('OK: 3 库脚本链连贯')
          "

  # -------------------------------------------------------------------------
  # Job 5: OpenAPI Schema 漂移检测 (Phase 5-B / 6-B)
  # -------------------------------------------------------------------------
  openapi-drift:
    name: OpenAPI Schema Drift (Phase 5-B)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install "bcrypt<4.0"
          pip install -e .

      - name: Check OpenAPI schema drift (strict)
        env:
          ENV: test
        run: |
          # baseline 不存在时 PASS (允许首次运行); 存在时必须无漂移 (Phase 8 strict 字段级深比)
          if [ -f "tests/fixtures/openapi_baseline.json" ]; then
            python scripts/ci/check_openapi_schema_drift.py --strict
          else
            echo "No baseline yet, running --update --strict to seed"
            python scripts/ci/check_openapi_schema_drift.py --update --strict
          fi

  # -------------------------------------------------------------------------
  # Job 5: helm/docker 副本同步自检 (Phase 7)
  # 防止改了 docker/prometheus/rules.yml 但忘同步 deploy/helm/zhs-platform/prometheus/rules.yml
  # -------------------------------------------------------------------------
  sync-check:
    name: Observability Helm/Docker Sync Check (Phase 7)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Check helm/docker observability config sync
        run: |
          # 不一致时 rc=1 自动阻断 PR; 提示开发者运行 sync_observability_config.py 同步
          python scripts/ci/sync_observability_config.py --check

  # -------------------------------------------------------------------------
  # 汇总: 任一失败 → fail
  # -------------------------------------------------------------------------
  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [lint, unit-fast, alert-rules, alembic-ci-dryrun, openapi-drift, sync-check]
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.unit-fast.result }}" != "success" ] || \
             [ "${{ needs.alert-rules.result }}" != "success" ] || \
             [ "${{ needs.alembic-ci-dryrun.result }}" != "success" ] || \
             [ "${{ needs.openapi-drift.result }}" != "success" ] || \
             [ "${{ needs.sync-check.result }}" != "success" ]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "✅ CI Fast passed"
