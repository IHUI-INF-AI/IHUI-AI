name: s3-lifecycle-drift

on:
  pull_request:
    paths:
      - 'config/s3-lifecycle.yml'
      - 'scripts/ci/s3_lifecycle_drift_bot.py'
      - 'scripts/ops/s3_lifecycle_drift.py'
  workflow_dispatch:
    inputs:
      bucket:
        description: 'S3 桶名'
        required: true
        default: 'zhs-archive-prod'

jobs:
  detect-drift:
    name: 检测 S3 Lifecycle 漂移
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-drift-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install boto3 pyyaml

      - name: Detect drift (no comment, dry-run)
        id: detect
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
          BUCKET: ${{ github.event.inputs.bucket || vars.ZHS_S3_BUCKET || 'zhs-archive-prod' }}
        run: |
          python scripts/ci/s3_lifecycle_drift_bot.py \
            --config config/s3-lifecycle.yml \
            --bucket "$BUCKET" \
            --no-comment \
            --strict
        continue-on-error: false

  post-comment:
    name: 发布 PR comment
    needs: detect-drift
    runs-on: ubuntu-latest
    if: always()
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install boto3 pyyaml

      - name: Post / update PR comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
          BUCKET: ${{ github.event.inputs.bucket || vars.ZHS_S3_BUCKET || 'zhs-archive-prod' }}
        run: |
          python scripts/ci/s3_lifecycle_drift_bot.py \
            --config config/s3-lifecycle.yml \
            --bucket "$BUCKET"
        continue-on-error: true
