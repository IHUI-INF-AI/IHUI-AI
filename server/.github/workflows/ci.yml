name: CI

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  HELM_VERSION: "v3.16.2"

# ---------------------------------------------------------------------------
# Job 1: 单元测试 + 集成测试 (SQLite 模式)
# ---------------------------------------------------------------------------
jobs:
  unit-tests:
    name: Unit & E2E Tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: [6379:6379]
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install "bcrypt<4.0"
          pip install -e .
          pip install pytest pytest-asyncio pytest-cov httpx ruff fakeredis respx

      - name: Lint (ruff)
        run: ruff check app/ tests/ --output-format=github || true

      - name: "Smoke: new module endpoints registered"
        env:
          ENV: test
          REDIS_HOST: 127.0.0.1
        run: |
          python -c "
          from app.main import create_app
          app = create_app()
          paths = sorted({r.path for r in app.routes if hasattr(r, 'path')})
          must = [
            '/api/v1/auth/google/pc/wxCode',
            '/api/v1/auth/google/android/wxCode',
            '/api/v1/auth/google/config',
            '/api/v1/remote/myTeam/{uuid}',
            '/api/v1/remote/agent/category',
            '/api/v1/remote/agent/by/pay',
            '/api/v1/remote/third/group/list',
            '/api/v1/video/preload',
            '/api/v1/video/breakpoint/load',
            '/api/v1/video/breakpoint/update',
            '/api/v1/video/breakpoint/get',
            '/api/v1/user/list',
            '/api/v1/user/deptTree',
            '/api/v1/role/list',
            '/api/v1/menu/list',
            '/api/v1/dept/list',
            '/api/v1/post/list',
            '/api/v1/config/list',
            '/api/v1/dict/type/list',
            '/api/v1/dict/data/list',
            '/api/v1/logininfor/list',
            '/api/v1/notice/list',
            '/api/v1/job/list',
            '/api/v1/job/log/list',
            '/api/v1/login/username',
            '/metrics',
            '/ws/notice',
            '/api/v1/video/hls/transcode',
            '/api/v1/video/hls/manifest/{videoId}',
            '/api/v1/video/hls/playlist/{videoId}/{bitrate}',
          ]
          missing = [p for p in must if p not in paths]
          assert not missing, f'Missing endpoints: {missing}'
          print(f'OK: all {len(must)} new-module endpoints registered')
          "

      - name: Run unit + e2e tests
        env:
          ENV: test
          REDIS_HOST: 127.0.0.1
        run: |
          pytest tests/ \
            --ignore=tests/test_e2e_basic.py \
            -v \
            --cov=app --cov-report=xml --cov-report=term-missing \
            --tb=short

      - name: "整合验证闭环 (alembic 离线 / 多租户 / DB URL 解析 / 告警 / PG16 升级 / Grafana 大盘)"
        env:
          ENV: test
        run: |
          echo "[CI] 1) Alembic 离线 DDL 验证"
          python scripts/alembic_offline_verify.py
          echo "[CI] 2) 多租户 schema 路由集成测试"
          pytest tests/test_multi_tenant_schema_routing.py -v --tb=short
          echo "[CI] 3) 数据库 URL 解析行为测试"
          pytest tests/test_db_url_resolution.py -v --tb=short
          echo "[CI] 4) Alembic 008 静态验证"
          pytest tests/test_alembic_008_static.py -v --tb=short
          echo "[CI] 5) PG 16 升级 dry-run 静态评估"
          python scripts/pg16_upgrade_dryrun.py
          echo "[CI] 6) Grafana 大盘 schema 验证"
          python scripts/grafana_dashboard_verify.py
          echo "[CI] 7) 告警 8 通道 dry-run (mock receiver 端到端)"
          python scripts/alert_drill_8channels.py --output logs/ci_drill.json
          echo "OK: 整合验证闭环全部通过"

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: |
            coverage.xml
            htmlcov/
          if-no-files-found: ignore

  # -------------------------------------------------------------------------
  # Job 2: Alembic 迁移 dry-run (SQLite 内存, 不依赖 PostgreSQL)
  # -------------------------------------------------------------------------
  alembic-migrate:
    name: Alembic Migration (SQLite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install "bcrypt<4.0"
          pip install -e .
          pip install alembic sqlalchemy

      - name: Verify migrations parse
        env:
          DB1_URL: sqlite:///./zhs_alembic_test.db
          DB2_URL: sqlite:///./zhs_alembic_test.db
          DB3_URL: sqlite:///./zhs_alembic_test.db
        run: |
          python -c "
          from alembic.config import Config
          from alembic.script import ScriptDirectory
          cfg = Config('alembic.ini')
          sd = ScriptDirectory.from_config(cfg)
          revisions = list(sd.walk_revisions())
          print(f'Found {len(revisions)} revisions')
          for r in reversed(revisions):
              print(f'  {r.revision} <- {r.down_revision}: {r.doc[:60]!r}')
          assert len(revisions) >= 3, 'expected at least 3 migrations'
          print('OK: all migrations parse')
          "

      - name: Show migration chain
        env:
          DB1_URL: sqlite:///./zhs_alembic_test.db
        run: |
          python scripts/alembic_autogen.py

  # -------------------------------------------------------------------------
  # Job 3: Helm Chart lint + template 渲染
  # -------------------------------------------------------------------------
  helm-lint:
    name: Helm Lint & Template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: helm version
        run: helm version --short

      - name: helm lint (default values)
        run: |
          helm lint ./deploy/helm/zhs-platform --strict

      - name: helm lint (prod values)
        run: |
          helm lint ./deploy/helm/zhs-platform \
            -f ./deploy/helm/zhs-platform/values.prod.yaml --strict

      - name: helm template (default)
        run: |
          helm template zhs ./deploy/helm/zhs-platform \
            --namespace zhs > /tmp/rendered.yaml
          wc -l /tmp/rendered.yaml
          grep -E "^kind:" /tmp/rendered.yaml | sort -u

      - name: helm template (prod)
        run: |
          helm template zhs ./deploy/helm/zhs-platform \
            -f ./deploy/helm/zhs-platform/values.prod.yaml \
            --namespace zhs > /tmp/rendered-prod.yaml
          grep -E "^\s+replicas:" /tmp/rendered-prod.yaml | head -3
          # 验证生产 replicas=4
          if ! grep -A1 "kind: Deployment" /tmp/rendered-prod.yaml | grep -q "replicas: 4"; then
            echo "ERROR: prod deployment replicas should be 4"
            exit 1
          fi
          echo "OK: prod deployment replicas=4"

      - name: kubeconform validate (offline)
        run: |
          if ! command -v kubeconform &> /dev/null; then
            echo "Installing kubeconform..."
            curl -sSLo /tmp/kubeconform.tar.gz \
              https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
            tar -xzf /tmp/kubeconform.tar.gz -C /tmp
            sudo mv /tmp/kubeconform /usr/local/bin/
          fi
          kubeconform -summary -strict \
            -ignore-missing-schemas \
            -skip K8sReplicationController \
            /tmp/rendered-prod.yaml

  # -------------------------------------------------------------------------
  # Job 4: 集成测试 (PostgreSQL 真实环境, 仅 main 分支)
  # -------------------------------------------------------------------------
  integration:
    name: Integration Tests (PostgreSQL)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: zhs
          POSTGRES_PASSWORD: zhs_pg_pass
          POSTGRES_DB: zhs_ai_project
        ports: [5432:5432]
        options: >-
          --health-cmd="pg_isready -U zhs"
          --health-interval=10s --health-timeout=5s --health-retries=5
      redis:
        image: redis:7-alpine
        ports: [6379:6379]
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install "bcrypt<4.0"
          pip install -e .
          pip install pytest pytest-asyncio httpx psycopg2-binary cryptography

      - name: Create test databases
        env:
          PGPASSWORD: zhs_pg_pass
        run: |
          psql -h 127.0.0.1 -U zhs -d postgres -c "CREATE DATABASE zhs_ai_project;" || true
          psql -h 127.0.0.1 -U zhs -d postgres -c "CREATE DATABASE zhs_center_project;" || true
          psql -h 127.0.0.1 -U zhs -d postgres -c "CREATE DATABASE zhs_educational_training;" || true

      - name: Apply alembic migrations
        env:
          PGPASSWORD: zhs_pg_pass
        run: |
          for DB in zhs_ai_project zhs_center_project zhs_educational_training; do
            echo "Applying migrations to $DB..."
            if [ -f alembic/versions/001_init.sql ]; then
              psql -h 127.0.0.1 -U zhs -d $DB -f alembic/versions/001_init.sql || true
            fi
          done
          # 验证 sys_job 表存在
          psql -h 127.0.0.1 -U zhs -d zhs_ai_project -c "\dt sys_job*"

      - name: Run integration tests
        env:
          ENV: test
          DB1_URL: postgresql+psycopg2://zhs:zhs_pg_pass@127.0.0.1:5432/zhs_ai_project
          DB2_URL: postgresql+psycopg2://zhs:zhs_pg_pass@127.0.0.1:5432/zhs_center_project
          DB3_URL: postgresql+psycopg2://zhs:zhs_pg_pass@127.0.0.1:5432/zhs_educational_training
          REDIS_HOST: 127.0.0.1
        run: |
          pytest tests/ -v --tb=short -m "not skip" || true

  # -------------------------------------------------------------------------
  # Job 8: PG 真环境预检 + Prometheus 告警端到端 (独立 job, 隔离主流程)
  # -------------------------------------------------------------------------
  pg-precheck:
    name: PG Real Precheck (offline mode)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install sqlalchemy alembic

      - name: PG 预检 (offline - 拒绝 MySQL/端口 3306)
        env:
          ENV: test
        run: |
          python scripts/pg_real_precheck.py --mode offline
          echo "OK: PG 预检 (offline) 通过"

      - name: PG 预检 (TCP 探测 - 允许失败, 仅记录)
        env:
          ENV: test
        run: |
          python scripts/pg_real_precheck.py --mode connect --db-url "postgresql://zhs:***@127.0.0.1:5432/zhs_ai_project" || echo "WARN: TCP 探测失败 (CI 无 PG 服务, 仅记录)"

  prom-alert-e2e:
    name: Prometheus Alert E2E (mock alertmanager -> 8 通道)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install httpx pytest-asyncio

      - name: 启动 mock webhook receiver
        env:
          ENV: test
        run: |
          python scripts/mock_webhook_receiver.py > logs/mock_receiver.log 2>&1 &
          sleep 3
          curl -s -X POST http://127.0.0.1:7001/dingtalk -H "Content-Type: application/json" -d '{"test":"ping"}' && echo " - mock receiver up"

      - name: Prometheus 告警端到端演练
        env:
          ENV: test
          DINGTALK_WEBHOOK: http://127.0.0.1:7001/dingtalk
          DINGTALK_SECRET: ci_test_secret
          WECHAT_WORK_WEBHOOK: http://127.0.0.1:7002/wechat
          FEISHU_WEBHOOK: http://127.0.0.1:7003/feishu
          SMTP_HOST: 127.0.0.1
          SMTP_PORT: "7025"
          SMTP_USER: alerts@example.com
          ALERT_EMAIL_TO: oncall@example.com
          SLACK_WEBHOOK: http://127.0.0.1:7004/slack
          TEAMS_WEBHOOK: http://127.0.0.1:7005/teams
          GENERIC_WEBHOOK_URL: http://127.0.0.1:7006/generic
          PAGERDUTY_ROUTING_KEY: ci-mock-routing-key
          PAGERDUTY_API_URL: http://127.0.0.1:7007/pagerduty/v2/enqueue
        run: |
          # 启动后端
          uvicorn app.main:app --host 127.0.0.1 --port 8000 > logs/uvicorn_ci.log 2>&1 &
          sleep 8
          curl -s http://127.0.0.1:8000/healthz
          echo ""
          python scripts/prom_alert_e2e.py --output logs/prom_e2e_ci.json
          echo "OK: 告警端到端完成"

  # -------------------------------------------------------------------------
  # Job 9: Playwright 前端样式 + 登录态联调 (E2E 视觉验证)
  # -------------------------------------------------------------------------
  playwright-e2e:
    name: "Playwright E2E (样式 + 登录态 + 5 页面视觉)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install system deps (Playwright 系统库)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
            libgbm1 libpango-1.0-0 libcairo2 libasound2t64 \
            ffmpeg

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install "bcrypt<4.0"
          pip install -e .
          pip install httpx pytest-asyncio

      - name: Install client deps + Playwright
        working-directory: client
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: 启动后端 + 前端 (CI 模式)
        env:
          ENV: test
          DINGTALK_WEBHOOK: http://127.0.0.1:7001/dingtalk
          FEISHU_WEBHOOK: http://127.0.0.1:7002/feishu
          SLACK_WEBHOOK: http://127.0.0.1:7003/slack
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 > logs/uvicorn_playwright.log 2>&1 &
          sleep 8
          curl -s http://127.0.0.1:8000/healthz
          echo ""
          cd client && npm run dev -- --port 8888 --host 127.0.0.1 > logs/vite_playwright.log 2>&1 &
          sleep 15
          curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8888/
          echo " - Vite proxy up"

      - name: Playwright 登录态联调 + 样式验证
        env:
          CI: "true"
          PW_HEADLESS: "true"
        run: |
          cd client
          npx playwright test e2e/auth-flow-integration.spec.ts \
            --reporter=list --workers=1 --retries=0
          npx playwright test e2e/style-verify.spec.ts \
            --reporter=list --workers=1 --retries=0

      - name: 上传 Playwright 产物 (截图/录屏/HTML 报告)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-e2e-${{ github.run_id }}
          path: |
            client/playwright-report/
            client/test-results/
            client/screenshots/
            client/videos/
          if-no-files-found: ignore
          retention-days: 7
  # -------------------------------------------------------------------------
  tenant-migrate:
    name: Multi-Tenant Migration (建议 129)
    needs: [alembic-migrate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install "bcrypt<4.0"
          pip install -e .
          pip install alembic sqlalchemy

      - name: 列出脚本 (建议 125 交付物)
        run: |
          ls -la scripts/ci/migrate_tenants.py scripts/ci/migrate_tenant_dryrun.py
          echo "OK: 迁移脚本存在"

      - name: Dry-run 多个 tenant (SQLite 内存)
        env:
          ENV: test
        run: |
          python scripts/ci/migrate_tenant_dryrun.py \
            --tenants "1,2,3" \
            --revision head \
            --engine-url sqlite:///:memory: \
            --verify-migrate
          echo "OK: dry-run 完成"

      - name: 跑 migrate_tenants 测试
        env:
          ENV: test
        run: |
          pytest tests/test_migrate_tenants.py -v --tb=short
          echo "OK: 迁移测试通过"

      - name: 跑 canary_stages 测试
        env:
          ENV: test
        run: |
          pytest tests/test_canary_stages.py tests/test_canary_routes.py -v --tb=short
          echo "OK: canary 测试通过"

      - name: 跑 TenantBase 迁移测试
        env:
          ENV: test
        run: |
          pytest tests/test_tenant_base_migration.py -v --tb=short
          echo "OK: TenantBase 迁移测试通过"

      - name: CLI 入口 smoke
        env:
          ENV: test
        run: |
          python scripts/ci/migrate_tenants.py --tenants "1,2" --list
          echo "OK: CLI --list 工作"

  # -------------------------------------------------------------------------
  # Job 5: Docker 构建 (validation + multi-platform push)
  # -------------------------------------------------------------------------
  docker-build:
    name: Docker Build & Push
    needs: [unit-tests, helm-lint]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (validation only)
        run: |
          docker build -t zhs-platform:${{ github.sha }} .
          docker images | grep zhs-platform

      - name: Multi-platform push (if registry creds present)
        if: env.REGISTRY_PASSWORD != ''
        env:
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          echo "$REGISTRY_PASSWORD" | docker login -u "$REGISTRY_USER" --password-stdin
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t ${{ secrets.REGISTRY_IMAGE }}:${{ github.sha }} \
            -t ${{ secrets.REGISTRY_IMAGE }}:latest \
            --push .

  # -------------------------------------------------------------------------
  # Job 6: Helm chart OCI 打包 + push (helm-chart-publisher 模式)
  # -------------------------------------------------------------------------
  helm-publish:
    name: Helm Chart Publish (OCI)
    needs: [helm-lint]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Package chart
        run: |
          helm package ./deploy/helm/zhs-platform \
            --version ${GITHUB_REF_NAME#v} \
            --app-version ${GITHUB_REF_NAME#v} \
            -d /tmp/charts

      - name: Login to OCI registry
        if: env.OCI_REGISTRY_PASSWORD != ''
        env:
          OCI_REGISTRY: ${{ secrets.OCI_REGISTRY }}
          OCI_REGISTRY_USER: ${{ secrets.OCI_REGISTRY_USER }}
          OCI_REGISTRY_PASSWORD: ${{ secrets.OCI_REGISTRY_PASSWORD }}
        run: |
          echo "$OCI_REGISTRY_PASSWORD" | helm registry login $OCI_REGISTRY \
            -u "$OCI_REGISTRY_USER" --password-stdin

      - name: Push chart to OCI
        if: env.OCI_REGISTRY_PASSWORD != ''
        env:
          OCI_REGISTRY: ${{ secrets.OCI_REGISTRY }}
        run: |
          helm push /tmp/charts/zhs-platform-${GITHUB_REF_NAME#v}.tgz \
            oci://$OCI_REGISTRY/charts

      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: zhs-platform-chart
          path: /tmp/charts/*.tgz
          if-no-files-found: ignore

  # -------------------------------------------------------------------------
  # Job 7: 部署通知 (main 分支 + 镜像已推送)
  # -------------------------------------------------------------------------
  deploy-notify:
    name: Deploy Notification
    needs: [unit-tests, helm-lint, docker-build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Notify
        if: env.DEPLOY_WEBHOOK != ''
        run: |
          curl -X POST "${{ secrets.DEPLOY_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"ZHS Platform deployed: ${{ github.sha }} (helm chart published to OCI)\"}"
