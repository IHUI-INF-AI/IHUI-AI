name: PostgreSQL 生产部署 CI/CD

on:
  push:
    branches:
      - main
      - release/*
    paths:
      - 'docker/postgresql/**'
      - 'docker/pgbouncer/**'
      - 'docker/haproxy/**'
      - 'deploy/docker/docker-compose*.yml'
      - 'scripts/orchestrate_*.sh'
      - 'scripts/deploy_*.sh'
      - 'scripts/upgrade_*.sh'
  workflow_dispatch:
    inputs:
      task:
        description: '部署任务 (pg16|patroni|vault|all)'
        required: true
        default: 'all'
      environment:
        description: '部署环境 (staging|production)'
        required: true
        default: 'staging'

env:
  SERVER_DIR: g:\1\server
  SCRIPTS_DIR: g:\1\server\scripts

jobs:
  # ---------- 阶段 1: 预检 ----------
  precheck:
    name: 预检
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 验证脚本语法
        shell: bash
        run: |
          cd ${{ env.SERVER_DIR }}
          for script in scripts/orchestrate_*.sh scripts/deploy_*.sh; do
            if [ -f "$script" ]; then
              echo "检查: $script"
              bash -n "$script" || { echo "❌ 语法错误: $script"; exit 1; }
            fi
          done
          echo "✅ 所有脚本语法正确"

      - name: 验证 Python 脚本
        shell: bash
        run: |
          cd ${{ env.SERVER_DIR }}
          for script in scripts/switch_*.py scripts/cron_*.py; do
            if [ -f "$script" ]; then
              echo "检查: $script"
              python3 -m py_compile "$script" || { echo "❌ 编译错误: $script"; exit 1; }
            fi
          done
          echo "✅ 所有 Python 脚本正确"

      - name: 运行 dry-run 测试
        shell: bash
        run: |
          cd ${{ env.SERVER_DIR }}
          bash scripts/orchestrate_pg16_upgrade.sh --dry-run
          bash scripts/orchestrate_patroni_deploy.sh --dry-run
          bash scripts/orchestrate_vault_deploy.sh --dry-run

  # ---------- 阶段 2: 单元测试 ----------
  test:
    name: 单元测试
    needs: precheck
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 运行编排脚本测试
        shell: bash
        run: |
          cd ${{ env.SERVER_DIR }}
          python3 scripts/test_orchestrate_pg16.py
          python3 scripts/test_orchestrate_patroni.py
          python3 scripts/test_orchestrate_vault.py
          python3 scripts/test_orchestrate_pgbouncer.py
          python3 scripts/test_orchestrate_pitr.py
          python3 scripts/test_orchestrate_cross_az.py
          python3 scripts/test_orchestrate_pgbouncer_patroni.py
          python3 scripts/test_deploy_cron_jobs.py
          python3 scripts/test_alert_e2e.py
          python3 scripts/test_pg17_staging.py
          python3 scripts/test_prod_execution_runner.py

  # ---------- 阶段 3: Staging 部署 ----------
  deploy-staging:
    name: Staging 部署
    needs: test
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging')
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: Staging 部署
        shell: bash
        run: |
          cd ${{ env.SERVER_DIR }}
          bash scripts/prod_execution_runner.sh --task=${{ github.event.inputs.task || 'all' }} --auto-confirm

  # ---------- 阶段 4: 生产部署 (手动触发) ----------
  deploy-production:
    name: 生产部署
    needs: deploy-staging
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'production'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 生产部署
        shell: bash
        run: |
          cd ${{ env.SERVER_DIR }}
          bash scripts/prod_execution_runner.sh --task=${{ github.event.inputs.task || 'all' }} --auto-confirm

      - name: 部署结果通知
        if: always()
        shell: bash
        run: |
          echo "部署完成, 状态: ${{ job.status }}"
          # 调用钉钉通知 (可选)
          # bash scripts/notify_dingtalk.sh "生产部署 ${{ job.status }}"
