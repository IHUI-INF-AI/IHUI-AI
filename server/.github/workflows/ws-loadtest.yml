name: WS Load Test (Nightly)

on:
  # 每周一/三/五凌晨 3 点 (Asia/Shanghai) 自动跑
  schedule:
    - cron: '0 19 * * 0,2,4'   # UTC 19:00 = 北京时间 03:00 (次日)
  # 手动触发
  workflow_dispatch:
    inputs:
      instances:
        description: '模拟实例数'
        required: false
        default: '2'
      conns:
        description: '每实例连接数'
        required: false
        default: '50'
      msgs:
        description: '每连接消息数'
        required: false
        default: '100'
      miss_ratio_max:
        description: '漏报率上限 (0.0-1.0, 超过即失败)'
        required: false
        default: '0.05'

env:
  PYTHON_VERSION: "3.12"

jobs:
  ws-loadtest:
    name: WebSocket Cluster Load Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install "bcrypt<4.0"
          pip install -e .
          pip install fakeredis

      - name: Run WS cluster load test
        env:
          LOADTEST_INSTANCES: ${{ github.event.inputs.instances || '2' }}
          LOADTEST_CONNS: ${{ github.event.inputs.conns || '50' }}
          LOADTEST_MSGS: ${{ github.event.inputs.msgs || '100' }}
          LOADTEST_MISS_MAX: ${{ github.event.inputs.miss_ratio_max || '0.05' }}
        run: |
          echo "Config: instances=$LOADTEST_INSTANCES conns=$LOADTEST_CONNS msgs=$LOADTEST_MSGS miss_max=$LOADTEST_MISS_MAX"
          python scripts/ci/loadtest_ws.py \
            --instances "$LOADTEST_INSTANCES" \
            --conns "$LOADTEST_CONNS" \
            --msgs "$LOADTEST_MSGS" \
            --miss-ratio-max "$LOADTEST_MISS_MAX" \
            | tee loadtest_report.txt

      - name: Upload load test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ws-loadtest-report
          path: loadtest_report.txt
          if-no-files-found: ignore

      - name: Summarize to job summary
        if: always()
        run: |
          if [ -f loadtest_report.txt ]; then
            echo "## WS Cluster Load Test Report" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat loadtest_report.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
