# Bandit 静态代码安全扫描 (P20-6 新增)
# 触发: PR 修改了 server/app/** 或 server/scripts/**
# 行为:
#   1. 扫描 app/ 目录所有 .py 文件
#   2. 输出 HIGH/MEDIUM 风险点 → fail
#   3. 报告上传为 artifact

name: Bandit Security Scan (P20-6)

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "server/app/**"
      - "server/scripts/**"
      - ".github/workflows/bandit.yml"
  push:
    branches: [main, develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"

jobs:
  bandit:
    name: Bandit Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install bandit
        run: pip install bandit==1.7.10

      - name: Run bandit (app + scripts)
        working-directory: server
        run: |
          echo "## Bandit 安全扫描报告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          # 输出 JSON 报告
          bandit -r app/ scripts/ -f json -o bandit-report.json -lll || true
          # 输出人类可读报告
          bandit -r app/ scripts/ -f txt -o bandit-report.txt -lll >> $GITHUB_STEP_SUMMARY 2>&1 || true
          # 检查是否有 HIGH 风险点
          HIGH_COUNT=$(python -c "
          import json
          with open('bandit-report.json') as f:
              data = json.load(f)
          high = [r for r in data.get('results', []) if r.get('issue_severity') == 'HIGH']
          print(len(high))
          ")
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**HIGH 风险点数: $HIGH_COUNT**" >> $GITHUB_STEP_SUMMARY
          if [ "$HIGH_COUNT" -gt 0 ]; then
            echo "❌ 发现 $HIGH_COUNT 个 HIGH 风险点, 详见下方报告"
            echo ""
            python -c "
            import json
            with open('bandit-report.json') as f:
                data = json.load(f)
            for r in data.get('results', []):
                if r.get('issue_severity') == 'HIGH':
                    print(f\"- {r['filename']}:{r['line_number']} [{r['test_id']}] {r['issue_text']}\")
            " >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "✅ 无 HIGH 风险点"

      - name: Upload bandit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: server/bandit-report.*
          if-no-files-found: ignore
          retention-days: 14
