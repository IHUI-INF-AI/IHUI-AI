name: New Modules Smoke Test (38 微服务模块)

on:
  pull_request:
    paths:
      - 'app/api/v1/**'
      - 'app/models/**'
      - 'app/core/**'
      - 'app/middleware/**'
      - 'scripts/_test_38_modules.py'
      - '.github/workflows/smoke-new-modules.yml'
  push:
    branches: [main, develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"

jobs:
  smoke-new-modules:
    name: 38 New Modules Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install "bcrypt<4.0"
          pip install -e .
          pip install pytest httpx

      - name: Verify models can load
        env:
          ENV: test
        run: |
          python -c "
          from app.models import Base
          tables = Base.metadata.tables
          assert len(tables) >= 100, f'Too few tables: {len(tables)}'
          print(f'OK: {len(tables)} tables registered')
          "

      - name: Verify app boots
        env:
          ENV: test
        run: |
          python -c "
          from app.main import create_app
          app = create_app()
          paths = sorted({r.path for r in app.routes if hasattr(r, 'path')})
          assert len(paths) >= 600, f'Too few paths: {len(paths)}'
          print(f'OK: {len(paths)} routes registered')
          "

      - name: Start server in background
        env:
          ENV: test
        run: |
          nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 --log-level warning &
          echo $! > /tmp/uvicorn.pid
          sleep 8
          curl -sf http://127.0.0.1:8000/api/v1/auth/captcha > /dev/null || (echo "Server failed to start" && exit 1)
          echo "Server up"

      - name: Health check (liveness/readiness)
        env:
          ENV: test
        run: |
          # Liveness: 必须 200
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/health/live)
          if [ "$STATUS" != "200" ]; then echo "FAIL: /health/live returned $STATUS"; exit 1; fi
          echo "OK: /health/live -> 200"

          # Readiness: SQLite 环境应为 200 (DB 可用)
          READY=$(curl -s http://127.0.0.1:8000/health/ready)
          echo "Readiness: $READY"
          if ! echo "$READY" | grep -q '"status":"ready"'; then
            echo "WARN: /health/ready not ready (degraded ok in CI)"
          else
            echo "OK: /health/ready -> ready"
          fi

      - name: Mock status & coverage
        env:
          ENV: test
        run: |
          # Mock 状态
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/api/mock/status)
          if [ "$STATUS" != "200" ]; then echo "FAIL: /api/mock/status returned $STATUS"; exit 1; fi
          echo "OK: /api/mock/status -> 200"

          # Mock 覆盖率
          COV=$(curl -s http://127.0.0.1:8000/api/mock/coverage)
          echo "Coverage: $COV"
          RATE=$(echo "$COV" | python -c "import sys, json; d=json.load(sys.stdin); print(d.get('coverage_rate', 0))")
          echo "Mock coverage rate: $RATE%"
          if (( $(echo "$RATE < 50" | bc -l) )); then
            echo "WARN: mock coverage < 50%"
          else
            echo "OK: mock coverage >= 50%"
          fi

      - name: Rate limit metrics
        env:
          ENV: test
        run: |
          # 触发一些请求
          for i in 1 2 3 4 5; do
            curl -s -o /dev/null http://127.0.0.1:8000/api/v1/auth/captcha
          done
          # 抓取指标
          METRICS=$(curl -s http://127.0.0.1:8000/metrics/rate-limit)
          if ! echo "$METRICS" | grep -q "rate_limit_allowed_total"; then
            echo "FAIL: /metrics/rate-limit missing rate_limit_allowed_total"
            exit 1
          fi
          echo "OK: /metrics/rate-limit exports prometheus metrics"
          echo "$METRICS" | head -10

      - name: Run 38 modules smoke test
        env:
          ENV: test
        run: |
          python scripts/_test_38_modules.py > /tmp/smoke.txt
          tail -5 /tmp/smoke.txt
          # 解析最后一行: 总通过率: X/Y = Z%
          RESULT=$(grep "总通过率" /tmp/smoke.txt | tail -1)
          echo "Result: $RESULT"
          PASS=$(echo "$RESULT" | grep -oP '\d+/\d+' | cut -d/ -f1)
          TOTAL=$(echo "$RESULT" | grep -oP '\d+/\d+' | cut -d/ -f2)
          PERCENT=$(echo "$RESULT" | grep -oP '=\s*\K[0-9.]+')
          echo "Pass=$PASS Total=$TOTAL Percent=$PERCENT"
          # 至少 95% 通过
          awk -v p="$PERCENT" 'BEGIN { if (p+0 < 95) { print "FAIL: 低于 95%"; exit 1 } print "OK: >= 95%" }'

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/uvicorn.pid ]; then
            kill $(cat /tmp/uvicorn.pid) 2>/dev/null || true
            rm -f /tmp/uvicorn.pid
          fi
