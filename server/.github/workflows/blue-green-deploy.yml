# 蓝绿部署流水线 - GitHub Actions + Helm OCI
# 触发: push tag v*.*.* 或手动 dispatch
# 流程:
#   1. 构建并推送 Docker 镜像
#   2. 打包 Helm chart 推送到 OCI registry
#   3. 部署绿环境 (preview)
#   4. 健康检查
#   5. 切换流量到绿环境
#   6. 保留蓝环境用于回滚
# 回滚: workflow_dispatch with rollback=true

name: Blue-Green Deploy

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "部署版本号 (如 1.0.1)"
        required: true
        default: "1.0.1"
      rollback:
        description: "回滚到上一版本"
        type: boolean
        required: false
        default: false

env:
  CHART_NAME: zhs-platform
  REGISTRY: ghcr.io
  CHART_REPO: ${{ github.repository_owner }}/zhs-platform-charts
  IMAGE_REPO: ${{ github.repository_owner }}/zhs-platform

jobs:
  # ---------- Job 1: 构建并推送镜像 + Helm chart ----------
  build-and-package:
    name: Build Image & Package Helm Chart
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.rollback != 'true' }}
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.meta.outputs.version }}
      image_digest: ${{ steps.build-push.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.14.0

      - name: Login to GHCR for Helm
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} --username ${{ github.actor }} --password-stdin

      - name: Update Chart version
        run: |
          cd server/deploy/helm/zhs-platform
          sed -i "s/^version:.*/version: ${{ steps.meta.outputs.version }}/" Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.meta.outputs.version }}\"/" Chart.yaml
          sed -i "s|tag: \"1.0.0\"|tag: \"${{ steps.meta.outputs.version }}\"|" values.yaml
          cat Chart.yaml

      - name: Package Helm chart
        run: |
          helm package server/deploy/helm/zhs-platform -d ./charts \
            --app-version ${{ steps.meta.outputs.version }} \
            --version ${{ steps.meta.outputs.version }}
          ls -la ./charts/

      - name: Push Helm chart to OCI registry
        run: |
          helm push ./charts/${{ env.CHART_NAME }}-${{ steps.meta.outputs.version }}.tgz \
            oci://${{ env.REGISTRY }}/${{ env.CHART_REPO }}

      - name: Verify SDK static assets
        run: |
          echo "🔍 Verifying SDK static assets (5 languages)..."
          python scripts/sdk_publish_audit.py
          if [ $? -ne 0 ]; then
            echo "❌ SDK static assets check failed"
            exit 1
          fi
          echo "✅ SDK static assets verified"

      - name: Publish Python SDK to PyPI
        if: ${{ github.event.inputs.rollback != 'true' }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          echo "📦 Publishing Python SDK to PyPI..."
          python scripts/publish_sdk.py --lang python --version ${{ steps.meta.outputs.version }}
          if [ $? -ne 0 ]; then
            echo "⚠️ Python SDK publish failed, continuing deployment"
          else
            echo "✅ Python SDK published"
          fi

      - name: Publish TypeScript SDK to NPM
        if: ${{ github.event.inputs.rollback != 'true' }}
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "📦 Publishing TypeScript SDKs to NPM..."
          for variant in typescript-fetch typescript-axios; do
            python scripts/publish_sdk.py --lang $variant --version ${{ steps.meta.outputs.version }} || \
              echo "⚠️ $variant publish failed, continuing"
          done
          echo "✅ TypeScript SDKs published"

  # ---------- Job 2: 部署绿环境 (preview) ----------
  deploy-green:
    name: Deploy Green Environment
    runs-on: ubuntu-latest
    needs: build-and-package
    if: ${{ github.event.inputs.rollback != 'true' }}
    environment:
      name: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure Kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          kubectl cluster-info

      - name: Set up Helm
        uses: azure/setup-helm@v3

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} --username ${{ github.actor }} --password-stdin

      - name: Deploy green environment
        run: |
          VERSION="${{ needs.build-and-package.outputs.version }}"
          echo "Deploying green environment with version: $VERSION"

          # 部署到 green namespace (preview)
          helm upgrade --install ${{ env.CHART_NAME }}-green \
            oci://${{ env.REGISTRY }}/${{ env.CHART_REPO }}/${{ env.CHART_NAME }} \
            --version $VERSION \
            --namespace zhs-green \
            --create-namespace \
            --set image.tag=$VERSION \
            --set ingress.enabled=false \
            --set service.type=ClusterIP \
            --wait --timeout 5m

          echo "Green environment deployed"

      - name: Wait for green pods ready
        run: |
          kubectl -n zhs-green wait --for=condition=ready pod \
            -l app.kubernetes.io/instance=${{ env.CHART_NAME }}-green \
            --timeout=300s

      - name: Smoke test green environment
        run: |
          GREEN_SVC=$(kubectl -n zhs-green get svc -l app.kubernetes.io/instance=${{ env.CHART_NAME }}-green -o jsonpath='{.items[0].metadata.name}')
          echo "Testing green service: $GREEN_SVC"

          # 健康检查
          for i in {1..10}; do
            HTTP_CODE=$(kubectl -n zhs-green exec deployment/${{ env.CHART_NAME }}-green -- \
              curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/healthz || echo "000")
            echo "Attempt $i: HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Green environment healthy"
              exit 0
            fi
            sleep 10
          done
          echo "❌ Green environment health check failed"
          exit 1

  # ---------- Job 3: 切换流量 (蓝→绿) ----------
  promote-to-production:
    name: Promote Green to Production (Blue-Green Switch)
    runs-on: ubuntu-latest
    needs: deploy-green
    if: ${{ github.event.inputs.rollback != 'true' }}
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure Kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Set up Helm
        uses: azure/setup-helm@v3

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} --username ${{ github.actor }} --password-stdin

      - name: Record current production version (for rollback)
        id: record
        run: |
          # 记录当前生产版本 (蓝环境)
          CURRENT=$(helm list -n zhs-prod -o json 2>/dev/null | jq -r '.[0].chart' || echo "none")
          echo "current_version=$CURRENT" >> $GITHUB_OUTPUT
          echo "Current production version: $CURRENT"

      - name: Deploy to production (promote green)
        run: |
          VERSION="${{ needs.build-and-package.outputs.version }}"
          echo "Promoting version $VERSION to production"

          # 用新版本部署到生产 namespace (zhs-prod)
          helm upgrade --install ${{ env.CHART_NAME }}-prod \
            oci://${{ env.REGISTRY }}/${{ env.CHART_NAME }}-charts/${{ env.CHART_NAME }} \
            --version $VERSION \
            --namespace zhs-prod \
            --create-namespace \
            -f server/deploy/helm/zhs-platform/values.prod.yaml \
            --set image.tag=$VERSION \
            --wait --timeout 10m

      - name: Verify production health
        run: |
          for i in {1..15}; do
            HTTP_CODE=$(kubectl -n zhs-prod exec deployment/${{ env.CHART_NAME }}-prod -- \
              curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/healthz || echo "000")
            echo "Attempt $i: HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Production healthy after promotion"
              # 清理 green namespace (保留 blue 用于回滚)
              kubectl delete namespace zhs-green --ignore-not-found
              exit 0
            fi
            sleep 20
          done
          echo "❌ Production health check failed, rolling back"
          helm rollback ${{ env.CHART_NAME }}-prod -n zhs-prod
          exit 1

  # ---------- Job 4: 回滚 ----------
  rollback:
    name: Rollback to Previous Version
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.rollback == 'true' }}
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure Kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Set up Helm
        uses: azure/setup-helm@v3

      - name: List release history
        run: |
          helm history ${{ env.CHART_NAME }}-prod -n zhs-prod

      - name: Rollback to previous revision
        run: |
          # 获取上一个成功的 revision
          PREV_REV=$(helm history ${{ env.CHART_NAME }}-prod -n zhs-prod -o json | \
            jq -r '[.[] | select(.status == "deployed")] | sort_by(.revision) | .[-2].revision // empty')

          if [ -z "$PREV_REV" ]; then
            echo "❌ No previous revision to rollback to"
            exit 1
          fi

          echo "Rolling back to revision $PREV_REV"
          helm rollback ${{ env.CHART_NAME }}-prod $PREV_REV -n zhs-prod --wait --timeout 5m

      - name: Verify rollback health
        run: |
          sleep 30
          HTTP_CODE=$(kubectl -n zhs-prod exec deployment/${{ env.CHART_NAME }}-prod -- \
            curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/healthz || echo "000")
          echo "Post-rollback health: HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Rollback successful"
          else
            echo "❌ Rollback verification failed"
            exit 1
          fi
