[pytest]
# ============================================================
# IHUI-AI Server 测试配置
# ============================================================
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 默认不要求 PG / Redis 必须可达, 业务测试 mock 掉
# 需要真实库时用 -m integration 显式打开
markers =
    integration: 需要真实 DB / Redis / MySQL 的端到端测试
    slow: 跑得很慢 (>5s) 的测试
    unit: 纯单元测试, mock 外部依赖

# 默认只跑 unit, 集成测试用 pytest -m integration 显式触发
addopts = -ra -q --strict-markers -m "not integration and not slow"

# pytest-asyncio 配置 (异步测试用)
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# 路径
pythonpath = .

# 输出
console_output_style = progress
junit_family = xunit2
