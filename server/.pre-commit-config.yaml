# Pre-commit hooks for zhs-platform
# 安装: pip install pre-commit && pre-commit install
# 手动运行: pre-commit run --all-files

repos:
  - repo: https://github.com/psf/black
    rev: 25.9.0
    hooks:
      - id: black
        args: [--line-length=120]
        language_version: python3.11
        files: ^(app|tests|scripts)/

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile=black, --line-length=120, -p, app, -p, tests, -p, scripts]
        files: ^(app|tests|scripts)/

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^(app|tests|scripts)/
      - id: ruff-format
        files: ^(app|tests|scripts)/

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        files: ^(app|tests|scripts)/
      - id: end-of-file-fixer
        files: ^(app|tests|scripts)/
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: detect-private-key
      - id: no-commit-to-branch
        args: [--branch=main, --branch=master]

  - repo: local
    hooks:
      - id: check-utf8-encoding
        name: Reject non-UTF-8 files (GBK/GB18030/Big5)
        # 原 .git/hooks/pre-commit 手写钩子迁入；保留 UTF-8 强制策略
        # Windows 上跑 python 更可靠，bash 不可用
        entry: python scripts/dev/check_utf8.py
        language: system
        pass_filenames: false
        types: [file]
        stages: [pre-commit, manual]

      - id: pytest-critical
        name: pytest critical tests
        entry: pytest -m critical --maxfail=1 -q
        language: system
        pass_filenames: false
        always_run: true
        stages: [manual]

      - id: check-nul-residue
        name: Scan Windows reserved device name residue (nul/Con/Prn)
        # PowerShell/IDE 终端偶发把 `>nul` 重定向当作文件名写入，用 libuv Node 脚本扫描
        # 不阻断提交，仅警告（兜底已加 .gitignore）
        entry: node scripts/dev/check_nul.mjs
        language: system
        pass_filenames: false
        types: [file]
        stages: [pre-commit, manual]

      - id: pytest-collect-check
        name: P22 pytest collection check (no import errors)
        # P22: 确保所有测试文件都能被 pytest 正确收集，防止导入错误
        entry: python -m pytest --collect-only -q --ignore=tests/archive
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit, manual]

      - id: workspace-hygiene
        name: P22 workspace hygiene (reject runtime artifacts)
        # P22: 禁止提交运行时产物/临时文件
        entry: 'python -c "import subprocess,sys,os; staged=subprocess.check_output([''git'',''diff'',''--cached'',''--name-only''],text=True).split(); forbidden=[f for f in staged if any(p in f for p in [''pw-output/'',''screenshots/'',''test-results/'',''audit/'',''.ruff_cache/'',''pytest_full.txt'',''pytest_result.txt'',''business-metrics.txt'',''.env.backup'',''.env.bak''])]; sys.exit(1) if forbidden else None; print(''✓ workspace hygiene passed'') if not forbidden else [print(f''::error::forbidden: {f}'') for f in forbidden]"'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit, manual]
