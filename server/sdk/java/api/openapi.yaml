components:
  schemas:
    AddAgentRequest:
      example:
        agent_name: agent_name
        agent_description: agent_description
        connector_user_id: connector_user_id
        agent_variables:
          key: ""
        agent_model: agent_model
        agent_avatar: agent_avatar
      properties:
        agent_name:
          description: 智能体名称
          title: Agent Name
          type: string
        agent_description:
          description: 智能体功能描述
          title: Agent Description
          type: string
        connector_user_id:
          description: Coze连接器用户ID
          title: Connector User Id
          type: string
        agent_variables:
          additionalProperties: true
          description: 智能体变量配置JSON
          title: Agent Variables
          type: object
        agent_model:
          description: 使用的AI模型名称
          title: Agent Model
          type: string
        agent_avatar:
          description: 智能体头像图片URL地址
          nullable: true
          type: string
      required:
      - agent_description
      - agent_model
      - agent_name
      - agent_variables
      - connector_user_id
      title: AddAgentRequest
    AiGcCreate:
      example:
        user_uuid: user_uuid
        agent_id: agent_id
        gc_type: gc_type
        content: content
        status: 0
      properties:
        user_uuid:
          title: User Uuid
          type: string
        agent_id:
          nullable: true
          type: string
        gc_type:
          nullable: true
          type: string
        content:
          nullable: true
          type: string
        status:
          nullable: true
          type: integer
      required:
      - user_uuid
      title: AiGcCreate
    AiGcUpdate:
      example:
        id: 0
        user_uuid: user_uuid
        agent_id: agent_id
        gc_type: gc_type
        content: content
        status: 6
      properties:
        id:
          title: Id
          type: integer
        user_uuid:
          nullable: true
          type: string
        agent_id:
          nullable: true
          type: string
        gc_type:
          nullable: true
          type: string
        content:
          nullable: true
          type: string
        status:
          nullable: true
          type: integer
      required:
      - id
      title: AiGcUpdate
    AlertIn:
      description: "输入告警 (简化: 只要 status + labels)."
      example:
        status: firing
        labels:
          key: ""
        annotations:
          key: ""
      properties:
        status:
          default: firing
          description: firing / resolved
          title: Status
          type: string
        labels:
          additionalProperties: true
          description: 告警 labels
          title: Labels
          type: object
        annotations:
          additionalProperties: true
          description: 可选 annotations
          nullable: true
          type: object
      title: AlertIn
    AnswerCreate:
      example:
        question_id: 0
        content: content
      properties:
        question_id:
          title: Question Id
          type: integer
        content:
          minLength: 1
          title: Content
          type: string
      required:
      - content
      - question_id
      title: AnswerCreate
    AnswerUpdate:
      example:
        id: 0
        content: content
      properties:
        id:
          title: Id
          type: integer
        content:
          nullable: true
          type: string
      required:
      - id
      title: AnswerUpdate
    ApiResponse:
      example:
        ok: true
        data:
          key: ""
      properties:
        ok:
          default: true
          title: Ok
          type: boolean
        data:
          additionalProperties: true
          default: {}
          title: Data
          type: object
      title: ApiResponse
    AssignAccountRequest:
      example:
        id: id
        cozeId: cozeId
      properties:
        id:
          title: Id
          type: string
        cozeId:
          title: Cozeid
          type: string
      required:
      - cozeId
      - id
      title: AssignAccountRequest
    AsyncWorkflowReq:
      example:
        workflow_id: workflow_id
        user_id: user_id
        input_data:
          key: ""
      properties:
        workflow_id:
          title: Workflow Id
          type: string
        user_id:
          title: User Id
          type: string
        input_data:
          additionalProperties: true
          title: Input Data
          type: object
      required:
      - user_id
      - workflow_id
      title: AsyncWorkflowReq
    AsyncWorkflowStreamReq:
      example:
        workflow_id: workflow_id
        user_id: user_id
        input_data:
          key: ""
        chat_id: chat_id
      properties:
        workflow_id:
          title: Workflow Id
          type: string
        user_id:
          title: User Id
          type: string
        input_data:
          additionalProperties: true
          title: Input Data
          type: object
        chat_id:
          nullable: true
          type: string
      required:
      - user_id
      - workflow_id
      title: AsyncWorkflowStreamReq
    AudioChatRequest:
      description: "Audio chat request — voice or text input, returns text + audio."
      example:
        text: text
        audio_base64: audio_base64
        audio_url: audio_url
        bot_id: bot_id
        voice_id: longxiaochun
        model: qwen-turbo
        language: zh-CN
        system_prompt: system_prompt
      properties:
        text:
          description: 文本输入（可选，与audio_base64二选一）
          nullable: true
          type: string
        audio_base64:
          description: 音频Base64编码（可选，与text二选一）
          nullable: true
          type: string
        audio_url:
          description: 音频URL（可选）
          nullable: true
          type: string
        bot_id:
          description: Coze机器人ID（可选，不提供则使用默认AI）
          nullable: true
          type: string
        voice_id:
          default: longxiaochun
          description: 回复音色ID
          title: Voice Id
          type: string
        model:
          default: qwen-turbo
          description: 对话模型名称
          title: Model
          type: string
        language:
          default: zh-CN
          description: 语言
          title: Language
          type: string
        system_prompt:
          description: 系统提示词
          nullable: true
          type: string
      title: AudioChatRequest
    AudioRecognizeRequest:
      description: Audio recognition request body.
      example:
        audio_url: audio_url
        model: qwen3-asr-flash
        language: language
        enable_lid: true
        enable_itn: false
        system_prompt: ""
        user_uuid: user_uuid
        user_id: user_id
        chat_id: chat_id
        conversation_id: conversation_id
        asr_options:
          key: ""
      properties:
        audio_url:
          description: 音频文件URL
          title: Audio Url
          type: string
        model:
          default: qwen3-asr-flash
          description: 语音识别模型名称
          title: Model
          type: string
        language:
          description: 音频语言代码，如 zh / en；留空自动检测
          nullable: true
          type: string
        enable_lid:
          default: true
          description: 启用语言检测
          title: Enable Lid
          type: boolean
        enable_itn:
          default: false
          description: 启用逆文本标准化
          title: Enable Itn
          type: boolean
        system_prompt:
          default: ""
          description: 系统提示词
          title: System Prompt
          type: string
        user_uuid:
          description: 用户UUID（兼容字段）
          nullable: true
          type: string
        user_id:
          description: 用户ID（兼容字段）
          nullable: true
          type: string
        chat_id:
          description: 对话ID
          nullable: true
          type: string
        conversation_id:
          description: 对话ID（兼容字段）
          nullable: true
          type: string
        asr_options:
          additionalProperties: true
          description: ASR选项（兼容字段，优先于 enable_lid/enable_itn/language）
          nullable: true
          type: object
      required:
      - audio_url
      title: AudioRecognizeRequest
    BailianChatRequest:
      example:
        prompt: prompt
        app_id: app_id
        session_id: session_id
        stream: true
      properties:
        prompt:
          description: 用户输入
          title: Prompt
          type: string
        app_id:
          description: "百炼应用ID, 默认从配置读取"
          nullable: true
          type: string
        session_id:
          description: "会话ID, 用于多轮对话"
          nullable: true
          type: string
        stream:
          description: 是否流式返回
          nullable: true
          type: boolean
      required:
      - prompt
      title: BailianChatRequest
    Base64UploadRequest:
      example:
        fileName: fileName
        base64: base64
      properties:
        fileName:
          title: Filename
          type: string
        base64:
          title: Base64
          type: string
      required:
      - base64
      - fileName
      title: Base64UploadRequest
