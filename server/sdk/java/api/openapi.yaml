  /api/v1/auth/auth/wechat/mini/login:
    get:
      description: |-
        WeChat mini-program login.

        Matches Java LoginService.login(openId, parentId):
        - If user not found: create new user with invite_code, nickname 'AI_' + 4 random chars,
          is_vip=-1 (guest), parent_id, isVIP defaults.
        - If user exists and parent_id is set but user has no parent: update parent_id.
        - If user exists but has no phone: return 40101 '未验证手机号'.
        - Returns JWT token with user info.
      operationId: wechat_mini_login_api_v1_auth_auth_wechat_mini_login_get
      parameters:
      - explode: true
        in: query
        name: code
        required: true
        schema:
          title: Code
          type: string
        style: form
      - description: Parent invite code for referral
        explode: true
        in: query
        name: parent_id
        required: false
        schema:
          default: ""
          description: Parent invite code for referral
          title: Parent Id
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: WeChat mini-program login
      tags:
      - WeChat Auth
      - WeChat Auth
      x-accepts:
      - application/json
  /api/v1/auth/auth/wechat/mini/phone:
    post:
      description: |-
        Get phone number via WeChat mini-program getuserphonenumber API.

        Matches Java LoginService.getPhoneNumber(code, openId):
        1. Get access_token, call getuserphonenumber API
        2. If phone exists with no openId (visitor): delete visitor, bind phone to current user
        3. If phone exists with same openId: return existing user
        4. If phone exists with different openId: error 'already bound'
        5. Otherwise: update user's phone and set isVIP=0
      operationId: get_wechat_phone_api_v1_auth_auth_wechat_mini_phone_post
      parameters:
      - description: Code from wx.getPhoneNumber component
        explode: true
        in: query
        name: code
        required: true
        schema:
          description: Code from wx.getPhoneNumber component
          title: Code
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Get WeChat phone number
      tags:
      - WeChat Auth
      - WeChat Auth
      x-accepts:
      - application/json
  /api/v1/auth/auth/wechat/mini/rebind:
    post:
      description: "Rebind WeChat: unbind old openid, bind new one from code."
      operationId: wechat_rebind_api_v1_auth_auth_wechat_mini_rebind_post
      parameters:
