  /api/v1/auth/auth/cancel:
    delete:
      description: |-
        Cancel user account -- soft delete user and mask phone.

        Matches Java SQL:
          UPDATE users u LEFT JOIN user_auth_info uai ON u.uuid = uai.user_uuid
          SET u.status = 3, uai.cancel_phone = uai.phone, uai.phone = NULL
          WHERE u.uuid = #{uuid}

        Note: Java does NOT delete third-party bindings on cancel, only masks phone.
      operationId: cancel_account_api_v1_auth_auth_cancel_delete
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
      security:
      - HTTPBearer: []
      summary: User account cancellation (soft delete)
      tags:
      - Authentication
      - Authentication
      x-accepts:
      - application/json
