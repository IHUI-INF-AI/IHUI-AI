  /api/v1/monitor/alerts/webhook:
    post:
      description: |-
        接收 Alertmanager 的告警，转推到钉钉/微信/飞书.

        Alertmanager webhook 格式:
        {
          "version": "4",
          "status": "firing",
          "alerts": [
            {"status": "firing", "labels": {...}, "annotations": {...}}
          ]
        }

        建议 100 改进: resolved 告警也写入 _ALERT_HISTORY (恢复也是重要事件),
        但不再推送 (避免打扰); 严重度变化 (critical → warning) 也走一次 push.

        建议 141: 在 push 前应用 alertmanager inhibition 抑制规则,
        避免 critical 类告警触发时, 关联 warning 告警一起骚扰.

        建议 146: dry_run=true 时只统计会抑制哪些, 不真推. 通过查询参数 ?dry_run=true 开启.
      operationId: alertmanager_webhook_api_v1_monitor_alerts_webhook_post
      parameters:
      - explode: true
        in: query
        name: dry_run
        required: false
        schema:
          default: false
          title: Dry Run
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Alertmanager webhook 接收
      tags:
      - "Monitor: Alerts"
      x-accepts:
      - application/json
