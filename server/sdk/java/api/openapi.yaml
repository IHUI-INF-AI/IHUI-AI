  /api/v1/auth/auth/refresh:
    post:
      description: |-
        使用 refresh token 轮转颁发新 access + refresh.

        安全机制 (Bug-53 rotate_refresh):
          - 旧 refresh 立即进入黑名单 (Redis SET, 7 天 TTL)
          - 检测同 jti 二次使用 → 整 family 失效 + 上报重放告警
          - 同 family 内的旧 jti 都失效, 用户必须重新登录
      operationId: refresh_token_api_v1_auth_auth_refresh_post
      parameters:
      - explode: true
        in: query
        name: refresh_token
        required: true
        schema:
          title: Refresh Token
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Refresh access token (rotate)
      tags:
      - Authentication
      - Authentication
      x-accepts:
      - application/json
  /api/v1/auth/auth/info:
    get:
      operationId: get_user_info_api_v1_auth_auth_info_get
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
      security:
      - HTTPBearer: []
      summary: Get current user info
      tags:
