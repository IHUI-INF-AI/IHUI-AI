          title: Phone
          type: string
        style: form
      - explode: true
        in: query
        name: password
        required: false
        schema:
          title: Password
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Password login
      tags:
      - Authentication
      - Authentication
      x-accepts:
