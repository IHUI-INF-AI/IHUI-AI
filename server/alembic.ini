[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
# Left empty: env.py injects the URL at runtime (CI uses sqlite, prod uses engine1/2/3).
# Offline mode (alembic upgrade --sql) requires explicit -x url=... or a default here.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
