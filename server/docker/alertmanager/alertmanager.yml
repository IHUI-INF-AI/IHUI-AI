global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.example.com:465'
  smtp_from: 'alerts@aizhs.top'
  smtp_require_tls: true

# 建议 115: CI Drill 失败路由 (含 critical / default / zhs-ci-drill 三层)
route:
  group_by: ['alertname', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'zhs-default'
  routes:
    - match:
        severity: critical
      receiver: 'zhs-critical'
      group_wait: 10s
      repeat_interval: 1h
    # CI drill 失败告警路由: alertname 前缀 ZHS_CI_DRILL_*
    - match_re:
        alertname: 'ZHS_CI_DRILL_.*'
      receiver: 'zhs-ci-drill'
      group_wait: 10s
      repeat_interval: 2h
      continue: false

receivers:
  - name: 'zhs-default'
    webhook_configs:
      - url: 'http://app:8000/api/v1/monitor/alerts/webhook'
        send_resolved: true

  - name: 'zhs-critical'
    webhook_configs:
      - url: 'http://app:8000/api/v1/monitor/alerts/webhook'
        send_resolved: true
    # 同时推送到钉钉 / 飞书（应用层也支持，下方二选一）
    # 钉钉
    # wechat_configs:
    #   - corp_id: ''
    #     agent_id: ''
    #     api_secret: ''
    #     to_user: '@all'

  # 建议 115: CI Nightly Observability Drill 失败专用 receiver
  # 由 .github/workflows/observability-drills.yml 的 notify-failure job 触发
  # (或 Prom 收到 ai_ci_drill_failure 告警时, 由 Alertmanager 转发到 webhook)
  - name: 'zhs-ci-drill'
    webhook_configs:
      - url: 'http://app:8000/api/v1/monitor/ci/drill-failure'
        send_resolved: true
    # 钉钉群通知配置参考 zhs-critical (env 注入)

inhibit_rules:
  # 经典 critical → warning (按 alertname + service 配对)
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'service']
  # 建议 141: ZHS 专属抑制 (与 app/alert_inhibition.py:ZHS_INHIBITION_PRESETS 同步)
  # 1. canary 紧急回滚 → 抑制 canary 阶段卡住
  - source_match:
      alertname: 'ZHSRollbackActive'
      severity: 'critical'
    target_match:
      alertname: 'ZHSCanaryStageStuck'
    equal: ['service']
  # 2. canary 紧急回滚 → 抑制 canary 比例不匹配
  - source_match:
      alertname: 'ZHSRollbackActive'
      severity: 'critical'
    target_match:
      alertname: 'ZHSCanaryRatioMismatch'
    equal: ['service']
  # 3. 数据库宕机 → 抑制所有 DB 相关 warning (同 service 即可)
  - source_match:
      alertname: 'ZHSDatabaseDown'
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['service']
  # 4. 服务整体宕机 → 抑制所有 per-instance warning
  - source_match:
      alertname: 'ZHSServiceDown'
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['service']
  # 5. CI drill 失败 → 抑制其他 drill 子告警
  - source_match:
      alertname: 'ZHS_CI_DRILL_FAILURE'
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['service']
