# HAProxy 配置 — Patroni 读写路由
#
# 端口:
#   5000: 写端口 (仅主节点)
#   5001: 读端口 (所有节点, 轮询)
#   7000: stats 状态页
#
# 健康检查: Patroni REST API /primary (主) / /read-only (从)

global
    log stdout format raw local0
    maxconn 2000
    stats socket /run/haproxy/admin.sock mode 660 level admin

defaults
    log global
    mode tcp
    option tcplog
    option dontlognull
    timeout connect 5s
    timeout client 30s
    timeout server 30s
    retries 3

# ---------- 写端口 (主节点) ----------
frontend write_frontend
    bind *:5000
    default_backend write_backend

backend write_backend
    mode tcp
    option tcp-check
    # Patroni /primary 健康检查 (仅主节点返回 200)
    tcp-check expect status 200
    default-server inter 3s rise 2 fall 3
    server patroni1 patroni1:5432 check port 8008
    server patroni2 patroni2:5432 check port 8008
    server patroni3 patroni3:5432 check port 8008

# ---------- 读端口 (所有节点, 轮询) ----------
frontend read_frontend
    bind *:5001
    default_backend read_backend

backend read_backend
    mode tcp
    option tcp-check
    balance roundrobin
    # Patroni /read-only 或 /replica 健康检查
    tcp-check expect status 200
    default-server inter 3s rise 2 fall 3
    server patroni1 patroni1:5432 check port 8008
    server patroni2 patroni2:5432 check port 8008
    server patroni3 patroni3:5432 check port 8008

# ---------- stats 状态页 ----------
listen stats
    bind *:7000
    mode http
    stats enable
    stats uri /stats
    stats auth admin:admin123
    stats refresh 5s
