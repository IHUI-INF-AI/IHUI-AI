global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    # 子 Prometheus 的自身标签 - 中心 Prometheus 抓 federation 时会带上
    region: 'cn-east-1'
    cluster: 'zhs-cluster-1'
    role: 'federate-source'

# Federation 任务 - 允许中心 Prometheus 通过 /federate 拉取
# 中心 Prometheus 的 scrape job 会用 honor_labels: true 保留子标签, 防止覆盖
rule_files:
  - /etc/prometheus/rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  # 1. 业务主指标 (含 tenant_id 标签)
  - job_name: 'zhs-platform'
    metrics_path: /metrics
    static_configs:
      - targets: ['api:8000']
        labels:
          service: 'zhs-platform'
          env: 'production'
          region: 'cn-east-1'
          tenant_id: 'default'

  # 2. Redis / PostgreSQL 基础设施
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'redis'
          region: 'cn-east-1'
  - job_name: 'postgresql'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: 'postgresql'
          region: 'cn-east-1'

# Federation 抓取限制: /federate 端点会按 match[] 参数过滤指标
# 子 Prometheus 暴露 /federate, 中心 Prometheus 按 tenant/region 过滤抓取
# 用法: GET /federate?match[]={__name__="zhs_biz_app_clock_tz_offset_seconds"}
