# PostgreSQL 客户端认证配置 (pg_hba.conf)
#
# 安全加固策略:
#   1. 强制 SSL (仅 SSL 连接)
#   2. 最小权限 (仅必要 IP + 用户)
#   3. MD5 密码认证 (不使用 trust)
#   4. 拒绝外部访问 (仅内网)
#
# 类型: local/host/hostssl/hostnossl
# 数据库: all/<db>/replication
# 用户: all/<user>
# 地址: CIDR
# 方法: trust/reject/md5/scram-sha-256

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# ---------- 本地连接 (Unix socket) ----------
local   all             postgres                                peer
local   all             all                                     md5

# ---------- 复制连接 (仅内网, SSL) ----------
hostssl replication     replicator       10.0.0.0/8              scram-sha-256
hostssl replication     replicator       172.16.0.0/12           scram-sha-256
hostssl replication     replicator       192.168.0.0/16          scram-sha-256

# ---------- 应用连接 (仅内网, SSL) ----------
# zhs 用户 (应用)
hostssl zhs_ai_project          zhs             10.0.0.0/8              scram-sha-256
hostssl zhs_ai_project          zhs             172.16.0.0/12           scram-sha-256
hostssl zhs_ai_project          zhs             192.168.0.0/16          scram-sha-256

hostssl zhs_center_project      zhs             10.0.0.0/8              scram-sha-256
hostssl zhs_center_project      zhs             172.16.0.0/12           scram-sha-256
hostssl zhs_center_project      zhs             192.168.0.0/16          scram-sha-256

hostssl zhs_educational_training zhs            10.0.0.0/8              scram-sha-256
hostssl zhs_educational_training zhs            172.16.0.0/12           scram-sha-256
hostssl zhs_educational_training zhs            192.168.0.0/16          scram-sha-256

# ---------- pgBouncer 连接 (本地, SSL) ----------
hostssl all             zhs             127.0.0.1/32            md5
hostssl all             zhs             ::1/128                 md5

# ---------- 监控连接 (仅内网, SSL, 只读) ----------
hostssl all             pg_monitor      10.0.0.0/8              scram-sha-256
hostssl all             pg_monitor      172.16.0.0/12           scram-sha-256
hostssl all             pg_monitor      192.168.0.0/16          scram-sha-256

# ---------- 管理员连接 (仅跳板机 IP, SSL) ----------
# hostssl all             postgres        10.0.1.100/32           scram-sha-256

# ---------- 拒绝其他所有连接 ----------
host    all             all             0.0.0.0/0               reject
host    all             all             ::/0                    reject
hostnossl all           all             0.0.0.0/0               reject
hostnossl all           all             ::/0                    reject
