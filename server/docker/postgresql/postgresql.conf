# PostgreSQL 14 性能调优配置 (zhs-platform 生产环境)
#
# 基于硬件假设: 4 核 CPU / 8GB 内存 / SSD 存储
# 调优原则:
#   1. 内存分配 = 总内存的 25% (shared_buffers) + 75% (effective_cache_size)
#   2. WAL/checkpoint 优化减少 IO 抖动
#   3. 自动 vacuum 调优避免表膨胀
#   4. 连接池友好 (max_connections 适中)
#
# 用法: 在 deploy/docker/docker-compose.yml 中挂载到 /etc/postgresql/postgresql.conf
#   volumes:
#     - ./docker/postgresql/postgresql.conf:/etc/postgresql/postgresql.conf:ro
#   command: postgres -c config_file=/etc/postgresql/postgresql.conf

# =====================================================================
# 1. 内存与缓存 (Memory)
# =====================================================================

# 共享缓冲区 (总内存的 25%, 8GB → 2GB)
shared_buffers = 2GB

# 工作内存 (单查询排序/哈希内存, 适中避免并发 OOM)
work_mem = 16MB

# 维护工作内存 (VACUUM/CREATE INDEX, 大值加速索引构建)
maintenance_work_mem = 512MB

# 有效缓存大小 (总内存的 75%, 8GB → 6GB, 告诉优化器可用缓存)
effective_cache_size = 6GB

# WAL 缓冲区 (WAL 写入缓冲, 16MB 足够)
wal_buffers = 16MB

# =====================================================================
# 2. WAL 与 Checkpoint (写入优化)
# =====================================================================

# checkpoint 间隔最大化 (减少 IO 抖动)
max_wal_size = 4GB
min_wal_size = 1GB

# checkpoint 完成目标 (0.9 = 尽量平滑分布)
checkpoint_completion_target = 0.9

# checkpoint 超时 (30 分钟, 减少 checkpoint 频率)
checkpoint_timeout = 30min

# WAL 同步级别 (on = 每事务 fsync, 安全优先)
synchronous_commit = on

# WAL 预写段大小 (64MB, 减少分段切换)
wal_segment_size = 64MB

# full_page_writes (on = 安全, 写放大换可靠性)
full_page_writes = on

# =====================================================================
# 3. 查询规划 (Planner)
# =====================================================================

# 随机页成本 (SSD = 1.1, 机械盘 = 4.0)
random_page_cost = 1.1

# 有效 IO 并发 (SSD = 200, 机械盘 = 0)
effective_io_concurrency = 200

# 默认统计目标 (100 = 统计精度适中)
default_statistics_target = 100

# 并行查询
max_worker_processes = 8
max_parallel_workers = 8
max_parallel_workers_per_gather = 2
max_parallel_maintenance_workers = 2

# =====================================================================
# 4. 连接管理
# =====================================================================

# 最大连接数 (200 = 适中, 配合 pgBouncer 可降低)
max_connections = 200

# 空闲连接超时 (10 分钟, 自动清理空闲连接)
idle_in_transaction_session_timeout = 10min

# 语句超时 (30 秒, 防止慢查询拖垮系统)
statement_timeout = 30s

# 锁等待超时 (5 秒, 避免长锁等待)
lock_timeout = 5s

# =====================================================================
# 5. 自动 VACUUM (表膨胀控制)
# =====================================================================

# 自动 vacuum 开启
autovacuum = on

# 自动 vacuum 工作进程数 (3 = 适中)
autovacuum_max_workers = 3

# 自动 vacuum 调度间隔 (1 分钟)
autovacuum_naptime = 1min

# 触发阈值 (死元组 = 10% 表行数)
autovacuum_vacuum_threshold = 1000
autovacuum_vacuum_scale_factor = 0.1

# analyze 触发阈值 (变更行 = 5% 表行数)
autovacuum_analyze_threshold = 500
autovacuum_analyze_scale_factor = 0.05

# vacuum 成本限制 (200 = 适中, 避免抢占业务 IO)
autovacuum_vacuum_cost_limit = 200

# vacuum 成本延迟 (2ms, 平滑 IO)
autovacuum_vacuum_cost_delay = 2ms

# =====================================================================
# 6. 日志 (Logging)
# =====================================================================

# 日志目的地 (stderr, docker 可捕获)
logging_collector = off
log_destination = 'stderr'

# 慢查询日志 (> 1s)
log_min_duration_statement = 1000

# 连接/断开日志
log_connections = off
log_disconnections = off

# 锁等待日志 (> 1s)
log_lock_waits = on

# 自动 vacuum 日志
log_autovacuum_min_duration = 0

# 检查点日志
log_checkpoints = on

# 临时文件日志 (> 0 = 所有临时文件)
log_temp_files = 0

# =====================================================================
# 7. 时区与区域
# =====================================================================

timezone = 'Asia/Shanghai'
log_timezone = 'Asia/Shanghai'
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'
default_text_search_config = 'pg_catalog.english'

# =====================================================================
# 8. 预加载库
# =====================================================================

# pg_stat_statements (查询性能统计)
shared_preload_libraries = 'pg_stat_statements'

# pg_stat_statements 配置
pg_stat_statements.max = 10000
pg_stat_statements.track = all

# =====================================================================
# 9. WAL 归档 (PITR 时间点恢复)
# =====================================================================

# 开启归档
archive_mode = on

# 归档命令 (WAL 段复制到归档目录)
archive_command = 'test ! -f /var/lib/postgresql/archive/%f && cp %p /var/lib/postgresql/archive/%f'

# 归档超时 (60s, 强制切换 WAL 段)
archive_timeout = 60s

# 归档清理 (保留 7 天)
archive_cleanup_command = 'pg_archivecleanup /var/lib/postgresql/archive %r'

# WAL 段大小 (64MB, 与前面一致)
wal_segment_size = 64MB

# =====================================================================
# 10. SSL 安全加固
# =====================================================================

# 开启 SSL
ssl = on

# SSL 证书路径
ssl_cert_file = '/etc/postgresql/ssl/server.crt'
ssl_key_file = '/etc/postgresql/ssl/server.key'
ssl_ca_file = '/etc/postgresql/ssl/ca.crt'

# SSL 协议版本 (仅 TLS 1.2+)
ssl_min_protocol_version = 'TLSv1.2'

# SSL 密码套件 (高强度)
ssl_ciphers = 'HIGH:MEDIUM:+3DES:+SSLv3:!aNULL:!LOW:!MD5:!EXP:!RC4'

# SSL 预共享密钥 (ECDHE 优先)
ssl_ecdh_curve = 'prime256v1'

# 密码加密 (scram-sha-256)
password_encryption = scram-sha-256

# =====================================================================
# 11. 审计日志
# =====================================================================

# 开启 pgAudit (需安装扩展)
# shared_preload_libraries = 'pg_stat_statements,pgaudit'

# 审计日志级别
log_statement = 'ddl'

# 审计连接
log_connections = on
log_disconnections = on

# 审计权限检查
log_lock_waits = on
log_temp_files = 0

# 审计持续时间
log_min_duration_statement = 1000
