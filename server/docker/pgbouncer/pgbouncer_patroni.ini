; pgBouncer + Patroni 集成配置
; pgBouncer 通过 HAProxy VIP 连接 Patroni 集群
; 写请求: app → pgBouncer:6432 → HAProxy:5000 → Patroni Leader
; 读请求: app → pgBouncer:6433 → HAProxy:5001 → Patroni 所有节点

[databases]
; 写库路由 (通过 HAProxy 写端口, 仅主节点)
zhs_ai_project = host=haproxy port=5000 dbname=zhs_ai_project
zhs_center_project = host=haproxy port=5000 dbname=zhs_center_project
zhs_educational_training = host=haproxy port=5000 dbname=zhs_educational_training

; 读库路由 (通过 HAProxy 读端口, 轮询所有节点)
zhs_ai_project_ro = host=haproxy port=5001 dbname=zhs_ai_project
zhs_center_project_ro = host=haproxy port=5001 dbname=zhs_center_project
zhs_educational_training_ro = host=haproxy port=5001 dbname=zhs_educational_training

; 默认路由 (写)
* = host=haproxy port=5000

[pgbouncer]
; 监听配置
listen_addr = 0.0.0.0
listen_port = 6432

; 连接池模式
pool_mode = transaction

; 客户端连接
max_client_conn = 200

; 服务端连接池
default_pool_size = 50
min_pool_size = 10
reserve_pool_size = 10
reserve_pool_timeout = 3

; 超时
idle_transaction_timeout = 60
server_lifetime = 3600
server_idle_timeout = 300
query_wait_timeout = 120
client_idle_timeout = 0

; 认证
auth_type = trust
auth_file = /etc/pgbouncer/userlist.txt

; 日志
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
stats_period = 60

; 性能
server_reset_query = DISCARD ALL
ignore_startup_parameters = extra_float_digits
