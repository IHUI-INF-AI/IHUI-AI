# pgBouncer 配置 — PostgreSQL 连接池
#
# 模式: transaction (事务级池化, 推荐)
# 连接数: 200 客户端 → 50 服务端 (4:1 收敛)
#
# 端口:
#   6432: pgBouncer (应用连接此端口)
#   5432: PostgreSQL (仅 pgBouncer 连接)

[databases]
# 3 个库路由
zhs_ai_project = host=postgres port=5432 dbname=zhs_ai_project
zhs_center_project = host=postgres port=5432 dbname=zhs_center_project
zhs_educational_training = host=postgres port=5432 dbname=zhs_educational_training
# 默认库
* = host=postgres port=5432

[pgbouncer]
# ---------- 监听 ----------
listen_addr = 0.0.0.0
listen_port = 6432

# ---------- 认证 ----------
auth_type = trust
auth_file = /etc/pgbouncer/userlist.txt

# ---------- 池化模式 ----------
pool_mode = transaction

# ---------- 连接数 ----------
# 客户端最大连接数
max_client_conn = 200

# 每个数据库的服务端连接数
default_pool_size = 50

# 预留连接 (管理员)
reserve_pool_size = 5
reserve_pool_timeout = 3

# 最大服务端连接数
max_db_connections = 100
max_user_connections = 100

# ---------- 超时 ----------
# 空闲客户端超时 (秒)
idle_transaction_timeout = 60

# 服务端连接生命周期 (秒, 1 小时)
server_lifetime = 3600

# 空闲服务端连接超时 (秒, 10 分钟)
server_idle_timeout = 600

# 连接超时 (秒)
connect_timeout = 15

# 查询超时 (秒, 0 = 无限)
query_timeout = 0

# 查询等待超时 (秒)
query_wait_timeout = 120

# ---------- 日志 ----------
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
log_stats = 1
stats_period = 60

# ---------- 性能 ----------
# 服务端重置 (DISCARD ALL)
server_reset_query = DISCARD ALL
server_reset_query_always = 0

# 忽略启动参数
ignore_startup_parameters = extra_float_digits

# ---------- 管理 ----------
admin_users = zhs
stats_users = zhs

# 文件路径
pidfile = /var/run/pgbouncer/pgbouncer.pid
logfile = /dev/stderr
