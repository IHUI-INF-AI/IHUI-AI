name: e2e

# =============================================================================
# E2E (Playwright) 测试 workflow —— 从 ci.yml 拆分而来.
#
# 背景: 原 ci.yml 的 playwright-e2e job 内含 25+ 个串行 test step, 无分片并行,
#       单次运行耗时长. 本 workflow 改用 matrix 分 4 个 shard 并行执行, 并在
#       e2e-report job 中合并所有分片的 blob 报告为统一 HTML 报告.
#
# 独立性: 本 workflow 自包含, 不依赖 ci.yml 的任何 artifact; 后端/前端/预览均在
#         每个 shard 内自行拉起 (复用 scripts/ci-env-setup.sh 统一编排入口).
# =============================================================================

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  # ---------------------------------------------------------------------------
  # e2e-shard: 4 分片并行执行 Playwright E2E
  #   - fail-fast: false  -> 任一分片失败不取消其他分片, 便于一次性看到全部失败
  #   --shard=X/Y         -> Playwright 自动把全部测试文件均匀切分到 4 个 shard
  #   - PW_SHARD_MODE=1   -> playwright.config.ts 切换为 blob+list reporter,
  #                          blob 报告按 shard 命名, 供 e2e-report 合并
  # ---------------------------------------------------------------------------
  e2e-shard:
    name: E2E 分片 ${{ matrix.shard }}/${{ strategy.job-total }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: 安装后端依赖 (editable, server/pyproject.toml)
        run: pip install -e server/

      - name: 安装前端依赖
        working-directory: client
        run: npm ci

      - name: 安装 Playwright 浏览器 (chromium)
        working-directory: client
        run: npx playwright install --with-deps chromium

      - name: 启动后端 + 构建前端 + 启动预览 (ci-env-setup.sh 统一编排)
        # scripts/ci-env-setup.sh 已含完整的后端启动 + /api/health 健康检查
        # + client build + vite preview(4173) 逻辑, 复用为单一编排入口.
        #   SKIP_DEPS_INSTALL=1 -> 跳过脚本内置的 pip/npm 安装 (上一步已装)
        #   SKIP_PORT_CLEAN=1   -> 干净 runner 无遗留进程, 跳过端口清理
        #   AUTO_CREATE_SCHEMA=1 / ENV=development -> 确保后端以开发态自建表启动
        env:
          AUTO_CREATE_SCHEMA: '1'
          ENV: development
          SKIP_DEPS_INSTALL: '1'
          SKIP_PORT_CLEAN: '1'
        run: bash scripts/ci-env-setup.sh

      - name: 运行 Playwright E2E (分片 ${{ matrix.shard }}/${{ strategy.job-total }})
        env:
          PW_SHARD_MODE: '1'
          PW_SHARD_INDEX: ${{ matrix.shard }}
          PW_BASE_URL: http://127.0.0.1:4173
          PW_BACKEND_URL: http://127.0.0.1:8000
          # 让 playwright.config.ts 的 webServer 复用已在 4173 运行的 vite preview,
          # 避免在 Linux 上尝试 `npm run dev` (其内含 Windows 专属 chcp 命令).
          FRONTEND_PORT: '4173'
        working-directory: client
        run: npx playwright test --shard=${{ matrix.shard }}/${{ strategy.job-total }}

      - name: 上传 blob 报告 (shard ${{ matrix.shard }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-shard-${{ matrix.shard }}
          path: client/blob-report/
          retention-days: 7

      - name: 上传 test-results / 截图 / trace (shard ${{ matrix.shard }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-shard-${{ matrix.shard }}
          path: client/test-results/
          if-no-files-found: ignore
          retention-days: 7

  # ---------------------------------------------------------------------------
  # e2e-report: 合并所有分片的 blob 报告为统一 HTML 报告
  #   - needs: e2e-shard + if: always() -> 无论分片成功/失败都执行合并
  #   - 下载所有 blob-report-shard-* artifact -> npx playwright merge-reports
  # ---------------------------------------------------------------------------
  e2e-report:
    name: E2E 报告合并
    runs-on: ubuntu-latest
    needs: e2e-shard
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: 安装客户端依赖 (提供 npx playwright merge-reports)
        # --ignore-scripts: 跳过 postinstall (build:shared 等工作区构建),
        # 合并报告仅需 @playwright/test 提供的 merge-reports 子命令, 无需构建产物.
        working-directory: client
        run: npm ci --ignore-scripts

      - name: 下载所有分片 blob 报告
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: blob-report-shard-*

      - name: 合并 blob 报告为统一 HTML 报告
        run: |
          set -e
          mkdir -p merged-blobs
          find all-blob-reports -name '*.zip' -print -exec cp {} merged-blobs/ \;
          echo "=== 待合并的 blob 报告 ==="
          ls -1 merged-blobs/ || true
          if [ -z "$(ls -A merged-blobs 2>/dev/null)" ]; then
            echo "::warning::未找到任何 blob 报告 (所有分片可能均未产出), 跳过合并"
            exit 0
          fi
          cd client
          npx playwright merge-reports --reporter html ../merged-blobs

      - name: 上传合并后的 HTML 报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-e2e-report
          path: client/playwright-report/
          if-no-files-found: ignore
          retention-days: 14
