name: e2e

# =============================================================================
# E2E (Playwright) 测试 workflow — 新架构 (apps/web + apps/api)
#
# 架构: Monorepo (pnpm workspace + Turborepo)
#   - apps/web: Next.js 15 + React 19 + Tailwind 4 + shadcn/ui
#   - apps/api: Fastify 5 + Drizzle ORM + PostgreSQL
#
# 流程:
#   1. 安装 pnpm 依赖
#   2. 安装 Playwright 浏览器 (chromium)
#   3. 构建 Next.js 前端 (production build)
#   4. 启动 Next.js 预览服务器 (localhost:3000)
#   5. 运行 Playwright E2E 测试 (apps/web/e2e/*.spec.ts)
# =============================================================================

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/web/**'
      - 'apps/api/**'
      - 'packages/**'
      - '.github/workflows/e2e.yml'
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: '20.10'
  PNPM_VERSION: '9.15'

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ihui
          POSTGRES_PASSWORD: ihui_test
          POSTGRES_DB: ihui_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ihui"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium

      - name: Run database migrations
        working-directory: apps/api
        env:
          DATABASE_URL: postgres://ihui:ihui_test@localhost:5432/ihui_test
        run: pnpm exec drizzle-kit migrate

      - name: Build API
        run: pnpm --filter @ihui/api run build

      - name: Build web (production)
        run: pnpm --filter @ihui/web run build

      - name: Start API server (background)
        working-directory: apps/api
        env:
          NODE_ENV: test
          PORT: '8080'
          HOST: '0.0.0.0'
          DATABASE_URL: postgres://ihui:ihui_test@localhost:5432/ihui_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-jwt-secret-for-e2e
          CREDENTIALS_ENCRYPTION_KEY: '0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef'
        run: |
          node dist/index.js &
          sleep 5
          curl -sf http://localhost:8080/health || exit 1

      - name: Start web server (background)
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
        run: |
          pnpm start &
          sleep 5
          curl -sf http://localhost:3000 || exit 1

      - name: Run Playwright E2E tests
        working-directory: apps/web
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
        run: pnpm exec playwright test

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: apps/web/test-results/
          if-no-files-found: ignore
          retention-days: 7
