name: 样式规范检查

on:
  push:
    branches: [main, develop, release/*]
    paths:
      - 'client/**'
      - '.github/workflows/style-spec.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'client/**'
      - '.github/workflows/style-spec.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  checks: write

env:
  NODE_VERSION: '20'

jobs:
  high-specificity-check:
    # 用户规则: 禁止使用 4 类以上嵌套的高特异性选择器
    # 用户规则: 禁止使用 !important
    # 本 job 在浏览器中检测所有页面，确保 0 违规
    name: 高特异性选择器检测
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: 安装依赖
        run: cd client && npm ci
      - name: 安装 Playwright 浏览器
        run: cd client && npx playwright install --with-deps chromium
      - name: 启动预览服务器
        run: |
          cd client
          npm run build
          npm run preview --port 4173 &
          sleep 5
      - name: 跑高特异性选择器检测
        env:
          HIGH_SPECIFICITY_THRESHOLD: '0'
        run: cd client && node scripts/check-high-specificity-staged.mjs --all
      - name: 跑 no-important 检查
        run: cd client && npm run check:no-important
      - name: 阻断提示
        if: failure()
        run: |
          echo "::error::样式规范检查未通过，请用 :where() 包裹高特异性选择器，并移除 !important"

  visual-regression:
    # 视觉回归测试: 确保样式修改没有破坏页面外观
    name: 视觉回归测试
    runs-on: ubuntu-latest
    needs: [high-specificity-check]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: 安装依赖
        run: cd client && npm ci
      - name: 安装 Playwright 浏览器
        run: cd client && npx playwright install --with-deps chromium
      - name: 启动预览服务器
        run: |
          cd client
          npm run build
          npm run preview --port 4173 &
          sleep 5
      - name: 跑视觉回归测试
        env:
          PW_BASE_URL: http://127.0.0.1:4173
        run: cd client && npx playwright test e2e/visual-regression.spec.ts --project=chromium --reporter=list
      - name: 上传视觉回归报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-report
          path: client/playwright-report/
      - name: 阻断提示
        if: failure()
        run: |
          echo "::error::视觉回归测试未通过，页面外观发生变化。如果是有意修改，请用 'npx playwright test --update-snapshots' 更新 baseline"
