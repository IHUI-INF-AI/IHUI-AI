name: Build Docker

on:
  push:
    branches: [main]
    tags: ['v*']

# Security: least-privilege GITHUB_TOKEN (CWE-250). Third-party actions use @v tags — pin to commit SHA for stricter supply-chain security.
permissions:
  contents: read

jobs:
  build-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile.api
          push: false
          tags: ihui-api:latest

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile.web
          push: false
          tags: ihui-web:latest

  build-ai-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build AI Service image
        uses: docker/build-push-action@v5
        with:
          context: apps/ai-service
          push: false
          tags: ihui-ai-service:latest
