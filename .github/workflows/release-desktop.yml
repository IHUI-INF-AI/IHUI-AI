name: Release Desktop

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. desktop-v0.1.0)'
        required: true

permissions:
  contents: write

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9'

jobs:
  build:
    name: Build Desktop (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x64
            runner: windows-latest
          - label: macos-arm64
            runner: macos-latest
          - label: macos-x64
            runner: macos-13
          - label: linux-x64
            runner: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install pnpm deps
        run: pnpm install --frozen-lockfile

      - name: Build & Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.DESKTOP_TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.DESKTOP_TAURI_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'IHUI AI Desktop ${{ github.ref_name }}'
          releaseBody: '桌面端安装包(Tauri 2 + Rust + React)。详见 CHANGELOG。'
          releaseDraft: false
          prerelease: false

      - name: Summary
        run: |
          echo "### Desktop 构建完成" >> $GITHUB_STEP_SUMMARY
          echo "平台: ${{ matrix.label }}" >> $GITHUB_STEP_SUMMARY
          echo "tag: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "产物: .msi/.exe(Windows)、.dmg(macOS)、.deb/.AppImage(Linux)+ updater 签名包" >> $GITHUB_STEP_SUMMARY
