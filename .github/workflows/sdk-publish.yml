name: SDK Publish

# SDK 发布工作流 — 自动发布生成的 SDK 包到 npm
# 当 packages/sdk 源码或 SDK 生成脚本变更并打 tag 时触发
on:
  push:
    tags:
      - '@ihui/sdk@*'
    paths:
      - 'packages/sdk/src/**'
      - 'scripts/generate-sdk.ts'
  workflow_dispatch:
    inputs:
      tag:
        description: '发布版本号（如 1.0.0）'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate SDK from OpenAPI
        run: pnpm tsx scripts/generate-sdk.ts

      - name: Build SDK
        run: pnpm --filter @ihui/sdk build

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "version=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            # 从 tag 名提取版本号：@ihui/sdk@1.0.0 -> 1.0.0
            VERSION="${GITHUB_REF_NAME#@ihui/sdk@}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Set package version
        run: |
          pnpm --filter @ihui/sdk version ${{ steps.version.outputs.version }} \
            --allow-same-version --git-tag-version false

      - name: Publish to npm
        run: pnpm --filter @ihui/sdk publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
