name: v2-unit-tests

# P16 阶段: v2 模块单测快速闸口
# - 仅跑 v2 相关单测 (admin / agents / courses / order + SDK contract)
# - 5 秒内出结果, PR 阶段立即反馈
# - 失败则阻断 PR 合入
#
# P17-4: 加 OpenAPI 自动 regen SDK 步骤
# - PR 触发: 启动后端 → 拉 OpenAPI → 与 client openapi-v2.json 对比
# - 不一致则 fail, 强制开发者 regen SDK 后再提

on:
  push:
    branches: [main, develop, release/*]
    paths:
      - 'server/app/api/v2_*.py'
      - 'server/app/api/v3_*.py'
      - 'server/tests/test_v2_*.py'
      - 'client/src/api/v2-sdk/*.ts'
      # P24 整合: round 9-23 微服务桥接 (118 个 BaseHTTPRequestHandler)
      - 'server/app/ops/round_services/**'
      - 'server/tests/test_round_services_*.py'
      # P25 整合: Round 24 system_pulse + CORS 收紧
      - 'server/scripts/round24_*.py'
      - 'server/tests/test_round24_*.py'
      - 'server/tests/test_cors_policy.py'
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  v2-tests:
    name: v2 模块单测
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: 安装依赖
        run: pip install -r server/requirements.txt
      - name: 跑 v2 单测
        run: |
          cd server
          pytest tests/test_v2_admin.py \
                 tests/test_v2_sdk_contract.py \
                 tests/test_v2_other_modules.py \
                 -v --tb=short -p no:cacheprovider
      - name: 跑 round services 桥接单测 (P24 整合)
        run: |
          cd server
          pytest tests/test_round_services_bridge.py \
                 tests/test_round_services_integration.py \
                 -v --tb=short -p no:cacheprovider
      - name: 跑 Round 24 system_pulse + CORS 单测
        run: |
          cd server
          pytest tests/test_round24_system_pulse.py \
                 tests/test_cors_policy.py \
                 -v --tb=short -p no:cacheprovider
      - name: 阻断提示
        if: failure()
        run: |
          echo "::error::v2 模块单测未通过, 阻断 PR 合入. 请修复后重新提交."

  sdk-regen-check:
    # P17-4: SDK 自动重生成检查
    # - 启动后端 → 拉 OpenAPI → 跑 gen_v2_sdk_subpackages.py → diff
    # - 任何后端路由变化但 SDK 未更新则 fail
    name: SDK 自动 regen 检查
    runs-on: ubuntu-latest
    needs: [v2-tests]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -r server/requirements.txt
      - name: 启动后端 (拿 OpenAPI 用, 8000)
        env:
          AUTO_CREATE_SCHEMA: '1'
          ENV: development
          SKIP_DEPS_INSTALL: '1'
        run: |
          cd server
          nohup python scripts/ci_start_backend.py --port 8000 --timeout 60 > /tmp/regen-backend.log 2>&1 &
          echo "backend_start_pid=$!"
          for i in {1..30}; do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8000/api/health || true)
            if [ "$code" = "200" ]; then
              echo "backend healthy after ${i}s"
              break
            fi
            sleep 1
          done
      - name: 拉 OpenAPI v2 + 与 SDK 对比
        run: |
          cd server
          curl -s http://127.0.0.1:8000/api/v2/openapi.json > /tmp/openapi-current.json
          python scripts/gen_v2_sdk_subpackages.py \
            --openapi /tmp/openapi-current.json \
            --output ../client/src/api/v2-sdk
          # 如果有 diff, 提示开发者 regen
          if [ -n "$(git diff --name-only client/src/api/v2-sdk/)" ]; then
            echo "::error::后端 OpenAPI 变化, SDK 未同步更新. 请本地跑 gen_v2_sdk_subpackages.py 后重新提交"
            git diff --stat client/src/api/v2-sdk/
            exit 1
          fi
          echo "SDK 已与 OpenAPI 同步"
      - name: 阻断提示
        if: failure()
        run: |
          echo "::error::SDK 与后端 OpenAPI 不一致, 请本地跑 scripts/gen_v2_sdk_subpackages.py 重新生成 SDK"

