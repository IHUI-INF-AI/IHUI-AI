name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Debug versions
        run: |
          echo "pnpm: $(pnpm --version)"
          echo "node: $(node --version)"
          head -1 pnpm-lock.yaml

      - name: Install dependencies
        run: |
          set -ex
          echo "=== package.json hashes (root + workspace) ==="
          find . -name package.json -not -path "*/node_modules/*" -exec sha256sum {} \; 2>/dev/null | sort
          echo "=== pnpm-lock.yaml hash ==="
          sha256sum pnpm-lock.yaml
          echo "=== Running pnpm install --frozen-lockfile ==="
          pnpm install --frozen-lockfile --reporter=append-only
          echo "=== Install completed ==="

      - name: Build database package
        run: pnpm --filter @ihui/database build

      - name: Build auth package
        run: pnpm --filter @ihui/auth build

      - name: Typecheck
        run: pnpm turbo run typecheck

      - name: Schema drift check
        run: node scripts/check-db-schema-drift.mjs

      - name: Lint
        run: pnpm turbo run lint

      - name: Test
        run: pnpm turbo run test

      - name: Build
        run: pnpm turbo run build

  python-ai-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ai-service
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]" || echo "依赖安装失败(可能缺少可选依赖,跳过)"
        continue-on-error: true

      - name: Syntax check
        run: |
          python -c "import ast, os; files=[os.path.join(d,f) for d,_,fs in os.walk('app') for f in fs if f.endswith('.py')]; [ast.parse(open(fp,encoding='utf-8').read()) for fp in files]; print(f'{len(files)} files OK')"

  ai-service-schema-check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ihui_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ihui_test

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: |
          set -ex
          echo "=== package.json hashes (root + workspace) ==="
          find . -name package.json -not -path "*/node_modules/*" -exec sha256sum {} \; 2>/dev/null | sort
          echo "=== pnpm-lock.yaml hash ==="
          sha256sum pnpm-lock.yaml
          echo "=== Running pnpm install --frozen-lockfile ==="
          pnpm install --frozen-lockfile --reporter=append-only
          echo "=== Install completed ==="

      - name: Build database package
        run: pnpm --filter @ihui/database build

      - name: Push schema to test DB
        working-directory: packages/database
        run: npx drizzle-kit push

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install ai-service dependencies
        working-directory: apps/ai-service
        run: uv pip install --system -e ".[dev]"

      - name: Run ai-service schema_check against test DB
        working-directory: apps/ai-service
        run: |
          python -m app.core.schema_check
          # 退出码 0 = 所有表存在且关键字段齐全;1 = 有表不存在或关键字段缺失
          exit $?
