name: ci

on:
  push:
    branches: [main, develop, release/*]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  pull_request:
    branches: [main, develop]
  schedule:
    # P11 nightly Shadow 对比: 每天北京时间凌晨 02:00 (UTC 18:00)
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: '跳过部署'
        required: false
        default: 'false'

permissions:
  contents: read
  pull-requests: write
  checks: write
  id-token: write

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  workspace-hygiene:
    # P22: 工作区卫生检查 - 禁止提交运行时产物/临时文件
    name: 工作区卫生检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: 检查禁止提交的文件/目录
        run: |
          set -e
          FAIL=0
          # 禁止提交的目录模式（运行时产物）
          FORBIDDEN_DIRS="pw-output screenshots test-results storybook-static audit .ruff_cache"
          # 禁止提交的文件模式（临时日志/报告）
          FORBIDDEN_FILES="dev-server.log gen-out.log live_openapi.json eslint-report.json"
          FORBIDDEN_PATTERNS="e2e_failed_list.txt e2e_full_log.txt eslint-non-unused.txt eslint-unused-vars.txt test-output.json temp_style.scss pytest_full.txt pytest_result.txt business-metrics.txt curl-mock.html curl-out.html"

          echo "=== 检查禁止提交的目录 ==="
          for dir in $FORBIDDEN_DIRS; do
            matches=$(git ls-files | grep -E "^([^/]+/)?$dir/" || true)
            if [ -n "$matches" ]; then
              echo "::error::禁止提交的目录被追踪: $dir"
              echo "$matches"
              FAIL=1
            fi
          done

          echo "=== 检查禁止提交的文件 ==="
          for f in $FORBIDDEN_FILES $FORBIDDEN_PATTERNS; do
            matches=$(git ls-files | grep -E "(^|/)$f$" || true)
            if [ -n "$matches" ]; then
              echo "::error::禁止提交的文件被追踪: $f"
              echo "$matches"
              FAIL=1
            fi
          done

          echo "=== 检查 .env.backup 等敏感备份 ==="
          matches=$(git ls-files | grep -E "\.env\.backup$|\.env\.bak$" || true)
          if [ -n "$matches" ]; then
            echo "::error::禁止提交环境变量备份文件"
            echo "$matches"
            FAIL=1
          fi

          if [ $FAIL -eq 1 ]; then
            echo "::error::工作区卫生检查未通过，请删除上述文件或加入 .gitignore"
            exit 1
          fi
          echo "✓ 工作区卫生检查通过"

  path-hygiene:
    # 2026-06-25: 路径卫生检查 - 防止 G 盘根目录硬编码路径回归
    # 覆盖: G:\\1/G:\\dev/G:\\tmp 硬编码 + Linux /tmp/ 硬编码 + .gitignore 兜底
    name: 路径卫生检查
    runs-on: ubuntu-latest
    needs: [workspace-hygiene]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: 安装 pytest
        run: pip install pytest pytest-asyncio
      - name: 运行 path-hygiene 测试
        run: |
          set -e
          cd server
          python -m pytest tests/test_path_hygiene.py -v --tb=short
      - name: 静态扫描 (双重保险)
        run: |
          set -e
          cd server
          python scripts/_scan_hardcoded_g_drive_paths.py || {
            echo "::error::硬编码 G:\\1/G:\\dev/G:\\tmp 路径扫描失败"
            exit 1
          }
          python scripts/_scan_client_hardcoded_paths.py || {
            echo "::error::client 子项目硬编码路径扫描失败"
            exit 1
          }
          echo "✓ 静态扫描通过"

  backend-lint:
    name: 后端 lint
    runs-on: ubuntu-latest
    needs: [workspace-hygiene]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r server/requirements.txt
      - run: cd server && ruff check app/ scripts/ tests/
      - run: cd server && mypy app/ --ignore-missing-imports
      - run: cd server && bandit -r app/ -f json -o bandit-report.json || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-lint
          path: server/bandit-report.json

  backend-test:
    name: 后端测试
    runs-on: ubuntu-latest
    needs: [workspace-hygiene]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: zhs_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r server/requirements.txt
      - name: DeprecationWarning 守护 (项目模块导入时弃用 API 即阻断)
        run: cd server && python -W error::DeprecationWarning -c "import app.main"
      - name: 跑 pytest
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/zhs_test
          REDIS_URL: redis://localhost:6379/0
        run: |
          cd server
          pytest tests/ -v --tb=short --cov=app --cov-report=xml --cov-report=html --cov-fail-under=20
      - run: cd server && python -m pytest tests/test_n_plus_one_detector.py -v --tb=short
      - uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: server/htmlcov/

  frontend-lint:
    name: 前端 lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: cd client && npm ci
      - run: cd client && npm run lint
      - run: cd client && npm run typecheck

  frontend-test:
    # 前端单元测试门槛 (vitest, 453 文件 / 3342 测试)
    # PR 合并前必须全部通过, 覆盖率不低于 20%
    name: 前端单元测试
    runs-on: ubuntu-latest
    needs: [workspace-hygiene]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: cd client && npm ci
      - name: 跑 vitest 单元测试
        run: cd client && npm run test:coverage
      - name: 跑 i18n 完整性检查
        run: cd client && npm run check:i18n
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: client/coverage/
      - name: 阻断提示
        if: failure()
        run: |
          echo "::error::前端单元测试未通过, 阻断 PR 合入. 请本地跑 'npm test' 修复后重新提交."

  frontend-build:
    name: 前端构建
    runs-on: ubuntu-latest
    needs: [workspace-hygiene]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: cd client && npm ci
      - run: cd client && npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: client/dist/

  smoke-fast-gate:
    # 建议 8: smoke CI 第一道闸口
    # - 不依赖 Vite/preview, 只直连后端 8000
    # - 3 秒内跑完, 失败立即阻断后续 playwright-e2e
    # - 同时跑 check:port-drift 静态扫描, 防止端口漂移
    # 建议 18: 加 actions/cache 提速
    name: Smoke 快速闸口 (ubuntu, 后端 health + 端口契约)
    runs-on: ubuntu-latest
    needs: [backend-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      # 建议 18: 显式 cache, 让 smoke-fast-gate 第一次冷启动 30s -> 热启动 5s
      - name: Cache npm store (建议 18)
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-
      - name: Cache Python pip (建议 18)
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('server/requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-
      - name: Cache Playwright browsers (建议 18)
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('client/package.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - run: pip install -r server/requirements.txt
      - name: 静态端口漂移检测 (无需后端)
        run: cd client && npm run check:port-drift
      - name: 静态 CRLF 行尾检查 (无需后端, 建议 13)
        run: npm run check:line-endings
      - name: 启动后端 (smoke gate, 8000)
        env:
          AUTO_CREATE_SCHEMA: '1'
          ENV: development
          SKIP_DEPS_INSTALL: '1'
          SKIP_PORT_CLEAN: '1'
        run: |
          nohup bash scripts/ci-env-setup.sh > /tmp/smoke-backend.log 2>&1 &
          for i in {1..60}; do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8000/health || true)
            if [ "$code" = "200" ]; then
              echo "backend healthy after ${i}s"
              break
            fi
            sleep 1
          done
          curl -s http://127.0.0.1:8000/health || (cat /tmp/smoke-backend.log | tail -30 && exit 1)
      - name: 跑 smoke 测试 (3 秒内, 不依赖前端)
        env:
          PW_BACKEND_URL: http://127.0.0.1:8000
        run: |
          cd client
          npm ci
          npx playwright install --with-deps chromium
          npx playwright test e2e/login-flow-e2e.spec.ts --reporter=list
      - name: 阻断提示
        if: failure()
        run: |
          echo "::error::Smoke 快速闸口未通过, 后端 health 不可达 / 端口契约漂移 / 18000 复活, 阻断后续 e2e"

  smoke-fast-gate-matrix:
    # 建议 19: 跨平台镜像 smoke, 提前暴露平台专属 bug
    #   - windows: Get-Process / chcp 65001 / cmd.exe
    #   - macos: bash 3.2 兼容 (macOS 自带)
    #   - ubuntu: 基准 (上面 smoke-fast-gate 已是 ubuntu)
    name: Smoke 矩阵 (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [backend-test]
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Cache npm (matrix)
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm                     # macOS / Linux
            %LOCALAPPDATA%\npm-cache   # Windows
          key: npm-${{ matrix.os }}-${{ hashFiles('**/package-lock.json') }}
      - run: python -m pip install -r server/requirements.txt
      - name: 静态端口漂移检测 (无需后端, 跨平台)
        shell: pwsh  # 跨平台用 pwsh
        run: cd client; npm ci; npm run check:port-drift
      - name: "启动后端 (matrix: windows=pwsh, macos=bash)"
        env:
          AUTO_CREATE_SCHEMA: '1'
          ENV: development
          SKIP_DEPS_INSTALL: '1'
          SKIP_PORT_CLEAN: '1'
        shell: pwsh
        run: |
          if ($env:RUNNER_OS -eq 'Windows') {
            # Windows runner: 用 PowerShell 脚本
            $proc = Start-Process powershell -ArgumentList '-NoProfile', '-ExecutionPolicy', 'Bypass', '-File', 'scripts\ci-env-setup.ps1' -PassThru -NoNewWindow
            Write-Host "ci-env-setup pid=$($proc.Id)"
          } else {
            # macOS / Linux runner: 用 bash 脚本
            $proc = Start-Process bash -ArgumentList '-c', 'nohup bash scripts/ci-env-setup.sh > /tmp/smoke-backend.log 2>&1 &' -PassThru
            Write-Host "ci-env-setup pid=$($proc.Id)"
          }
          Start-Sleep -Seconds 5
          for ($i = 1; $i -le 60; $i++) {
            try {
              $code = (Invoke-WebRequest http://127.0.0.1:8000/health -UseBasicParsing -TimeoutSec 2).StatusCode
              if ($code -eq 200) { Write-Host "backend healthy after ${i}s"; break }
            } catch {}
            Start-Sleep -Seconds 1
          }
          $code = (Invoke-WebRequest http://127.0.0.1:8000/health -UseBasicParsing).StatusCode
          if ($code -ne 200) { Get-Content /tmp/smoke-backend.log -ErrorAction SilentlyContinue | Select-Object -Last 30; exit 1 }
      - name: 跑 smoke 测试 (matrix)
        env:
          PW_BACKEND_URL: http://127.0.0.1:8000
        shell: pwsh
        run: |
          cd client
          npx playwright install --with-deps chromium
          npx playwright test e2e/smoke/health.spec.ts --reporter=list
      - name: 上传 matrix 日志 (失败时)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-matrix-logs-${{ matrix.os }}
          path: |
            /tmp/smoke-backend.log
            scripts/logs/
          if-no-files-found: ignore

  playwright-e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build, frontend-test, smoke-fast-gate]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: cd client && npm ci
      - run: cd client && npx playwright install --with-deps chromium webkit
      - name: 安装后端依赖
        run: pip install -r server/requirements.txt
      - name: 启动后端 (AUTO_CREATE_SCHEMA + dev mode, ci-env-setup.sh 统一编排)
        # 单一来源 8000 (见 client/config/ports.ts)
        # 建议 11: 已替换原内联 python scripts/ci_start_backend.py 为 ci-env-setup.sh 统一编排入口
        # 跳过依赖安装 (CI 已 pip install) + 跳过端口清理 (干净 runner)
        env:
          AUTO_CREATE_SCHEMA: '1'
          ENV: development
          SKIP_DEPS_INSTALL: '1'
          SKIP_PORT_CLEAN: '1'
        run: |
          cd "$GITHUB_WORKSPACE"
          # 后台跑 ci-env-setup.sh, 把 uvicorn 留在 8000
          nohup bash scripts/ci-env-setup.sh > /tmp/ci-backend.log 2>&1 &
          echo "ci_env_setup_pid=$!"
          # 等待后端健康
          for i in {1..60}; do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8000/health || true)
            if [ "$code" = "200" ]; then
              echo "backend healthy after ${i}s"
              break
            fi
            sleep 1
          done
          curl -s http://127.0.0.1:8000/health || (echo "backend not healthy" && cat /tmp/ci-backend.log | tail -50 && exit 1)
      - name: 启动预览
        run: |
          cd client
          npm run preview --port 4173 &
          sleep 5
      - name: 跑样式验证
        run: cd client && npx playwright test e2e/final-styles-verify.spec.ts
      - name: 跑登录态联调
        run: cd client && npx playwright test e2e/auth-flow-integration.spec.ts
      - name: 跑前后端联调
        env:
          PW_BACKEND_URL: http://127.0.0.1:8000
          PW_BASE_URL: http://127.0.0.1:4173
        run: cd client && npx playwright test e2e/frontend-backend-e2e.spec.ts
      - name: 跑 WebSocket 联调
        env:
          PW_BACKEND_URL: http://127.0.0.1:8000
          PW_BASE_URL: http://127.0.0.1:4173
        run: cd client && npx playwright test e2e/websocket-integration.spec.ts
      - name: 跑错误处理联调
        env:
          PW_BACKEND_URL: http://127.0.0.1:8000
          PW_BASE_URL: http://127.0.0.1:4173
        run: cd client && npx playwright test e2e/error-handling-integration.spec.ts
      - name: 跑 UI 核心页面测试 (注册/用户中心/订单/仪表盘/设置/404/路由保护)
        env:
          PW_BACKEND_URL: http://127.0.0.1:8000
          PW_BASE_URL: http://127.0.0.1:4173
        run: cd client && npx playwright test e2e/ui-core-pages.spec.ts --project=chromium
      - name: 跑 UI 用户流程测试 (登录/首页/支付)
        env:
          PW_BACKEND_URL: http://127.0.0.1:8000
          PW_BASE_URL: http://127.0.0.1:4173
        run: cd client && npx playwright test e2e/ui-user-flow.spec.ts --project=chromium
      - name: 跑业务流程联调测试 (创建/支付/退款等 8 个流程)
        env:
          PW_BACKEND_URL: http://127.0.0.1:8000
          PW_BASE_URL: http://127.0.0.1:4173
        run: cd client && npx playwright test e2e/business-flow.spec.ts --project=chromium
      - name: 跑 API 联调全覆盖测试 (v2-admin + v1/v2/ddd 共 14 个模块)
        env:
          PW_BACKEND_URL: http://127.0.0.1:8000
          PW_BASE_URL: http://127.0.0.1:4173
        run: |
          cd client && npx playwright test \
            e2e/v2-admin-crud.spec.ts \
            e2e/v2-admin-query.spec.ts \
            e2e/v2-business.spec.ts \
            e2e/v1-auth.spec.ts \
            e2e/v1-integration.spec.ts \
            e2e/v1-fund.spec.ts \
            e2e/v1-sys-config.spec.ts \
            e2e/v1-sys-user.spec.ts \
            e2e/v1-user-vip.spec.ts \
            e2e/ddd-order.spec.ts \
            --project=chromium --workers=1
      - name: 收集 E2E V8 代码覆盖率
        env:
          PW_BACKEND_URL: http://127.0.0.1:8000
          PW_BASE_URL: http://127.0.0.1:4173
        run: cd client && node scripts/e2e-v8-coverage.mjs
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: client/playwright-report/
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-screenshots
          path: client/pw-output/
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-v8-coverage-report
          path: client/e2e-v8-coverage-report/

  pg-precheck:
    name: PG 真连预检
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: precheck
          POSTGRES_PASSWORD: precheck
          POSTGRES_DB: precheck
        ports: ['5432:5432']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install httpx
      - name: 跑真连预检
        env:
          DATABASE_URL: postgresql://precheck:precheck@localhost:5432/precheck
        run: |
          cd server
          python scripts/pg_real_precheck.py --mode connect \
            --dsn "$DATABASE_URL" --output pg-precheck.json
      - uses: actions/upload-artifact@v4
        with:
          name: pg-precheck
          path: server/pg-precheck.json

  prom-alert-e2e:
    name: 告警端到端
    runs-on: ubuntu-latest
    needs: [backend-test]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: zhs_test
        ports: ['5432:5432']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r server/requirements.txt
      - name: 告警 e2e
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/zhs_test
        run: |
          cd server
          python scripts/prom_alert_e2e.py \
            --prometheus-url http://localhost:9090 \
            --alertmanager-url http://localhost:9093 \
            --dry-run --output prom-alert-e2e.json
      - uses: actions/upload-artifact@v4
        with:
          name: prom-alert-e2e
          path: server/prom-alert-e2e.json

  openapi-drift:
    name: OpenAPI 漂移检测
    runs-on: ubuntu-latest
    needs: [backend-test]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r server/requirements.txt
      - name: "检测 (P17-3: 生成 Markdown 报告)"
        run: |
          cd server
          python scripts/ci/check_openapi_schema_drift.py \
            --baseline tests/fixtures/openapi_baseline.json \
            --strict \
            --report-md openapi-drift.md || echo "drift_detected=true" >> $GITHUB_OUTPUT
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: openapi-drift
          path: |
            server/openapi-drift.md
            server/openapi-drift.json
      - name: "P17-3: 评论漂移报告到 PR"
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f server/openapi-drift.md ]; then
            gh pr comment ${{ github.event.pull_request.number }} \
              --body-file server/openapi-drift.md
            echo "drift_comment_posted=true"
          fi
      - name: 阻断提示
        if: failure()
        run: |
          echo "::error::OpenAPI schema 漂移, 已自动评论到 PR"

  v1-deprecation-check:
    name: v1 弃用检查
    runs-on: ubuntu-latest
    needs: [backend-test]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: 跑 v1 弃用检查
        continue-on-error: true
        run: |
          python server/scripts/check_v1_deprecation.py \
            --base ${{ github.base_ref }} \
            --output v1-deprecation.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: v1-deprecation
          path: v1-deprecation.json
      - name: 阻断提示
        if: failure()
        run: |
          echo "::error::v1 弃用检查未通过，请将 v1 端点迁移到 v2 后再合并 PR"

  p11-nightly-shadow-compare:
    name: P11 Nightly Shadow 对比 (v1 vs v2)
    runs-on: ubuntu-latest
    # 仅在 nightly schedule 触发, PR 不跑
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: 安装 httpx
        run: pip install httpx
      - name: 跑 Shadow 对比 (需要后端运行中)
        # 端口约定: 8000 是单一后端端口 (2026-06-18 起统一)
        # 历史上 18000 是 dev 后端, 已废弃, shadow 对比默认走 8000
        run: |
          python server/scripts/p11_shadow_compare.py \
            --base ${SHADOW_BASE_URL:-http://127.0.0.1:8000} \
            --output shadow-report.json \
            --max-diff 10
        env:
          SHADOW_BASE_URL: ${{ vars.SHADOW_BASE_URL }}
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: shadow-compare-report
          path: shadow-report.json
      - name: 差异提示
        if: failure()
        run: |
          echo "::warning::Shadow 对比存在差异, 需关注 v1/v2 一致性, 下次 P 批次重点处理"

  p12-openapi-drift:
    name: P12 OpenAPI v2 Drift 检测
    runs-on: ubuntu-latest
    needs: [backend-test]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: 安装 httpx
        run: pip install httpx
      - name: 启动后端 (提取 OpenAPI)
        run: |
          cd server
          pip install -e . || true
          python -c "import json, sys; sys.path.insert(0, '.'); from app.main import app; print(json.dumps(app.openapi()))" > /tmp/openapi-v2.json || echo '{"paths":{}}' > /tmp/openapi-v2.json
      - name: 跑 OpenAPI drift 检测
        continue-on-error: true
        run: |
          python server/scripts/p12_openapi_drift.py \
            --base-ref origin/${{ github.base_ref }} \
            --current /tmp/openapi-v2.json \
            --output openapi-drift.json \
            --max-added 200 \
            --max-removed 20
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: openapi-drift
          path: openapi-drift.json
      - name: P13 drift markdown 报告
        continue-on-error: true
        run: |
          python server/scripts/p13_drift_markdown.py \
            --drift-json openapi-drift.json \
            --output drift-report.md \
            --pr-number ${{ github.event.pull_request.number }} \
            --base-ref origin/${{ github.base_ref }}
      - name: P13 评论 drift 报告到 PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f drift-report.md ]; then
            gh pr comment ${{ github.event.pull_request.number }} \
              --body-file drift-report.md
            echo "drift_comment_posted=true" >> $GITHUB_OUTPUT
          fi
      - name: 阻断提示 (删除端点)
        if: failure()
        run: |
          echo "::error::OpenAPI v2 端点删除超过阈值, 请确认 v2 端点是否被意外移除"

  p13-weekly-devtools:
    name: "P13 周报: v1 弃用埋点 (定时)"
    runs-on: ubuntu-latest
    # 每周一 09:00 北京时间 (UTC 01:00) 跑
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: 安装 httpx
        run: pip install httpx
      - name: 跑 P13 周报生成
        env:
          PROMETHEUS_URL: ${{ vars.PROMETHEUS_URL }}
          BACKEND_URL: ${{ vars.BACKEND_URL }}
        # 端口约定: 8000 是单一后端端口 (2026-06-18 起统一), 不再使用 18000
        run: |
          python server/scripts/p13_weekly_devtools.py \
            --prometheus "${PROMETHEUS_URL:-http://127.0.0.1:9090}" \
            --backend "${BACKEND_URL:-http://127.0.0.1:8000}" \
            --days 7 \
            --out-dir server/scripts
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: p13-weekly-devtools
          path: |
            server/scripts/p13-weekly-devtools.md
            server/scripts/p13-weekly-devtools.json

  p14-v3-aggregate-smoke:
    # P15-4: v3 聚合查询端到端冒烟 (PR 触发)
    # 验证 /api/v3/query 端到端: 启动后端 -> POST 一次 agents+courses -> 期望 200 + 正确 schema
    name: P14 v3 聚合冒烟
    runs-on: ubuntu-latest
    needs: [backend-test]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r server/requirements.txt
      - name: 启动后端 (单测内置 server, 8000 端口)
        continue-on-error: true
        env:
          AUTO_CREATE_SCHEMA: '1'
          ENV: development
        run: |
          cd server
          nohup python scripts/ci_start_backend.py --port 8000 --timeout 90 > /tmp/p14-backend.log 2>&1 &
          echo "backend_start_pid=$!"
      - name: 等待后端健康
        run: |
          for i in {1..60}; do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8000/health || true)
            if [ "$code" = "200" ]; then
              echo "backend healthy after ${i}s"
              break
            fi
            sleep 1
          done
          curl -s http://127.0.0.1:8000/health || (echo "backend not healthy" && tail -50 /tmp/p14-backend.log && exit 1)
      - name: 跑 v3 聚合冒烟
        continue-on-error: true
        env:
          V3_BACKEND_URL: http://127.0.0.1:8000
        run: |
          python server/scripts/p14_v3_smoke.py \
            --backend "${V3_BACKEND_URL}" \
            --output server/p14-v3-smoke.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: p14-v3-smoke
          path: server/p14-v3-smoke.json
      - name: 阻断提示 (端点不可用)
        if: failure()
        run: |
          echo "::error::v3 聚合端点冒烟失败, /api/v3/query 返回非预期结果"

  helm-lint:
    name: Helm lint
    runs-on: ubuntu-latest
    continue-on-error: true  # deploy/helm/ 可能不存在, 允许跳过
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.14.0
      - name: lint
        run: |
          if [ ! -d deploy/helm ]; then echo "deploy/helm not found, skip"; exit 0; fi
          cd deploy/helm
          for chart in $(find . -name Chart.yaml -exec dirname {} \;); do
            helm lint "$chart"
          done

  docker-build:
    name: 镜像构建
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: 构建后端
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: 构建前端
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.client
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: 部署 staging
    runs-on: ubuntu-latest
    needs: [docker-build, playwright-e2e, pg-precheck, prom-alert-e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://staging.aizhs.top
    steps:
      - uses: actions/checkout@v4
      - name: 部署
        env:
          SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.STAGING_HOST }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
        run: |
          echo "staging 部署触发"
          ssh -o StrictHostKeyChecking=no root@$DEPLOY_HOST "
            cd /opt/aizhs &&
            git pull origin main &&
            export DB_PASSWORD=$DB_PASSWORD &&
            export REDIS_PASSWORD=$REDIS_PASSWORD &&
            export JWT_SECRET=$JWT_SECRET &&
            export SESSION_SECRET=$SESSION_SECRET &&
            export MINIO_ACCESS_KEY=$MINIO_ACCESS_KEY &&
            export MINIO_SECRET_KEY=$MINIO_SECRET_KEY &&
            export DOMAIN=staging.aizhs.top &&
            export APP_TITLE='智汇AI(staging)' &&
            docker compose up -d --build
          "

  notify-failure:
    name: 失败通知
    runs-on: ubuntu-latest
    needs:
      - workspace-hygiene
      - backend-lint
      - backend-test
      - frontend-lint
      - frontend-test
      - frontend-build
      - smoke-fast-gate
      - smoke-fast-gate-matrix
      - playwright-e2e
      - pg-precheck
      - prom-alert-e2e
      - openapi-drift
      - helm-lint
    if: failure()
    steps:
      - uses: actions/checkout@v4
      - name: 收集失败 job 列表
        id: collect
        run: |
          FAILED_JOBS=$(echo '${{ toJSON(needs) }}' | python3 -c "
          import json, sys
          needs = json.load(sys.stdin)
          failed = [name for name, info in needs.items() if info.get('result') == 'failure']
          print(', '.join(failed))
          ")
          echo "failed_jobs=$FAILED_JOBS" >> $GITHUB_OUTPUT
          echo "失败 job: $FAILED_JOBS"
      - name: 通知钉钉
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          FAILED_JOBS: ${{ steps.collect.outputs.failed_jobs }}
        run: |
          if [ -z "$DINGTALK_WEBHOOK" ]; then
            echo "DINGTALK_WEBHOOK 未配置, 跳过钉钉通知"
            exit 0
          fi
          curl -X POST "$DINGTALK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "{
              \"msgtype\": \"markdown\",
              \"markdown\": {
                \"title\": \"CI 失败\",
                \"text\": \"## CI 失败\n- 仓库: ${{ github.repository }}\n- 分支: ${{ github.ref }}\n- 提交: ${{ github.sha }}\n- 失败 job: ${FAILED_JOBS}\n- 详情: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
              }
            }"
      - name: 通知飞书
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          FAILED_JOBS: ${{ steps.collect.outputs.failed_jobs }}
        run: |
          if [ -z "$FEISHU_WEBHOOK" ]; then
            echo "FEISHU_WEBHOOK 未配置, 跳过飞书通知"
            exit 0
          fi
          curl -X POST "$FEISHU_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "{
              \"msg_type\": \"interactive\",
              \"card\": {
                \"header\": {
                  \"title\": { \"tag\": \"plain_text\", \"content\": \"CI 失败\" },
                  \"template\": \"red\"
                },
                \"elements\": [
                  { \"tag\": \"div\", \"text\": { \"tag\": \"lark_md\", \"content\": \"**仓库:** ${{ github.repository }}\n**分支:** ${{ github.ref }}\n**提交:** ${{ github.sha }}\n**失败 job:** ${FAILED_JOBS}\" } },
                  { \"tag\": \"action\", \"actions\": [ { \"tag\": \"button\", \"text\": { \"tag\": \"plain_text\", \"content\": \"查看详情\" }, \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\", \"type\": \"primary\" } ] }
                ]
              }
            }"
