name: OpenAPI 规范校验

on:
  push:
    paths:
      - "server/app/api/**"
      - "server/scripts/ci/check_openapi_*.py"
      - ".github/workflows/openapi-check.yml"
  pull_request:
    paths:
      - "server/app/api/**"
      - "server/scripts/ci/check_openapi_*.py"

jobs:
  openapi-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        working-directory: server
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 2>/dev/null || pip install fastapi uvicorn sqlalchemy pydantic || true

      - name: 检查路径参数声明
        working-directory: server
        run: python scripts/ci/check_openapi_path_params.py

      - name: 检查 OpenAPI Schema 漂移
        working-directory: server
        run: python scripts/ci/check_openapi_schema_drift.py || echo "Schema 有变化, 请确认是否需要更新 baseline"
