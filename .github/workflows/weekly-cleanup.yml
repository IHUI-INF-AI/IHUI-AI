name: weekly-cleanup

# P23: 每周定期清理 - 自动运行 clean 脚本并提交 .gitignore 更新
# 每周一北京时间 03:00 (UTC 19:00 周日)

on:
  schedule:
    - cron: '0 19 * * 0'  # 每周日 UTC 19:00 = 周一北京时间 03:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    name: 工作区清理
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 清理前端运行时产物
        run: cd client && node scripts/clean.mjs || true

      - name: 清理后端运行时产物
        run: cd server && python scripts/clean.py || true

      - name: 检查是否有变更
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "检测到需要清理的文件"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "工作区已干净，无需清理"
          fi

      - name: 提交清理
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: 周定期清理运行时产物

          由 weekly-cleanup workflow 自动生成。
          清理内容: __pycache__/, .log, .ruff_cache/, pw-output/ 等"
          git push

      - name: 清理总结
        run: |
          echo "### 周清理总结" >> $GITHUB_STEP_SUMMARY
          echo "- 前端清理: \`npm run clean\`" >> $GITHUB_STEP_SUMMARY
          echo "- 后端清理: \`python scripts/clean.py\`" >> $GITHUB_STEP_SUMMARY
          echo "- 提交变更: ${{ steps.changes.outputs.has_changes }}" >> $GITHUB_STEP_SUMMARY
