name: loop-daily-triage

# Loop Engineering L1 daily-triage (report-only, дёҘж јеҸӘиҜ»)
# - cron еҢ—дә¬ж—¶й—ҙ 08:00 (UTC 00:00), е·ҘдҪңж—Ҙ
# - д»Јз ҒеҚ«з”ҹ: TODO/FIXME/XXX и®Ўж•°
# - йқҷжҖҒеҲҶжһҗ: eslint е‘ҠиӯҰ
# - дҫқиө–еҒҘеә·: npm audit
# - еҶҷ .github/loop-runtime/STATE.md (commit еӣһеҲҶж”Ҝ, дёҚи§ҰеҸ‘е®Ңж•ҙ CI)

on:
  schedule:
    # еҢ—дә¬ж—¶й—ҙ 08:00 = UTC 00:00, е‘ЁдёҖиҮіе‘Ёдә”
    - cron: '0 0 * * 1-5'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'еҸӘжү«жҸҸдёҚ commit (debug з”Ё)'
        required: false
        default: 'false'

permissions:
  contents: write
  actions: read

env:
  NODE_VERSION: '20.10'
  PNPM_VERSION: '9.15'
  TZ: 'Asia/Shanghai'

jobs:
  loop-triage:
    name: Loop L1 daily-triage (report-only)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: е®үиЈ…дҫқиө–
        run: pnpm install --frozen-lockfile

      # ============================================================
      # loop-triage: д»Јз ҒеҚ«з”ҹ + йқҷжҖҒеҲҶжһҗ + дҫқиө–еҒҘеә· (е®№й”ҷ)
      # ============================================================
      - name: loop-triage (д»Јз ҒеҚ«з”ҹ + йқҷжҖҒеҲҶжһҗ + дҫқиө–еҒҘеә·)
        id: triage
        continue-on-error: true
        run: |
          set +e
          mkdir -p .loop-tmp
          ts=$(TZ=Asia/Shanghai date -u +%Y-%m-%dT%H:%M:%S%z)

          # 1. д»Јз ҒеҚ«з”ҹ: TODO/FIXME/XXX и®Ўж•° (ts/tsx/js/py)
          todo=$(grep -rE --include='*.ts' --include='*.tsx' --include='*.js' --include='*.py' -c '(TODO|FIXME|XXX)' apps/ packages/ 2>/dev/null | awk -F: '{s+=$NF} END{print s+0}')
          echo "todo_fixme_count=$todo" | tee -a .loop-tmp/env

          # 2. д»Јз ҒеҚ«з”ҹ: зҰҒз”Ёж–Үд»¶иў«иҝҪиёӘ
          forbidden_dirs="pw-output screenshots test-results storybook-static audit .ruff_cache"
          forbidden_files="dev-server.log gen-out.log eslint-report.json"
          forbidden_match=$(git ls-files | grep -E "^([^/]+/)?($(echo $forbidden_dirs | tr ' ' '|'))/" || true)
          forbidden_match="$forbidden_match$(git ls-files | grep -E "(^|/)($(echo $forbidden_files | tr ' ' '|'))$" || true)"
          forbidden_count=$(echo "$forbidden_match" | grep -c . || echo 0)
          echo "forbidden_files_tracked=$forbidden_count" | tee -a .loop-tmp/env

          # 3. д»Јз ҒеҚ«з”ҹ: .env.backup / .env.bak жі„жјҸ
          env_bak=$(git ls-files | grep -E '\.env\.backup$|\.env\.bak$' || true)
          env_bak_count=$(echo "$env_bak" | grep -c . || echo 0)
          echo "env_backup_leak=$env_bak_count" | tee -a .loop-tmp/env

          # 4. йқҷжҖҒеҲҶжһҗ: eslint е‘ҠиӯҰжқЎж•° (apps/api + apps/web, е®№й”ҷ)
          eslint_warn=$(pnpm -r exec eslint --format json src/ 2>/dev/null | node -e "
            let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{
              try{const arr=JSON.parse(d);let n=0;for(const f of arr)n+=(f.messages||[]).length;console.log(n)}catch{console.log(0)}
            })
          " 2>/dev/null || echo "жңӘйҮҮйӣҶ")
          echo "eslint_warnings=$eslint_warn" | tee -a .loop-tmp/env

          # 5. дҫқиө–еҒҘеә·: npm high/critical е‘ҠиӯҰж•°йҮҸ
          npm_audit=$(pnpm audit --prod --json 2>/dev/null | node -e "
            let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{
              try{const v=JSON.parse(d).metadata?.vulnerabilities||{};console.log((v.high||0)+(v.critical||0))}catch{console.log('жңӘйҮҮйӣҶ')}
            })
          " 2>/dev/null || echo "жңӘйҮҮйӣҶ")
          echo "npm_high_critical=$npm_audit" | tee -a .loop-tmp/env

          # 6. зұ»еһӢжЈҖжҹҘ: tsc й”ҷиҜҜж•° (е®№й”ҷ)
          tsc_err=$(pnpm -r exec tsc --noEmit 2>&1 | grep -c 'error TS' || echo 0)
          echo "tsc_errors=$tsc_err" | tee -a .loop-tmp/env

          # жү“еҢ…дҝЎеҸ· JSON
          node -e "
            const fs=require('fs');const env={};
            const t=fs.readFileSync('.loop-tmp/env','utf8');
            for(const line of t.split('\n')){const i=line.indexOf('=');if(i>0)env[line.slice(0,i)]=line.slice(i+1)}
            console.log(JSON.stringify(env))
          " > .loop-tmp/env.json
          cat .loop-tmp/env.json

      # ============================================================
      # loop-verifier: иҗҪзӣҳ STATE.md
      # ============================================================
      - name: loop-verifier (иҗҪзӣҳ STATE.md)
        id: verifier
        run: |
          set -e
          mkdir -p .github/loop-runtime
          ts=$(TZ=Asia/Shanghai date -u +%Y-%m-%dT%H:%M:%S%z)
          trigger="${{ github.event_name }}"

          # и§ЈжһҗдҝЎеҸ·
          signals=$(cat .loop-tmp/env.json 2>/dev/null || echo '{}')

          # еҲқе§ӢеҢ– STATE.md (иӢҘдёҚеӯҳеңЁ)
          if [ ! -f .github/loop-runtime/STATE.md ]; then
            cat > .github/loop-runtime/STATE.md <<'EOF'
          # STATE.md (loop-daily-triage иҮӘеҠЁз»ҙжҠӨ)
          last_run: init
          last_status: init
          next_run: дёӢдёҖдёӘе·ҘдҪңж—Ҙ 08:00 (Asia/Shanghai)
          consecutive_degraded: 0
          EOF
          fi

          # жӣҙж–° STATE.md еӯ—ж®ө
          node -e "
            const fs=require('fs');
            const ts='$ts';const signals=JSON.parse('$signals');
            let t=fs.readFileSync('.github/loop-runtime/STATE.md','utf8');
            t=t.replace(/last_run:\s*.*/, 'last_run: '+ts);
            // еҲӨе®ҡзҠ¶жҖҒ: eslint/tsc/npm д»»дёҖйқһйӣ¶еҲҷ degraded
            const bad=(+signals.eslint_warnings||0)+(+(signals.tsc_errors||0))+(+(signals.npm_high_critical||0));
            const status=bad>0?'degraded':'ok';
            t=t.replace(/last_status:\s*.*/, 'last_status: '+status);
            t=t.replace(/next_run:\s*.*/, 'next_run: дёӢдёҖдёӘе·ҘдҪңж—Ҙ 08:00 (Asia/Shanghai)');
            if(status==='degraded'){
              const m=/consecutive_degraded:\s*(\d+)/.exec(t);const n=m?+m[1]:0;
              t=t.replace(/consecutive_degraded:\s*\d+/, 'consecutive_degraded: '+(n+1));
            } else {
              t=t.replace(/consecutive_degraded:\s*\d+/, 'consecutive_degraded: 0');
            }
            fs.writeFileSync('.github/loop-runtime/STATE.md', t);
            console.log('status='+status);
          " | tee -a $GITHUB_OUTPUT

          # иҝҪеҠ еҲ° loop-run-log.md
          if [ ! -f .github/loop-runtime/loop-run-log.md ]; then echo "# loop-run-log.md" > .github/loop-runtime/loop-run-log.md; fi
          {
            echo ""
            echo "## Run $ts (Asia/Shanghai)"
            echo ""
            echo "- trigger: $trigger"
            echo "- level: L1"
            cat .loop-tmp/env | sed 's/^/- /'
            echo ""
          } >> .github/loop-runtime/loop-run-log.md

      # ============================================================
      # жҸҗдәӨ STATE.md / loop-run-log.md
      # ============================================================
      - name: commit & push (д»… *.md)
        if: github.event.inputs.dry_run != 'true'
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/loop-runtime/STATE.md .github/loop-runtime/loop-run-log.md 2>/dev/null || true
          ts=$(TZ=Asia/Shanghai date -u +%Y-%m-%dT%H:%M:%S%z)
          git commit -m "loop: L1 daily-triage @ $ts (report-only)" || echo "nothing to commit"
          git push || echo "push skipped (еҸҜиғҪж— еҸҳжӣҙ)"

      - name: дёҠдј  loop дә§зү© (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: loop-triage-run
          path: |
            .github/loop-runtime/loop-run-log.md
            .github/loop-runtime/STATE.md
            .loop-tmp/
          if-no-files-found: ignore

      - name: йҖҡзҹҘй’үй’ү
        if: failure()
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        run: |
          if [ -z "$DINGTALK_WEBHOOK" ]; then
            echo "DINGTALK_WEBHOOK жңӘй…ҚзҪ®, и·іиҝҮ"
            exit 0
          fi
          curl -X POST "$DINGTALK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "{\"msgtype\":\"markdown\",\"markdown\":{\"title\":\"Loop L1 еӨұиҙҘ\",\"text\":\"## Loop L1 daily-triage еӨұиҙҘ\n- д»“еә“: ${{ github.repository }}\n- иҜҰжғ…: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}}"

      - name: йҖҡзҹҘйЈһд№Ұ
        if: failure()
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          if [ -z "$FEISHU_WEBHOOK" ]; then
            echo "FEISHU_WEBHOOK жңӘй…ҚзҪ®, и·іиҝҮ"
            exit 0
          fi
          curl -X POST "$FEISHU_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "{\"msg_type\":\"interactive\",\"card\":{\"header\":{\"title\":{\"tag\":\"plain_text\",\"content\":\"Loop L1 еӨұиҙҘ\"},\"template\":\"red\"},\"elements\":[{\"tag\":\"div\",\"text\":{\"tag\":\"lark_md\",\"content\":\"**д»“еә“:** ${{ github.repository }}\"}}]}}"
