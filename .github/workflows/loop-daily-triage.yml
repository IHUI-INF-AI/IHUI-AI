name: loop-daily-triage

# Loop Engineering L1 daily-triage (report-only, 严格只读)
# - cron 北京时间 08:00 (UTC 00:00), 工作日
# - 独立 workflow, 不合并 ci.yml
# - 只扫描 + 写 3 个 markdown (loop-run-log.md / STATE.md / loop-budget.md)
# - 这 3 个 md 已被 ci.yml paths-ignore 排除, commit 回分支不触发完整 CI
# - 失败通知复用 ci.yml notify-failure 机制 (钉钉 DINGTALK_WEBHOOK / 飞书 FEISHU_WEBHOOK)
# - 设计参考: 仓库根 LOOP.md / AGENTS.md / loop-budget.md

on:
  schedule:
    # 北京时间 08:00 = UTC 00:00, 周一至周五
    - cron: '0 0 * * 1-5'
  workflow_dispatch:
    inputs:
      dry_run:
        description: '只扫描不 commit (debug 用)'
        required: false
        default: 'false'

permissions:
  contents: write   # 用于把 3 个 md commit 回分支
  actions: read      # 用于读自己上次的运行状态

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'
  TZ: 'Asia/Shanghai'

jobs:
  loop-triage:
    name: Loop L1 daily-triage (report-only)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      last_status: ${{ steps.verifier.outputs.last_status }}
      signals_json: ${{ steps.triage.outputs.signals_json }}
      budget_status: ${{ steps.budget.outputs.budget_status }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      # ============================================================
      # 前置: 读 STATE.md 判断是否在 cooldown
      # ============================================================
      - name: 读 STATE.md (cooldown 检查)
        id: state-in
        run: |
          set -e
          if [ ! -f STATE.md ]; then
            echo "STATE.md 不存在, 首次运行, 不在 cooldown"
            echo "cooldown=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          # 提取 last_status 行
          last_status=$(grep -E '^\s*last_status:' STATE.md | head -1 | sed -E 's/.*last_status:\s*//' | tr -d '"' || echo "init")
          echo "last_status=$last_status"
          if [ "$last_status" = "over-budget" ]; then
            echo "cooldown=true (上次 over-budget, 跳过本次)"
            echo "cooldown=true" >> $GITHUB_OUTPUT
          else
            echo "cooldown=false"
            echo "cooldown=false" >> $GITHUB_OUTPUT
          fi

      - name: cooldown 跳过
        if: steps.state-in.outputs.cooldown == 'true'
        run: |
          ts=$(date -u +%Y-%m-%dT%H:%M:%S%z)
          {
            echo ""
            echo "## SKIPPED $ts (Asia/Shanghai)"
            echo ""
            echo "- trigger: ${{ github.event_name }}"
            echo "- reason: STATE.md last_status == over-budget, cooldown"
            echo "- level: L1"
            echo ""
          } >> loop-run-log.md
          # 仍然 commit 这次跳过日志
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add loop-run-log.md
          git commit -m "loop: skip over-budget cooldown @ $ts" || echo "nothing to commit"
          git push || echo "push skipped"
          exit 0

      # ============================================================
      # loop-triage 阶段 (AGENTS.md 第 1 节): 只读扫描
      # 全部 continue-on-error=true (容错), 单项失败只标注未采集
      # ============================================================
      - name: loop-triage (代码卫生 + 依赖 + 静态分析)
        id: triage
        continue-on-error: true
        run: |
          set +e
          mkdir -p .loop-tmp
          ts=$(TZ=Asia/Shanghai date -u +%Y-%m-%dT%H:%M:%S%z)

          # 1. 代码卫生: TODO/FIXME/XXX 计数
          todo=$(grep -rE --include='*.py' --include='*.ts' --include='*.tsx' --include='*.js' --include='*.vue' -c '(TODO|FIXME|XXX)' . 2>/dev/null | awk -F: '{s+=$NF} END{print s+0}')
          echo "todo_fixme_count=$todo" | tee -a .loop-tmp/env

          # 2. 代码卫生: 禁用文件被追踪 (沿用 ci.yml workspace-hygiene 列表)
          forbidden_dirs="pw-output screenshots test-results storybook-static audit .ruff_cache"
          forbidden_files="dev-server.log gen-out.log live_openapi.json eslint-report.json"
          forbidden_match=$(git ls-files | grep -E "^([^/]+/)?($(echo $forbidden_dirs | tr ' ' '|'))/" || true)
          forbidden_match="$forbidden_match$(git ls-files | grep -E "(^|/)($(echo $forbidden_files | tr ' ' '|'))$" || true)"
          forbidden_count=$(echo "$forbidden_match" | grep -c . || echo 0)
          echo "forbidden_files_tracked=$forbidden_count" | tee -a .loop-tmp/env

          # 3. 代码卫生: .env.backup / .env.bak 泄漏
          env_bak=$(git ls-files | grep -E '\.env\.backup$|\.env\.bak$' || true)
          env_bak_count=$(echo "$env_bak" | grep -c . || echo 0)
          echo "env_backup_leak=$env_bak_count" | tee -a .loop-tmp/env

          # 4. 静态分析: ruff 告警条数 (不阻断, 仅统计)
          pip install -q ruff 2>/dev/null
          ruff_warn=$(ruff check server/app/ --output-format=github 2>/dev/null | grep -c '::' || echo 0)
          echo "ruff_warnings=$ruff_warn" | tee -a .loop-tmp/env

          # 5. 安全: bandit 高危条数 (容错)
          pip install -q bandit 2>/dev/null
          bandit_high=$(bandit -r server/app/ -f json -q 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(sum(1 for r in d.get('results',[]) if r.get('issue_severity')=='HIGH'))" 2>/dev/null || echo "未采集")
          echo "bandit_high=$bandit_high" | tee -a .loop-tmp/env

          # 6. 依赖健康: pip 过期数量 (容错, 仅统计高危)
          pip_outdated=$(pip list --outdated --format=json 2>/dev/null | python3 -c "import sys,json; print(len(json.load(sys.stdin)))" 2>/dev/null || echo "未采集")
          echo "pip_outdated=$pip_outdated" | tee -a .loop-tmp/env

          # 7. 静态分析: eslint 告警条数 (容错, 仅 client 源码)
          if [ -f client/package.json ]; then
            ( cd client && npm ci --no-audit --no-fund >/dev/null 2>&1 )
            eslint_warn=$(cd client && npx eslint --format json src/ 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(sum(len(f.get('messages',[])) for f in d))" 2>/dev/null || echo "未采集")
          else
            eslint_warn="未采集"
          fi
          echo "eslint_warnings=$eslint_warn" | tee -a .loop-tmp/env

          # 8. 依赖健康: npm high/critical 告警数量
          if [ -f client/package.json ]; then
            npm_audit=$(cd client && npm audit --omit=dev --json 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); v=d.get('metadata',{}).get('vulnerabilities',{}); print(v.get('high',0)+v.get('critical',0))" 2>/dev/null || echo "未采集")
          else
            npm_audit="未采集"
          fi
          echo "npm_high_critical=$npm_audit" | tee -a .loop-tmp/env

          # 9. 文档同步: OpenAPI spec 是否存在
          if [ -f server/openapi.json ] || ls server/app/main.py 2>/dev/null >/dev/null; then
            openapi_present="yes"
          else
            openapi_present="no"
          fi
          echo "openapi_present=$openapi_present" | tee -a .loop-tmp/env

          # 10. 测试覆盖: htmlcov 是否存在
          if [ -d server/htmlcov ]; then
            cov_present="yes"
          else
            cov_present="no"
          fi
          echo "cov_present=$cov_present" | tee -a .loop-tmp/env

          # 把所有信号打包成 JSON (供 loop-verifier 落盘)
          python3 <<'PY' >> .loop-tmp/env.json
          import json, os, pathlib
          env = {}
          p = pathlib.Path('.loop-tmp/env')
          if p.exists():
              for line in p.read_text(encoding='utf-8').splitlines():
                  if '=' in line:
                      k, v = line.split('=', 1)
                      env[k] = v
          print(json.dumps(env, ensure_ascii=False))
          PY
          cat .loop-tmp/env.json
          signals_json=$(cat .loop-tmp/env.json | tr '\n' ' ' | sed 's/ $//')
          echo "signals_json=$signals_json" >> $GITHUB_OUTPUT

      # ============================================================
      # loop-budget 阶段 (AGENTS.md 第 2 节): 预算判定
      # GitHub Actions 无 LLM, token 用等效估算 (按 step 数 × 平均)
      # ============================================================
      - name: loop-budget (预算判定)
        id: budget
        run: |
          set -e
          # 等效 token 估算: 8 个扫描 step × 平均 ~3k token = 24k (贴近 23k 软上限)
          tokens=24000
          soft=23000
          hard=100000

          if [ "$tokens" -le "$soft" ]; then
            budget_status="ok"
          elif [ "$tokens" -le "$hard" ]; then
            budget_status="degraded"
          else
            budget_status="over-budget"
          fi
          echo "tokens=$tokens" >> $GITHUB_OUTPUT
          echo "soft=$soft" >> $GITHUB_OUTPUT
          echo "hard=$hard" >> $GITHUB_OUTPUT
          echo "budget_status=$budget_status" >> $GITHUB_OUTPUT

      # ============================================================
      # loop-verifier 阶段 (AGENTS.md 第 3 节): 落盘 3 个 md
      # ============================================================
      - name: loop-verifier (落盘 3 个 md)
        id: verifier
        run: |
          set -e
          ts=$(TZ=Asia/Shanghai date -u +%Y-%m-%dT%H:%M:%S%z)
          trigger="${{ github.event_name }}"
          budget="${{ steps.budget.outputs.budget_status }}"
          tokens="${{ steps.budget.outputs.tokens }}"

          # 整体状态: over-budget 优先, 否则 ok
          if [ "$budget" = "over-budget" ]; then last_status="over-budget"; else last_status="ok"; fi
          echo "last_status=$last_status" >> $GITHUB_OUTPUT

          # 解析 signals
          python3 - "$ts" "$trigger" "$budget" "$tokens" "$last_status" <<'PY' > .loop-tmp/append.md
          import json, sys, os
          ts, trigger, budget, tokens, last_status = sys.argv[1:6]
          env_file = '.loop-tmp/env.json'
          try:
              with open(env_file, encoding='utf-8') as f:
                  signals = json.loads(f.read().strip())
          except Exception:
              signals = {}

          lines = []
          lines.append("")
          lines.append(f"## Run {ts} (Asia/Shanghai)")
          lines.append("")
          lines.append(f"- trigger: {trigger}")
          lines.append("- level: L1")
          lines.append("- duration_s: 实测见 Actions 日志")
          lines.append(f"- tokens: {tokens} / budget 100000")
          lines.append(f"- status: {last_status}")
          lines.append("")
          lines.append("### Signals")
          for k in ['todo_fixme_count','forbidden_files_tracked','env_backup_leak','ruff_warnings','bandit_high','pip_outdated','eslint_warnings','npm_high_critical','openapi_present','cov_present']:
              lines.append(f"- {k}: {signals.get(k, '未采集')}")
          lines.append("")
          lines.append("### 需要 L2 升级")
          lines.append("无")
          lines.append("")
          sys.stdout.write("\n".join(lines))
          PY
          cat .loop-tmp/append.md

          # 1) 追加到 loop-run-log.md
          if [ ! -f loop-run-log.md ]; then echo "# loop-run-log.md" > loop-run-log.md; fi
          cat .loop-tmp/append.md >> loop-run-log.md

          # 2) 更新 STATE.md (用 python 精准替换 yaml 字段)
          python3 - "$ts" "$last_status" <<'PY'
          import sys, re, pathlib
          ts, last_status = sys.argv[1:3]
          p = pathlib.Path('STATE.md')
          text = p.read_text(encoding='utf-8') if p.exists() else ""
          # last_run
          text = re.sub(r'last_run:\s*.*', f'last_run: {ts}', text)
          # last_status
          text = re.sub(r'last_status:\s*.*', f'last_status: {last_status}', text)
          # next_run: 工作日 +1 (简化: 下一个工作日 08:00 北京)
          text = re.sub(r'next_run:\s*.*', 'next_run: 下一个工作日 08:00 (Asia/Shanghai)', text)
          # consecutive_degraded
          if last_status == "degraded":
              m = re.search(r'consecutive_degraded:\s*(\d+)', text)
              n = int(m.group(1)) if m else 0
              text = re.sub(r'consecutive_degraded:\s*\d+', f'consecutive_degraded: {n+1}', text)
          else:
              text = re.sub(r'consecutive_degraded:\s*\d+', 'consecutive_degraded: 0', text)
          p.write_text(text, encoding='utf-8')
          PY

          # 3) 追加到 loop-budget.md 累计表
          date_short=$(TZ=Asia/Shanghai date -u +%Y-%m-%d)
          if ! grep -q "^| $date_short " loop-budget.md; then
            python3 - "$date_short" "$trigger" "$tokens" "$last_status" <<'PY'
          import sys, pathlib, re
          d, trigger, tokens, last_status = sys.argv[1:5]
          p = pathlib.Path('loop-budget.md')
          text = p.read_text(encoding='utf-8')
          row = f"| {d} | {trigger} | {tokens} | - | {last_status} |"
          # 找累计表最后一行后追加
          text = re.sub(r'(\| \d{4}-\d{2}-\d{2} \| [^|]+\| [^|]+\| [^|]+\| [^|]+\|)\s*$',
                        lambda m: m.group(1) + "\n" + row, text, count=1, flags=re.M)
          p.write_text(text, encoding='utf-8')
          PY
          fi

      # ============================================================
      # 提交 3 个 md (已被 ci.yml paths-ignore 排除, 不触发完整 CI)
      # ============================================================
      - name: commit & push (仅 *.md)
        if: github.event.inputs.dry_run != 'true'
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add LOOP.md STATE.md loop-budget.md loop-run-log.md AGENTS.md 2>/dev/null || true
          git add .github/workflows/loop-daily-triage.yml 2>/dev/null || true
          ts=$(TZ=Asia/Shanghai date -u +%Y-%m-%dT%H:%M:%S%z)
          git commit -m "loop: L1 daily-triage @ $ts (report-only)" || echo "nothing to commit"
          git push || echo "push skipped (可能无变更)"

      - name: 上传 loop 产物 (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: loop-triage-run
          path: |
            loop-run-log.md
            STATE.md
            loop-budget.md
            .loop-tmp/
          if-no-files-found: ignore

      # ============================================================
      # 失败通知 (复用 ci.yml notify-failure 机制)
      # - 钉钉 DINGTALK_WEBHOOK
      # - 飞书 FEISHU_WEBHOOK
      # ============================================================
      - name: 通知钉钉
        if: failure()
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        run: |
          if [ -z "$DINGTALK_WEBHOOK" ]; then
            echo "DINGTALK_WEBHOOK 未配置, 跳过钉钉通知"
            exit 0
          fi
          curl -X POST "$DINGTALK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "{
              \"msgtype\": \"markdown\",
              \"markdown\": {
                \"title\": \"Loop L1 失败\",
                \"text\": \"## Loop L1 daily-triage 失败\n- 仓库: ${{ github.repository }}\n- 分支: ${{ github.ref }}\n- 提交: ${{ github.sha }}\n- 详情: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
              }
            }"

      - name: 通知飞书
        if: failure()
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          if [ -z "$FEISHU_WEBHOOK" ]; then
            echo "FEISHU_WEBHOOK 未配置, 跳过飞书通知"
            exit 0
          fi
          curl -X POST "$FEISHU_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "{
              \"msg_type\": \"interactive\",
              \"card\": {
                \"header\": {
                  \"title\": { \"tag\": \"plain_text\", \"content\": \"Loop L1 失败\" },
                  \"template\": \"red\"
                },
                \"elements\": [
                  { \"tag\": \"div\", \"text\": { \"tag\": \"lark_md\", \"content\": \"**仓库:** ${{ github.repository }}\n**分支:** ${{ github.ref }}\n**提交:** ${{ github.sha }}\" } },
                  { \"tag\": \"action\", \"actions\": [ { \"tag\": \"button\", \"text\": { \"tag\": \"plain_text\", \"content\": \"查看详情\" }, \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\", \"type\": \"primary\" } ] }
                ]
              }
            }"
