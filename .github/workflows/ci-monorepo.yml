name: CI (Monorepo)

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'tsconfig.base.json'
      - '.github/workflows/ci-monorepo.yml'
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-monorepo-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20.10'
  PNPM_VERSION: '9.15'
  PYTHON_VERSION: '3.12'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      cache-hit: ${{ steps.pnpm-cache.outputs.cache-hit }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

  lint:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint:strict
      - run: pnpm run format:check

  typecheck:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck

  source-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for .js/.jsx/.vue files in apps/*/src/
        run: |
          set -e
          FILES=$(find apps -path 'apps/*/src/*' -type f \( -name '*.js' -o -name '*.jsx' -o -name '*.vue' \) || true)
          if [ -n "$FILES" ]; then
            echo "::error::Found .js/.jsx/.vue files in apps/*/src/. Use .ts/.tsx instead."
            echo "$FILES"
            exit 1
          fi
          echo "OK: No .js/.jsx/.vue files found in apps/*/src/"

  test:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test

  build:
    needs: [lint, typecheck, test]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [web, api, miniapp-taro]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run build --filter=@ihui/${{ matrix.app }}
      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.app }}
          path: |
            apps/${{ matrix.app }}/.next
            apps/${{ matrix.app }}/dist
          retention-days: 7

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        working-directory: apps/ai-service
        run: uv pip install --system -e ".[dev]"
      - name: Ruff check
        working-directory: apps/ai-service
        run: ruff check .
      - name: Mypy
        working-directory: apps/ai-service
        run: mypy app/
      - name: Pytest
        working-directory: apps/ai-service
        run: pytest

  build-docker:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
          - target: api
            context: .
            file: ./Dockerfile.api-new
          - target: web
            context: .
            file: ./Dockerfile.web-new
          - target: ai-service
            context: apps/ai-service
            file: apps/ai-service/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: false
          tags: ihui-${{ matrix.target }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
