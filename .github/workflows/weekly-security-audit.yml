name: weekly-security-audit

# 每周一 09:00 北京时间 (UTC 01:00) 跑
# - 后端 pip-audit 检查 Python 依赖漏洞
# - 前端 npm audit 检查 npm 依赖漏洞 (使用官方源)
# - 生成报告并上传 artifact

on:
  schedule:
    - cron: '0 1 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  backend-audit:
    name: 后端 pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: 安装 pip-audit
        run: pip install pip-audit
      - name: 跑 pip-audit
        run: |
          cd server
          pip-audit -r requirements.txt -f json -o pip-audit-report.json || true
          # 显示摘要
          pip-audit -r requirements.txt || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-pip-audit
          path: server/pip-audit-report.json
      - name: 发现漏洞时创建 Issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[安全审计] 后端 pip-audit 发现漏洞 - ${new Date().toISOString().split('T')[0]}`,
              body: '请查看 artifact backend-pip-audit 中的详细报告',
              labels: ['security', 'backend']
            })

  frontend-audit:
    name: 前端 npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
      - name: 跑 npm audit (使用官方源)
        run: |
          cd client
          # 临时切换到官方源进行 audit
          npm audit --registry=https://registry.npmjs.org --json > npm-audit-report.json || true
          # 显示摘要
          npm audit --registry=https://registry.npmjs.org || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-npm-audit
          path: client/npm-audit-report.json
      - name: 发现漏洞时创建 Issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[安全审计] 前端 npm audit 发现漏洞 - ${new Date().toISOString().split('T')[0]}`,
              body: '请查看 artifact frontend-npm-audit 中的详细报告',
              labels: ['security', 'frontend']
            })
