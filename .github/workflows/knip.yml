name: knip 死代码检测 (Dead Code Detection)

on:
  push:
    branches: [main, develop]
    paths:
      - 'client/knip.json'
      - 'client/src/**'
      - 'client/package.json'
      - '.github/workflows/knip.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'client/knip.json'
      - 'client/src/**'
  workflow_dispatch:

jobs:
  knip-scan:
    name: knip 扫描 + Configuration hints 守门
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: 安装前端依赖
        working-directory: client
        run: npm ci

      - name: 跑 knip 扫描 (Configuration hints 守门)
        working-directory: client
        run: |
          # 1. 跑 knip 扫描, 退出码非 0 即视为失败
          # 2. 重点检查 Configuration hints (knip.json 配置错误)
          # 3. Unused files/exports 是预期 (knip 不识别动态 import), 不作 fail
          set +e
          npx knip --no-progress 2>&1 | tee knip-output.txt
          EXIT_CODE=$?
          set -e
          # 提取 Configuration hints 数量
          HINTS=$(grep -c "knip.json" knip-output.txt || echo "0")
          echo "::notice::Configuration hints count: $HINTS"
          # 如果有 hints, 视为 PR 失败
          if [ "$HINTS" -gt 0 ]; then
            echo "::error::knip 报告了 $HINTS 个 Configuration hints, 请检查 client/knip.json 配置"
            echo "::group::knip 完整输出"
            cat knip-output.txt
            echo "::endgroup::"
            exit 1
          fi
          # 如果是无 hints 但有 unused files, 仅警告 (knip 不识别动态 import 是已知问题)
          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "::warning::knip 退出码 $EXIT_CODE (Unused files/exports), 详见 knip-output.txt"
          fi
          echo "::notice::knip Configuration hints = 0 ✅"

      - name: 上传 knip 输出
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: knip-output
          path: client/knip-output.txt
          if-no-files-found: ignore
