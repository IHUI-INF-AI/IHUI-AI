name: Knip

# =============================================================================
# Knip 死代码检查 workflow
#
# 使用 Knip 扫描 monorepo 中的未使用文件、导出和依赖。
# 配置文件: knip.jsonc (monorepo 根目录)
# 仅在 monorepo 根目录运行，分析所有 workspace。
# =============================================================================

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'package.json'
      - 'knip.jsonc'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/knip.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'package.json'
      - 'knip.jsonc'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/knip.yml'

concurrency:
  group: knip-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9'

jobs:
  knip:
    name: Knip 死代码检查
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Knip
        run: pnpm knip
