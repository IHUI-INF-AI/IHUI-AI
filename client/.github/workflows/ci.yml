name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  schedule:
    # 每周一 02:00 (北京时间) 跑 strict 模式, 监控 major 升级
    - cron: '0 18 * * 0'

jobs:
  # ---------------------------------------------------------------------------
  # Job 0: 前端依赖过期监控 (PR 触发, 仅 warning)
  # ---------------------------------------------------------------------------
  outdated-check:
    name: Outdated Dependency Check (warning)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run check:outdated (non-strict, warning)
        # PR 阶段仅 warning 不阻断, 让开发者知道有包过期
        run: |
          echo "::group::📦 主项目 client/ 过期检测"
          npm run check:outdated --silent || true
          echo "::endgroup::"
          echo "::group::📦 miniapp/ 过期检测"
          npm run check:outdated:miniapp --silent || true
          echo "::endgroup::"

      - name: Annotate as PR comment (suggest)
        if: github.event_name == 'pull_request'
        run: |
          echo "## 📦 依赖过期检测结果"
          echo ""
          echo "如需详细报告, 在本地运行: \`npm run check:outdated\`"
          echo "周级别 strict 监控: CI 周一自动跑, 会阻断合并"

  # ---------------------------------------------------------------------------
  # Job 0.5: 周级别 strict 监控 (仅 schedule 触发, major 升级会阻断)
  # ---------------------------------------------------------------------------
  outdated-strict-weekly:
    name: Outdated Strict Weekly (major blocks)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run check:outdated --fail-on-major
        run: |
          echo "🔍 周级别 strict 监控: 任何 major 升级都会阻断"
          npm run check:outdated:strict
          if [ $? -ne 0 ]; then
            echo "::error::检测到 major 升级, 需评估后处理"
            exit 1
          fi
          echo "✅ 无 major 升级"

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: npm run build:shared

      - name: Run type check
        run: npm run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

  style-audit:
    name: Style Audit (no-important / no-hardcoded-colors / no-high-specificity)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Check no !important in styles
        # 用户规则：禁止使用 !important，保证后续样式可控
        run: npm run check:no-important

      - name: Check high specificity selectors
        # 用户规则：禁止使用高特异性选择器（4 类以上嵌套），项目代码中不得存在
        # 阈值 0：项目代码中不允许有任何高特异性选择器
        # 使用静态分析脚本（无需启动 dev server）
        run: HIGH_SPECIFICITY_THRESHOLD=0 node scripts/check-high-specificity-staged.mjs --all

      - name: --el-* token usage check (new components)
        # 检查新组件是否直接使用 --el-* token（应优先使用 --app-* 语义化 token）
        run: node scripts/check-el-token-staged.mjs
        continue-on-error: true

  nul-residue-scan:
    # 拦截 Windows 终端残留 nul 文件（PowerShell `>nul` 副作用，硬限制无法删除，仅做拦截不阻断提交）
    name: Nul Residue Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan nul residue files (strict)
        run: |
          node scripts/check-nul.mjs --strict

      - name: Scan >nul redirect in scripts
        # 检查项目脚本里是否使用小写 `>nul`（Windows cmd 兼容性问题，建议大写 >NUL）
        run: |
          bad=$(grep -rnE '>[ ]?nul\b' --include='*.bat' --include='*.cmd' --include='*.sh' . 2>/dev/null || true)
          if [ -n "$bad" ]; then
            echo "::warning::发现 >nul 重定向（建议大写 >NUL，更明确且与 PowerShell 行为一致）："
            echo "$bad"
          else
            echo "OK: 无 >nul 重定向"
          fi

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test -- --coverage --run

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:web

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  miniapp-build:
    name: Miniapp Build
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            miniapp/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install miniapp dependencies
        run: npm ci --prefix miniapp

      - name: Build WeChat miniapp
        run: npm run build:mp-weixin

      - name: Upload miniapp artifacts
        uses: actions/upload-artifact@v4
        with:
          name: miniapp-mp-weixin
          path: miniapp/dist/build/mp-weixin/
          retention-days: 7

  responsive-test:
    name: Responsive Tests
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Build
        run: npm run build:web

      - name: Start server and run responsive tests
        run: |
          npm run preview &
          npx wait-on http://localhost:4173 -t 60000
          npx playwright test e2e/responsive-test.spec.ts --project=chromium --workers=2

      - name: Upload test screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-screenshots
          path: screenshots/
          retention-days: 7

  component-e2e-test:
    name: Component E2E Tests
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Build
        run: npm run build:web

      - name: Start server and run component tests
        run: |
          npm run preview &
          npx wait-on http://localhost:4173 -t 60000
          npx playwright test e2e/header-overflow.spec.ts --project=chromium

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: component-test-results
          path: test-results/
          retention-days: 7

  prod-smoke-test:
    # P3 新增：生产构建 smoke + Web Vitals 基线（替代手动 Lighthouse）
    name: Prod Smoke + Web Vitals
    runs-on: ubuntu-latest
    needs: [typecheck, lint, build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Build
        run: npm run build:web

      - name: Run prod smoke + web vitals
        run: |
          npm run preview &
          npx wait-on http://127.0.0.1:4173 -t 60000
          npx playwright test e2e/production-smoke.spec.ts e2e/web-vitals.spec.ts --project=chromium

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: prod-smoke-results
          path: test-results/
          retention-days: 7

  i18n-completeness:
    # P28-2: i18n 翻译完整性检测 (5 语言对比 + 硬编码中文 + 缺失/冗余键)
    # PR 触发: --strict 模式, 缺失翻译键阻断合并
    # 周级别 schedule: 同样 strict, 监控语言文件漂移
    name: i18n Completeness (strict)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run i18n check
        # check:i18n 同时检测: 覆盖率(阈值不达标 exit 1 阻断) + 硬编码中文(仅报告不阻断)
        # 覆盖率阈值: en 90% / zh-TW 80% / ja 50% / ko 30%
        run: |
          echo "::group::i18n 翻译完整性检测 (5 语言: zh-CN/zh-TW/en/ja/ko)"
          npm run check:i18n
          echo "::endgroup::"

      - name: Upload i18n report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: i18n-completeness-report
          path: |
            src/locales/*.json
          retention-days: 7

  visual-regression:
    # 视觉回归测试: 7 页面 × 2 主题 = 14 基线比对 + 6 交互验证 + 2 鉴权重定向
    # continue-on-error: CI 环境渲染差异不阻断合并, 仅作监控
    # 基线更新流程见 .github/pull_request_template.md
    name: Visual Regression
    runs-on: ubuntu-latest
    needs: [typecheck, lint, build]
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Build
        run: npm run build:web

      - name: Start preview server and run visual regression
        run: |
          npm run preview &
          npx wait-on http://127.0.0.1:4173 -t 60000
          PW_BASE_URL=http://127.0.0.1:4173 npx playwright test e2e/visual-regression.spec.ts --project=chromium --reporter=line

      - name: Upload visual regression results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-regression-results
          path: test-results/
          retention-days: 7
