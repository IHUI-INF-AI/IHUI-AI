<!DOCTYPE html>
<html lang="zh-CN">

    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>
            <%= htmlWebpackPlugin.options.title %>
        </title>
        <script>
            var coverSupport = 'CSS' in window && typeof CSS.supports === 'function' && (CSS.supports('top: env(a)') || CSS.supports('top: constant(a)'))
            document.write('<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0' + (coverSupport ? ', viewport-fit=cover' : '') + '" />')
        </script>
        <!-- 首屏即预加载默认字体，避免进入页面先显示系统字体再切换 -->
        <link rel="preload" href="<%= BASE_URL %>static/fonts/AlimamaFangYuanTiVF-Thin.ttf" as="font" type="font/ttf" crossorigin />
        <style>
            @font-face {
                font-family: 'AlimamaFangYuanTi';
                src: url('<%= BASE_URL %>static/fonts/AlimamaFangYuanTiVF-Thin.ttf') format('truetype');
                font-weight: 100 900;
                font-style: normal;
                font-display: block;
            }
            html, body {
                font-family: 'AlimamaFangYuanTi', sans-serif !important;
                font-variation-settings: "BEVL" 100;
            }
        </style>
        <link rel="stylesheet" href="<%= BASE_URL %>static/index.<%= VUE_APP_INDEX_CSS_HASH %>.css" />
    </head>

    <body>
        <noscript>
            <strong>Please enable JavaScript to continue.</strong>
        </noscript>
        <div id="app"></div>
        <!-- built files will be auto injected -->
    </body>

</html>
