<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <script>
      var coverSupport = 'CSS' in window && typeof CSS.supports === 'function' && (CSS.supports('top: env(a)') ||
        CSS.supports('top: constant(a)'))
      document.write(
        '<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0' +
        (coverSupport ? ', viewport-fit=cover' : '') + '" />')
    </script>
    <title></title>
    <!-- 首屏即预加载默认字体，避免进入页面先显示系统字体再切换 -->
    <link rel="preload" href="/static/fonts/AlimamaFangYuanTiVF-Thin.ttf" as="font" type="font/ttf" crossorigin />
    <style>
      @font-face {
        font-family: 'AlimamaFangYuanTi';
        src: url('/static/fonts/AlimamaFangYuanTiVF-Thin.ttf') format('truetype');
        font-weight: 100 900;
        font-style: normal;
        font-display: block;
      }
      html, body {
        font-family: 'AlimamaFangYuanTi', sans-serif;
        font-variation-settings: "BEVL" 100;
      }
    </style>
    <!--preload-links-->
    <!--app-context-->
  </head>
  <body>
    <div id="app"><!--app-html--></div>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
