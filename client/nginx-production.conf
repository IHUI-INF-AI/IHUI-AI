server {
    listen 80;
    listen [::]:80;
    server_name api.aizhihui.com bsm.aizhs.top zca.aizhs.top;
    
    return 301 https://$server_name$request_uri;
}

# Custom log format for monitoring endpoints (CSP report + RUM Web Vitals)
# Records POST request body via $request_body
log_format postdata '[$time_iso8601] $remote_addr "$request_method $request_uri" $body_bytes_sent "$http_referer" "$http_user_agent" body=$request_body';


server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.aizhihui.com bsm.aizhs.top zca.aizhs.top;
    
    root /var/www/ihui-ai;
    index index.html;
    
    ssl_certificate /etc/nginx/ssl/ihui-ai.crt;
    ssl_certificate_key /etc/nginx/ssl/ihui-ai.key;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header X-DNS-Prefetch-Control "off" always;
    
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;
    
    # AI世界 走 Vue SPA（与本地 dev 一致），不返回 public/ai-world 的静态站，避免线上与本地样式不一致
    location = /ai-world {
        return 302 /ai-world/;
    }
    location /ai-world/ {
        rewrite ^ / last;
    }

    # SPA 入口与路由 fallback：禁止缓存 index.html，否则部署后仍会加载旧版 JS/CSS（如 AI世界 等页面样式不更新）
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' blob: https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://unpkg.com https://fonts.googleapis.com https://fonts.gstatic.com https://pv.sohu.com https://imgcache.qq.com https://res.wx.qq.com https://open.weixin.qq.com http://res.wx.qq.com http://open.weixin.qq.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://unpkg.com https://fonts.googleapis.com https://fonts.gstatic.com; img-src 'self' data: https: blob: https://images.unsplash.com https://images.weserv.nl https://wsrv.nl; media-src 'self' blob: data: https:; font-src 'self' data: https:; connect-src 'self' ws: wss: https: https://api.aizhihui.com https://bsm.aizhs.top https://zca.aizhs.top https://res.wx.qq.com https://open.weixin.qq.com http://res.wx.qq.com http://open.weixin.qq.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://unpkg.com https://fonts.googleapis.com https://fonts.gstatic.com; frame-src 'self' https://bsm.aizhs.top https://res.wx.qq.com https://open.weixin.qq.com http://res.wx.qq.com http://open.weixin.qq.com; worker-src 'self' blob: https://cdnjs.cloudflare.com https://unpkg.com; child-src 'self' blob:; report-uri /api/csp-report" always;
        # Report-Only：仅收集违规，不阻止资源加载；违规上报到 /api/csp-report
        add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'unsafe-inline' blob: https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://unpkg.com https://fonts.googleapis.com https://fonts.gstatic.com https://pv.sohu.com https://imgcache.qq.com https://res.wx.qq.com https://open.weixin.qq.com http://res.wx.qq.com http://open.weixin.qq.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://unpkg.com https://fonts.googleapis.com https://fonts.gstatic.com; img-src 'self' data: https: blob: https://images.unsplash.com https://images.weserv.nl https://wsrv.nl; media-src 'self' blob: data: https:; font-src 'self' data: https:; connect-src 'self' ws: wss: https: https://api.aizhihui.com https://bsm.aizhs.top https://zca.aizhs.top https://res.wx.qq.com https://open.weixin.qq.com http://res.wx.qq.com http://open.weixin.qq.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://unpkg.com https://fonts.googleapis.com https://fonts.gstatic.com; frame-src 'self' https://bsm.aizhs.top https://res.wx.qq.com https://open.weixin.qq.com http://res.wx.qq.com http://open.weixin.qq.com; worker-src 'self' blob: https://cdnjs.cloudflare.com https://unpkg.com; child-src 'self' blob:; report-uri /api/csp-report" always;
    }
    
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location /images/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    # PWA 资源：图标长期缓存；sw.js + manifest 短期缓存（避免 sw 永远不更新）
    location = /sw.js {
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "public, max-age=3600, must-revalidate" always;
        types { application/manifest+json webmanifest; }
    }
    location /icons/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location /screenshots/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    location /auth/ {
        proxy_pass http://localhost:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # 验证码接口：直连 bsm 返回 JSON（含 img 等），避免被 try_files 当成前端路由返回 index.html
    location /api/csp-report {
        access_log /var/log/nginx/csp-report.log postdata;
        add_header Content-Type application/json;
        return 204;
    }
    location /api/rum {
        access_log /var/log/nginx/rum.log postdata;
        add_header Content-Type application/json;
        return 204;
    }

    location = /api/code {
        proxy_pass https://bsm.aizhs.top/prod-api/code;
        proxy_http_version 1.1;
        proxy_set_header Host bsm.aizhs.top;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_connect_timeout 10s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }

    location /api/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    location /ws/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }
    
    error_page 404 /index.html;
    
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
