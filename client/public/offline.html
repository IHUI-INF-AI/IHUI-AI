<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a73e8" />
  <title>离线模式 - AI 智汇</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #0a0e1a 0%, #1a73e8 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #fff;
    }
    .card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 16px;
      padding: 40px;
      max-width: 480px;
      text-align: center;
    }
    h1 { font-size: 24px; margin-bottom: 12px; font-weight: 700; }
    p { font-size: 15px; line-height: 1.6; opacity: 0.86; margin-bottom: 24px; }
    button {
      background: #1a73e8;
      color: #fff;
      border: 0;
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
    }
    button:hover { background: #1557b0; }
    .icon { font-size: 64px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>当前处于离线模式</h1>
    <p>无法连接到服务器，请检查您的网络连接后重试。之前浏览过的页面仍可访问。</p>
    <button onclick="location.reload()">重新连接</button>
  </div>
</body>
</html>
