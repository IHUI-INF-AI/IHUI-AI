<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智汇AI - 开发工具集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
            font-size: 18px;
        }
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .tool-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #e9ecef;
            transition: all 0.3s ease;
        }
        .tool-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .tool-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        .tool-description {
            color: #666;
            margin-bottom: 16px;
            line-height: 1.5;
        }
        .tool-link {
            display: inline-block;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .tool-link:hover {
            background: #5a67d8;
            transform: translateY(-1px);
        }
        .back-link {
            display: inline-block;
            padding: 12px 24px;
            background: #10b981;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        .back-link:hover {
            background: #059669;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← 返回首页</a>
        
        <h1>🛠️ 智汇AI 开发工具集</h1>
        <p class="subtitle">专业的开发和测试工具，提升开发效率</p>
        
        <div class="tools-grid">
            <div class="tool-card">
                <div class="tool-title">🔐 登录系统测试工具</div>
                <div class="tool-description">
                    测试登录页面的样式和功能，包括按钮效果、主题切换等
                </div>
                <a href="./login-tester.html" class="tool-link">打开工具</a>
            </div>
            
            <div class="tool-card">
                <div class="tool-title">🎨 UI组件预览工具</div>
                <div class="tool-description">
                    预览和测试各种UI组件的样式效果，支持明暗主题切换
                </div>
                <a href="./ui-preview.html" class="tool-link">打开工具</a>
            </div>
            
            <div class="tool-card">
                <div class="tool-title">📡 API测试工具</div>
                <div class="tool-description">
                    测试后端API接口，包括用户认证、注册登录等功能
                </div>
                <a href="./api-tester.html" class="tool-link">打开工具</a>
            </div>
            
            <div class="tool-card">
                <div class="tool-title">📊 系统状态监控</div>
                <div class="tool-description">
                    监控前后端服务器状态，快速访问各个系统模块
                </div>
                <a href="./system-monitor.html" class="tool-link">打开工具</a>
            </div>
            
            <div class="tool-card">
                <div class="tool-title">🔍 页面检查工具</div>
                <div class="tool-description">
                    检查页面功能和UI显示，确保用户体验质量
                </div>
                <a href="./page-checker.html" class="tool-link">打开工具</a>
            </div>
            
            <div class="tool-card">
                <div class="tool-title">🔧 Bug修复总结</div>
                <div class="tool-description">
                    查看登录页面所有Bug的修复情况和技术细节
                </div>
                <a href="./login-bug-fixes-summary.html" class="tool-link">查看总结</a>
            </div>
        </div>
        
        <div style="text-align: center; color: #666; font-size: 14px;">
            <p>智汇AI社区 © 2025 - 开发工具集</p>
        </div>
    </div>
</body>
</html>
